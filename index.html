<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابع المهام للفروع</title>
    <!-- Fonts, Icons, and Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* All your modern UI styles are correct and remain here... */
        :root {
            --bg-color: #f0f4f8; --primary-text: #2c3e50; --secondary-text: #8492a6;
            --card-bg: #ffffff; --border-color: #e2e8f0; --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
            --green: #10B981; --red: #EF4444; --gray: #6B7280; --blue: #3B82F6; --orange: #F97316;
            --font-family: 'Tajawal', sans-serif; --border-radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--primary-text); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }
        .hidden { display: none !important; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 0.75rem; }
        .btn-primary { background: linear-gradient(45deg, var(--blue), #60A5FA); color: white; box-shadow: 0 4px 15px -5px var(--blue); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 20px -5px var(--blue); }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; }
        .view-toggle { display: flex; background: #e9eef3; border-radius: 12px; padding: 5px; }
        .view-toggle button { background: none; border: none; padding: 0.6rem 1.2rem; font-size: 0.9rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .view-toggle button.active { background: var(--card-bg); color: var(--blue); font-weight: 700; box-shadow: 0 2px 10px -2px rgba(0,0,0,0.1); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Task Item & Branch Item Styles */
        .task-item, .branch-summary-item { background: var(--card-bg); border-radius: var(--border-radius); padding: 1.5rem; box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s ease; border-left: 6px solid; }
        .task-item:hover, .branch-summary-item:hover { transform: translateY(-5px); box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1); }
        .task-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
        .task-item-name, .branch-item-name { font-size: 1.25rem; font-weight: 700; }
        .task-status-tag { padding: 0.3rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; background-color: var(--orange-light); color: var(--orange); }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; color: var(--secondary-text); margin-bottom: 0.5rem; }
        .progress-bar-bg { width: 100%; background-color: var(--bg-color); border-radius: 10px; height: 12px; }
        .progress-bar-fg { height: 100%; border-radius: 10px; background-image: linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent); background-size: 40px 40px;}
        .completion-bar { background-color: var(--green); }
        .responsiveness-bar { background-color: var(--blue); }
        .task-item-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--border-color); font-size: 0.9rem; color: var(--secondary-text); }
        
        /* Modal, Notification, and Debug Console styles are correct and remain the same */
        
        /* --- Report Template Styling (Applied via JS) --- */
        .report-container { width: 800px; padding: 40px; background: white; border: 1px solid var(--border-color); font-family: 'Tajawal', sans-serif; }
        .report-header { text-align: center; border-bottom: 2px solid var(--blue); padding-bottom: 20px; margin-bottom: 20px; }
        .report-header h2 { font-size: 28px; color: var(--blue); margin: 0; }
        .report-summary { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; }
        .report-main-stats { flex-grow: 1; }
        .report-stat-item { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center;}
        .report-stat-item span { font-weight: 700; padding: 4px 10px; border-radius: 5px; color: white; margin-left: 10px; font-size: 1.2rem; }
        .report-stat-done { background-color: var(--green); }
        .report-stat-pending { background-color: var(--red); }
        .report-stat-not-required { background-color: var(--gray); }
        .report-chart-container { width: 170px; height: 170px; }
        .report-progress-stats { border-top: 1px solid var(--border-color); padding-top: 20px; margin-bottom: 20px; }
        .report-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .report-list-item { display: flex; justify-content: space-between; padding: 8px; border-radius: 5px; }
        .report-list-item:nth-child(odd) { background-color: #f9fafb; }
        .report-list-item .status { font-weight: 700; }
        .report-list-item .status-done { color: var(--green); }
        .report-list-item .status-pending { color: var(--red); }
        .report-list-item .status-not-required { color: var(--gray); }
        .report-footer { text-align: center; margin-top: 30px; font-size: 12px; color: var(--secondary-text); }

    </style>
</head>
<body>
    <!-- All HTML structure is correct and remains the same -->
    <div class="container">
        <header class="header">
            <!-- Header content -->
        </header>
        <div id="contentArea" class="grid-container"></div>
    </div>
    <!-- Modals and Debug containers -->
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // SCRIPT_URL and other initial variables are the same
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwEGBntNxhizbx5LNfg1TUNQjoziY8qqJxos5sBLTjW1A1QEecWS5mUQVIdod1PKvT2wQ/exec';
    let currentView = 'tasks';
    let currentTaskData = null;
    let chartInstance = null;
    // ... all other element getters and state variables ...

    // Debugging, API, and View Rendering functions are correct and remain the same...

    // --- FULLY CORRECTED AND COMPLETE generateAndDownloadReport Function ---
    async function generateAndDownloadReport(data, type) {
        logToConsole(`Generating '${type}' report`, 'EVENT');
        const reportElement = document.createElement('div');
        reportElement.className = 'report-container';

        let reportHTML, chartData, chartLabels, fileName;
        
        const statusTranslations = {'done': 'تم', 'pending': 'لم يتم', 'not-required': 'غير مطلوب'};
        const statusClasses = {'done': 'status-done', 'pending': 'status-pending', 'not-required': 'status-not-required'};

        if (type === 'task') {
            const doneCount = data.branches.filter(b => b.status === 'done').length;
            const pendingCount = data.branches.filter(b => b.status === 'pending').length;
            const notRequiredCount = data.branches.filter(b => b.status === 'not-required').length;
            const totalBranches = data.branches.length;
            const requiredBranches = totalBranches - notRequiredCount;

            const completionPercentage = (totalBranches > 0) ? Math.round((doneCount / totalBranches) * 100) : 0;
            const responsivenessPercentage = (requiredBranches > 0) ? Math.round((doneCount / requiredBranches) * 100) : 0;

            chartData = [doneCount, pendingCount, notRequiredCount];
            chartLabels = ['تم', 'لم يتم', 'غير مطلوب'];
            fileName = `report_task_${data.task.name.replace(/[\s\W]/g, '_')}.jpg`;

            const branchListHTML = data.branches.map(b => 
                `<div class="report-list-item"><span>${b.name}</span><span class="status ${statusClasses[b.status]}">${statusTranslations[b.status]}</span></div>`
            ).join('');

            reportHTML = `
                <div class="report-header"><h2>${data.task.name}</h2><p>تقرير حالة استجابة الفروع</p></div>
                <div class="report-summary">
                    <div class="report-main-stats">
                        <div class="report-stat-item">تم التنفيذ<span class="report-stat-done">${doneCount}</span></div>
                        <div class="report-stat-item">لم يتم<span class="report-stat-pending">${pendingCount}</span></div>
                        <div class="report-stat-item">غير مطلوب<span class="report-stat-not-required">${notRequiredCount}</span></div>
                    </div>
                    <div class="report-chart-container"><canvas id="reportChart"></canvas></div>
                </div>
                <div class="report-progress-stats">
                    <div class="progress-bar-container"><div class="progress-label"><span>نسبة الإنجاز</span><span>${completionPercentage}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fg completion-bar" style="width: ${completionPercentage}%;"></div></div></div>
                    <div class="progress-bar-container" style="margin-top: 1rem;"><div class="progress-label"><span>نسبة الإستجابة</span><span>${responsivenessPercentage}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fg responsiveness-bar" style="width: ${responsivenessPercentage}%;"></div></div></div>
                </div>
                <div class="report-list">${branchListHTML}</div>
                <div class="report-footer"><p>تم إنشاء هذا التقرير بتاريخ: ${new Date().toLocaleString('ar-EG')}</p></div>
            `;
        } else { // type === 'branch'
            const doneCount = data.tasks.filter(t => t.status === 'done').length;
            const pendingCount = data.tasks.filter(t => t.status === 'pending').length;
            const notRequiredCount = data.tasks.filter(t => t.status === 'not-required').length;
            
            chartData = [doneCount, pendingCount, notRequiredCount];
            chartLabels = ['مهام منجزة', 'مهام معلقة', 'مهام غير مطلوبة'];
            fileName = `report_branch_${data.branch.name.replace(/[\s\W]/g, '_')}.jpg`;

            const taskListHTML = data.tasks.map(t => 
                `<div class="report-list-item"><span>${t.name}</span><span class="status ${statusClasses[t.status]}">${statusTranslations[t.status]}</span></div>`
            ).join('');

            reportHTML = `
                <div class="report-header" style="border-bottom-color: var(--green);"><h2 style="color: var(--green);">${data.branch.name}</h2><p>تقرير إنجاز المهام للفرع</p></div>
                <div class="report-summary">
                    <div class="report-main-stats">
                        <div class="report-stat-item">مهام منجزة<span class="report-stat-done">${doneCount}</span></div>
                        <div class="report-stat-item">مهام معلقة<span class="report-stat-pending">${pendingCount}</span></div>
                        <div class="report-stat-item">مهام غير مطلوبة<span class="report-stat-not-required">${notRequiredCount}</span></div>
                    </div>
                    <div class="report-chart-container"><canvas id="reportChart"></canvas></div>
                </div>
                <div class="report-list">${taskListHTML}</div>
                <div class="report-footer"><p>تم إنشاء هذا التقرير بتاريخ: ${new Date().toLocaleString('ar-EG')}</p></div>
            `;
        }

        reportElement.innerHTML = reportHTML;
        document.body.appendChild(reportElement);

        const chartCanvas = document.getElementById('reportChart');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(chartCanvas, {
            type: 'doughnut',
            data: {
                labels: chartLabels,
                datasets: [{ data: chartData, backgroundColor: [getComputedStyle(document.body).getPropertyValue('--green'), getComputedStyle(document.body).getPropertyValue('--red'), getComputedStyle(document.body).getPropertyValue('--gray')], borderWidth: 2, borderColor: '#fff' }]
            },
            options: { plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
        });

        reportElement.style.position = 'absolute';
        reportElement.style.right = '-9999px';
        reportElement.style.top = '0px';

        await new Promise(resolve => setTimeout(resolve, 500));

        const canvas = await html2canvas(reportElement, { scale: 2 });
        const link = document.createElement('a');
        link.download = fileName;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
        
        document.body.removeChild(reportElement);
        logToConsole(`Report '${fileName}' generated.`, 'SUCCESS');
    }

    // --- ALL OTHER FUNCTIONS AND EVENT LISTENERS ---
    // (Paste the complete functions for handleLoadDashboard, handleSelectTask, initializeApp, etc. here)
    // The previous full script had all the correct listeners and initialization logic.
    function initializeApp() {
        // ... (The full initializeApp function from the last response)
    }
    
    // Make sure to call initializeApp() at the end.
    // For brevity, only the fixed function is shown, but your file should contain everything.
});
</script>
</html>
