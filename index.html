<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Follow Up</title>
    <!-- Fonts, Icons, and Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8; --primary-text: #2c3e50; --secondary-text: #8492a6;
            --card-bg: #ffffff; --border-color: #e2e8f0; --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
            --green: #10B981; --red: #EF4444; --gray: #6B7280; --blue: #3B82F6; --orange: #F97316;
            --purple: #8B5CF6; --yellow: #F59E0B;
            --font-family: 'Tajawal', sans-serif; --border-radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--primary-text); line-height: 1.7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }
        .hidden { display: none !important; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 0.75rem; }
        .btn-primary { background: linear-gradient(45deg, var(--blue), #60A5FA); color: white; box-shadow: 0 4px 15px -5px var(--blue); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 20px -5px var(--blue); }
        .btn-secondary { background-color: var(--card-bg); color: var(--blue); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #f8fafc; border-color: var(--blue); }
        .btn-danger { background-color: var(--red); color: white; }
        .btn:disabled { background-color: var(--gray); color: white; cursor: not-allowed; box-shadow: none; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; }
        .header-title { flex-grow: 1; }
        .header-title h1 { display: flex; align-items: center; gap: 1rem; }
        .header-title .back-btn { background: none; border: none; font-size: 1.5rem; color: var(--secondary-text); cursor: pointer; transition: color 0.2s; }
        .header-title .back-btn:hover { color: var(--blue); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); height: 0; padding: 0; margin: 0; border: none; } }
        
        /* Section View */
        .section-item { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); transition: all 0.3s ease; border-left: 6px solid var(--purple); overflow: hidden; display: flex; flex-direction: column; }
        .section-item:hover { transform: translateY(-5px); box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1); }
        .section-item-actions { padding: 0.5rem 1rem 0; text-align: left; }
        .delete-btn { background: none; border: none; color: var(--secondary-text); cursor: pointer; font-size: 1rem; padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; transition: all 0.2s ease; }
        .delete-btn:hover { background-color: #FEE2E2; color: var(--red); }
        .confirm-delete-btn { background-color: var(--red); color: white; font-size: 0.8rem; padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; animation: fadeIn 0.3s; }
        .section-item-clickable { padding: 0 1.5rem 1.5rem; cursor: pointer; flex-grow: 1; }
        .section-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .section-item-name { font-size: 1.25rem; font-weight: 700; }
        .section-item-stats { font-size: 0.9rem; color: var(--secondary-text); }
        
        /* Task View */
        .task-item { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); transition: all 0.3s ease; border-left: 6px solid; overflow: hidden; display: flex; flex-direction: column; }
        .task-item.status-Closed, .task-item.status-ClosedForAssessment { opacity: 0.7; background: #fafafa; }
        .task-item.status-Closed .task-item-name::after, .task-item.status-ClosedForAssessment .task-item-name::after { content: '(مغلقة)'; font-size: 0.9rem; color: var(--red); margin-right: 8px; }
        .task-item:hover { transform: translateY(-5px); box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1); }
        .task-item-clickable { padding: 0 1.5rem 1.5rem; cursor: pointer; flex-grow: 1; }
        .task-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .task-item-name { font-size: 1.25rem; font-weight: 700; }
        .task-type-icon { font-size: 1rem; color: var(--secondary-text); }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; color: var(--secondary-text); margin-bottom: 0.5rem; }
        .progress-bar-bg { width: 100%; background-color: var(--bg-color); border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fg { height: 100%; border-radius: 10px; background-color: var(--green); }
        .task-item-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--border-color); font-size: 0.9rem; color: var(--secondary-text); display: flex; justify-content: space-between; }
        
        /* Task Detail View */
        #taskDetailView h2 { margin-bottom: 0.5rem; } #taskDetailView .task-meta { color: var(--secondary-text); margin-bottom: 1.5rem; }
        .branch-card { background: var(--card-bg); border-radius: var(--border-radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .status-radio-group { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .status-radio-group input[type="radio"] { display: none; }
        .status-radio-group label { flex-grow: 1; text-align: center; padding: 0.7rem; border-radius: 10px; border: 2px solid var(--border-color); cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .status-radio-group input[type="radio"]:checked + label { font-weight: 700; color: white; border-width: 2px; transform: translateY(-2px); }
        .status-radio-group input[value="done"]:checked + label, .status-radio-group input[value="late-done"]:checked + label { background-color: var(--green); border-color: var(--green); box-shadow: 0 4px 10px -4px var(--green); }
        .status-radio-group input[value="pending"]:checked + label { background-color: var(--red); border-color: var(--red); box-shadow: 0 4px 10px -4px var(--red); }
        .status-radio-group input[value="not-required"]:checked + label { background-color: var(--gray); border-color: var(--gray); box-shadow: 0 4px 10px -4px var(--gray); }
        .late-done-label::after { content: ' (متأخر)'; font-size: 0.75rem; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s; }
        .modal-content { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.3); padding: 2.5rem; border-radius: var(--border-radius); width: 90%; max-width: 600px; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.2); }
        .modal-content h2 { margin-bottom: 1.5rem; }
        .modal-content input[type="text"], .modal-content input[type="datetime-local"] { width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color); font-family: var(--font-family); font-size: 1rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.8); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 0.5rem; }
        .branch-selection-container { max-height: 200px; overflow-y: auto; background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color); }
        .branch-checkbox-item { display: block; margin-bottom: 0.75rem; }
        .branch-checkbox-item input { margin-left: 10px; }
        
        /* General */
        .message-container { text-align: center; padding: 5rem 2rem; font-size: 1.2rem; color: var(--secondary-text); }
        .fa-spinner { font-size: 2.5rem; margin-bottom: 1rem; }
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .notification { padding: 1rem 1.5rem; border-radius: 12px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 1rem; opacity: 0; transform: translateX(100%); animation: slideInAndOut 5s forwards; }
        .notification.error { background: linear-gradient(45deg, var(--red), #F87171); } .notification.success { background: linear-gradient(45deg, var(--green), #34D399); }
        @keyframes slideInAndOut { 0%, 100% { opacity: 0; transform: translateX(100%); } 10%, 90% { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div id="headerTitle" class="header-title">
                 <!-- Title will be injected by JS -->
            </div>
            <div id="headerActions">
                <!-- Action buttons will be injected by JS -->
            </div>
        </header>
        <div id="contentArea" class="grid-container"></div>
    </div>

    <!-- Modals -->
    <div id="sectionModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>إنشاء قسم جديد</h2>
            <input type="text" id="sectionNameInput" placeholder="اكتب اسم القسم هنا...">
            <div class="modal-actions">
                <button id="cancelAddSectionBtn" class="btn btn-secondary">إلغاء</button>
                <button id="confirmAddSectionBtn" class="btn btn-primary">إضافة القسم</button>
            </div>
        </div>
    </div>

    <div id="addTaskModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>إنشاء مهمة جديدة</h2>
            <div class="form-group">
                <label for="newTaskNameInput">اسم المهمة</label>
                <input type="text" id="newTaskNameInput" placeholder="اكتب اسم المهمة هنا...">
            </div>
            <div class="form-group">
                <label>نوع المهمة</label>
                <div class="status-radio-group">
                    <input type="radio" id="taskTypeStandard" name="taskType" value="Standard" checked><label for="taskTypeStandard">قياسية</label>
                    <input type="radio" id="taskTypeTimeLimited" name="taskType" value="TimeLimited"><label for="taskTypeTimeLimited">محددة بوقت</label>
                </div>
            </div>
            <div id="timeLimitedFields" class="form-group hidden" style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label for="taskStartDateInput">وقت البدء</label>
                    <input type="datetime-local" id="taskStartDateInput">
                </div>
                <div style="flex: 1;">
                    <label for="taskEndDateInput">وقت الإنتهاء</label>
                    <input type="datetime-local" id="taskEndDateInput">
                </div>
            </div>
            <div class="form-group">
                <label>الفروع المستهدفة</label>
                <div id="branchSelectionContainer" class="branch-selection-container">
                    <!-- Branch checkboxes will be injected by JS -->
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancelAddTaskBtn" class="btn btn-secondary">إلغاء</button>
                <button id="confirmAddTaskBtn" class="btn btn-primary">إضافة المهمة</button>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>
    
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIei-1QKbW_oJT5zuJnE2Y_FjpxuwyI08atsS1zZQh_2BNPkkoptPMbneLy7MJCuksuQ/exec';

    // UI Elements
    const contentArea = document.getElementById('contentArea');
    const headerTitle = document.getElementById('headerTitle');
    const headerActions = document.getElementById('headerActions');
    const notificationContainer = document.getElementById('notification-container');
    
    // Modals
    const sectionModal = document.getElementById('sectionModal');
    const addTaskModal = document.getElementById('addTaskModal');

    // State
    let state = {
        view: 'sections', // sections, tasks, taskDetail
        currentSection: null, // {id, name}
        currentTask: null, // {id, name, ...}
        allBranches: [],
    };

    // --- API HELPER ---
    async function apiCall(action, method = 'GET', body = null) {
        const url = new URL(SCRIPT_URL);
        const options = { method, redirect: 'follow', muteHttpExceptions: true };
        if (method === 'POST') {
            options.body = JSON.stringify({ action, ...body });
        } else {
            url.searchParams.append('action', action);
            if (body) Object.keys(body).forEach(key => url.searchParams.append(key, body[key]));
        }
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`Network error: ${response.statusText}`);
            const data = await response.json();
            if (!data.success) throw new Error(data.message || 'Unknown API error');
            return data;
        } catch (error) {
            showNotification(error.message, true);
            throw error;
        }
    }

    // --- RENDER FUNCTIONS ---

    function showLoader(message = 'جاري التحميل...') {
        contentArea.innerHTML = `<div class="message-container"><i class="fas fa-spinner fa-spin"></i><p>${message}</p></div>`;
    }

    function render() {
        showLoader();
        updateHeader();
        contentArea.classList.add('grid-container');

        if (state.view === 'sections') {
            handleLoadSections();
        } else if (state.view === 'tasks') {
            handleLoadTasks(state.currentSection.id);
        } else if (state.view === 'taskDetail') {
            handleLoadTaskDetails(state.currentTask.id);
        }
    }

    function updateHeader() {
        headerTitle.innerHTML = '';
        headerActions.innerHTML = '';

        if (state.view === 'sections') {
            headerTitle.innerHTML = '<h1>الأقسام</h1>';
            headerActions.innerHTML = `<button id="addSectionBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة قسم</button>`;
            document.getElementById('addSectionBtn').addEventListener('click', openSectionModal);
        } else if (state.view === 'tasks') {
            headerTitle.innerHTML = `<h1><button id="backToSectionsBtn" class="back-btn"><i class="fas fa-arrow-right"></i></button> ${state.currentSection.name}</h1>`;
            headerActions.innerHTML = `
                <button id="addOrCloseTaskBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة مهمة</button>
                <button id="sectionReportBtn" class="btn btn-secondary"><i class="fas fa-file-alt"></i> تقرير القسم</button>`;
            document.getElementById('backToSectionsBtn').addEventListener('click', () => navigate('sections'));
            document.getElementById('addOrCloseTaskBtn').addEventListener('click', openAddTaskModal);

        } else if (state.view === 'taskDetail') {
            headerTitle.innerHTML = `<h1><button id="backToTasksBtn" class="back-btn"><i class="fas fa-arrow-right"></i></button> ${state.currentTask.name}</h1>`;
            let closeBtnHtml = '';
            if (state.currentTask.type === 'Standard' && state.currentTask.status === 'Open') {
                closeBtnHtml = `<button id="closeTaskBtn" class="btn btn-danger"><i class="fas fa-lock"></i> إغلاق المهمة</button>`;
            }
            headerActions.innerHTML = `
                ${closeBtnHtml}
                <button id="downloadReportBtn" class="btn btn-secondary"><i class="fas fa-download"></i> تحميل تقرير</button>`;
            document.getElementById('backToTasksBtn').addEventListener('click', () => navigate('tasks', { section: state.currentSection }));
            if (document.getElementById('closeTaskBtn')) {
                 document.getElementById('closeTaskBtn').addEventListener('click', handleCloseTask);
            }
        }
    }

    function renderSections(sections) {
        if (!sections || sections.length === 0) {
            contentArea.innerHTML = `<p class="message-container">لا توجد أقسام. قم بإضافة قسم جديد.</p>`;
            return;
        }
        contentArea.innerHTML = '';
        sections.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(section => {
            const item = document.createElement('div');
            item.className = 'section-item';
            item.dataset.sectionId = section.id;
            item.innerHTML = `
                <div class="section-item-actions">
                    <button class="delete-btn" title="حذف القسم"><i class="fas fa-trash-alt"></i></button>
                </div>
                <div class="section-item-clickable" data-section-name="${section.name}">
                    <div class="section-item-header">
                        <h3 class="section-item-name">${section.name}</h3>
                    </div>
                    <p class="section-item-stats">عدد المهام: ${section.taskCount}</p>
                </div>`;
            contentArea.appendChild(item);
        });
    }
    
    function renderTasks(tasks) {
        if (!tasks || tasks.length === 0) {
            contentArea.innerHTML = `<p class="message-container">لا توجد مهام في هذا القسم.</p>`;
            return;
        }
        contentArea.innerHTML = '';
        tasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(task => {
            const item = document.createElement('div');
            item.className = `task-item status-${task.status}`;
            item.dataset.taskId = task.id;

            const completionColor = task.completion > 80 ? 'green' : task.completion > 40 ? 'orange' : 'red';
            item.style.borderColor = `var(--${completionColor})`;
            
            const typeIcon = task.type === 'TimeLimited' 
                ? '<i class="fas fa-clock task-type-icon" title="مهمة محددة بوقت"></i>' 
                : '<i class="fas fa-check-double task-type-icon" title="مهمة قياسية"></i>';
            
            const footerDate = task.type === 'TimeLimited' && task.endDate
                ? `<i class="fas fa-hourglass-end"></i> تنتهي في: ${new Date(task.endDate).toLocaleString('ar-EG')}`
                : `<i class="fas fa-calendar-alt"></i> أنشئت في: ${new Date(task.createdAt).toLocaleDateString('ar-EG')}`;

            item.innerHTML = `
                <div class="section-item-actions">
                    <button class="delete-btn" title="حذف المهمة"><i class="fas fa-trash-alt"></i></button>
                </div>
                <div class="task-item-clickable" data-task-json='${JSON.stringify(task)}'>
                    <div class="task-item-header">
                        <h3 class="task-item-name">${task.name}</h3>
                        ${typeIcon}
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-label"><span>نسبة الإنجاز</span><span>${task.completion}%</span></div>
                        <div class="progress-bar-bg"><div class="progress-bar-fg" style="width: ${task.completion}%;"></div></div>
                    </div>
                    <div class="task-item-footer">${footerDate}</div>
                </div>`;
            contentArea.appendChild(item);
        });
    }

    function renderTaskDetail(data) {
        contentArea.classList.remove('grid-container');
        state.currentTask.status = data.task.status; // Update state with latest status
        updateHeader(); // Re-render header to show/hide close button

        let meta = `نوع المهمة: ${data.task.type === 'TimeLimited' ? 'محددة بوقت' : 'قياسية'}`;
        if (data.task.type === 'TimeLimited' && data.task.endDate) {
             meta += ` | تنتهي في: ${new Date(data.task.endDate).toLocaleString('ar-EG')}`;
        }
        if (data.task.status !== 'Open') {
            meta += ` | <span style="color:var(--red); font-weight:bold;">الحالة: مغلقة</span>`;
        }

        contentArea.innerHTML = `
            <div id="taskDetailView" class="view">
                <p class="task-meta">${meta}</p>
                <div class="grid-container" id="branchGrid"></div>
            </div>`;

        const branchGrid = document.getElementById('branchGrid');
        if (!data.branches || data.branches.length === 0) {
            branchGrid.innerHTML = `<p class="message-container">لم يتم تحديد فروع لهذه المهمة.</p>`;
            return;
        }

        const isTaskClosed = data.task.status !== 'Open';

        data.branches.forEach(branch => {
            const card = document.createElement('div');
            card.className = 'branch-card';
            const doneLabel = branch.status === 'late-done' ? 'تم (متأخر)' : 'تم';
            const disabledAttr = isTaskClosed ? 'disabled' : '';

            card.innerHTML = `
                <div class="branch-name">${branch.name}</div>
                <div class="status-radio-group" data-branch-id="${branch.id}">
                    <input type="radio" id="pending-${branch.id}" name="status-${branch.id}" value="pending" ${branch.status === 'pending' ? 'checked' : ''} ${disabledAttr}><label for="pending-${branch.id}">لم يتم</label>
                    <input type="radio" id="done-${branch.id}" name="status-${branch.id}" value="done" ${branch.status === 'done' || branch.status === 'late-done' ? 'checked' : ''} ${disabledAttr}><label for="done-${branch.id}" class="${branch.status === 'late-done' ? 'late-done-label': ''}">${doneLabel}</label>
                    <input type="radio" id="not-required-${branch.id}" name="status-${branch.id}" value="not-required" ${branch.status === 'not-required' ? 'checked' : ''} ${disabledAttr}><label for="not-required-${branch.id}">غير مطلوب</label>
                </div>`;
            branchGrid.appendChild(card);
        });
    }

    // --- DATA HANDLERS ---
    
    async function handleLoadSections() {
        try {
            const data = await apiCall('getSections');
            renderSections(data.sections);
        } catch (error) {
            contentArea.innerHTML = `<p class="message-container">حدث خطأ أثناء تحميل الأقسام.</p>`;
        }
    }

    async function handleLoadTasks(sectionId) {
        try {
            const data = await apiCall('getTasksForSection', 'GET', { sectionID: sectionId });
            renderTasks(data.tasks);
        } catch (error) {
            contentArea.innerHTML = `<p class="message-container">حدث خطأ أثناء تحميل المهام.</p>`;
        }
    }
    
    async function handleLoadTaskDetails(taskId) {
        contentArea.classList.remove('grid-container');
        showLoader(`جاري تحميل تفاصيل المهمة...`);
        try {
            const data = await apiCall('getTaskDetails', 'GET', { taskID: taskId });
            state.currentTask = { ...state.currentTask, ...data.task };
            renderTaskDetail(data);
        } catch (error) {
            navigate('tasks', { section: state.currentSection });
        }
    }

    async function handleStatusChange(e) {
        if (e.target.name.startsWith('status-')) {
            const radio = e.target;
            const newStatus = radio.value;
            const branchID = radio.closest('.status-radio-group').dataset.branchId;
            const taskID = state.currentTask.id;
            
            const group = radio.closest('.status-radio-group');
            Array.from(group.querySelectorAll('input')).forEach(inp => inp.disabled = true);

            try {
                const result = await apiCall('updateStatus', 'POST', { taskID, branchID, newStatus });
                // Update label for late-done status
                if(result.actualStatus === 'late-done') {
                    const doneLabel = group.querySelector('label[for="done-'+branchID+'"]');
                    doneLabel.textContent = 'تم (متأخر)';
                    doneLabel.classList.add('late-done-label');
                }
            } catch (error) {
                 // Revert on error - simple reload for now
                 handleLoadTaskDetails(taskID);
            } finally {
                Array.from(group.querySelectorAll('input')).forEach(inp => inp.disabled = false);
            }
        }
    }
    
    async function handleDelete(e) {
        const deleteBtn = e.target.closest('.delete-btn');
        if (!deleteBtn) return;
        
        e.stopPropagation();
        
        const sectionItem = e.target.closest('.section-item');
        const taskItem = e.target.closest('.task-item');

        if (sectionItem) {
            const sectionId = sectionItem.dataset.sectionId;
            if (confirm(`هل أنت متأكد من حذف هذا القسم؟ سيتم حذف جميع المهام بداخله بشكل نهائي.`)) {
                try {
                    await apiCall('deleteSection', 'POST', { sectionID: sectionId });
                    showNotification('تم حذف القسم بنجاح.', false);
                    sectionItem.style.animation = 'fadeOut 0.5s forwards';
                    setTimeout(() => sectionItem.remove(), 500);
                } catch(error) { /* notification is shown by apiCall */ }
            }
        } else if (taskItem) {
            const taskId = taskItem.dataset.taskId;
            if (confirm('هل أنت متأكد من حذف هذه المهمة؟')) {
                try {
                    await apiCall('deleteTask', 'POST', { taskID: taskId });
                    showNotification('تم حذف المهمة بنجاح.', false);
                    taskItem.style.animation = 'fadeOut 0.5s forwards';
                    setTimeout(() => taskItem.remove(), 500);
                } catch(error) { /* notification is shown by apiCall */ }
            }
        }
    }

    async function handleCloseTask() {
        if(!state.currentTask || !state.currentTask.id) return;
        if (confirm('هل أنت متأكد من إغلاق هذه المهمة؟ لن تتمكن من تعديل حالات الفروع بعد الإغلاق.')) {
            try {
                await apiCall('updateTaskStatus', 'POST', { taskID: state.currentTask.id, newStatus: 'Closed' });
                showNotification('تم إغلاق المهمة بنجاح', false);
                state.currentTask.status = 'Closed';
                render(); // Re-render the detail view
            } catch(error) { /* notification handled by apiCall */ }
        }
    }

    // --- MODAL & FORM HANDLING ---
    function openSectionModal() {
        document.getElementById('sectionNameInput').value = '';
        sectionModal.classList.remove('hidden');
    }
    
    async function openAddTaskModal() {
        // Reset form
        document.getElementById('newTaskNameInput').value = '';
        document.getElementById('taskTypeStandard').checked = true;
        document.getElementById('timeLimitedFields').classList.add('hidden');
        
        // Populate branches
        const branchContainer = document.getElementById('branchSelectionContainer');
        branchContainer.innerHTML = 'جاري تحميل الفروع...';
        try {
            if (state.allBranches.length === 0) {
                const data = await apiCall('getBranches');
                state.allBranches = data.branches;
            }
            branchContainer.innerHTML = '';
            if (state.allBranches.length === 0) {
                 branchContainer.innerHTML = 'لم يتم العثور على فروع. يرجى إضافتها في شيت "Branches".';
                 return;
            }
            state.allBranches.forEach(branch => {
                branchContainer.innerHTML += `
                    <label class="branch-checkbox-item">
                        <input type="checkbox" name="branch" value="${branch.id}"> ${branch.name}
                    </label>`;
            });

            addTaskModal.classList.remove('hidden');
        } catch (error) {
            branchContainer.innerHTML = 'فشل في تحميل الفروع.';
        }
    }

    // --- NAVIGATION ---
    function navigate(view, data = {}) {
        state.view = view;
        if (view === 'tasks') {
            state.currentSection = data.section;
            state.currentTask = null;
        } else if (view === 'taskDetail') {
            state.currentTask = data.task;
        } else {
            state.currentSection = null;
            state.currentTask = null;
        }
        render();
    }

    // --- UTILITIES ---
    function showNotification(message, isError = true) {
        const notification = document.createElement('div');
        notification.className = `notification ${isError ? 'error' : 'success'}`;
        notification.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i><span>${message}</span>`;
        notificationContainer.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
    }
    
    // --- INITIALIZATION ---
    function initializeApp() {
        // Main Click Handler
        contentArea.addEventListener('click', e => {
            // Navigate to tasks
            const sectionClickable = e.target.closest('.section-item-clickable');
            if (sectionClickable) {
                const sectionItem = sectionClickable.closest('.section-item');
                navigate('tasks', { section: { id: sectionItem.dataset.sectionId, name: sectionClickable.dataset.sectionName }});
                return;
            }
            // Navigate to task detail
            const taskClickable = e.target.closest('.task-item-clickable');
            if (taskClickable) {
                const taskData = JSON.parse(taskClickable.dataset.taskJson);
                navigate('taskDetail', { task: taskData });
                return;
            }
            // Handle Deletes
            handleDelete(e);
        });

        // Task Detail Status Change Handler
        contentArea.addEventListener('change', handleStatusChange);

        // Section Modal Handlers
        document.getElementById('cancelAddSectionBtn').addEventListener('click', () => sectionModal.classList.add('hidden'));
        document.getElementById('confirmAddSectionBtn').addEventListener('click', async () => {
            const btn = document.getElementById('confirmAddSectionBtn');
            const sectionName = document.getElementById('sectionNameInput').value.trim();
            if (!sectionName) return showNotification('الرجاء إدخال اسم للقسم.', true);
            btn.disabled = true;
            try {
                const data = await apiCall('createSection', 'POST', { sectionName });
                showNotification('تم إنشاء القسم بنجاح.', false);
                sectionModal.classList.add('hidden');
                render(); // Re-render sections view
            } finally { btn.disabled = false; }
        });
        
        // Add Task Modal Handlers
        document.getElementById('cancelAddTaskBtn').addEventListener('click', () => addTaskModal.classList.add('hidden'));
        document.querySelector('input[name="taskType"][value="TimeLimited"]').addEventListener('change', () => {
            document.getElementById('timeLimitedFields').classList.remove('hidden');
        });
        document.querySelector('input[name="taskType"][value="Standard"]').addEventListener('change', () => {
            document.getElementById('timeLimitedFields').classList.add('hidden');
        });
        document.getElementById('confirmAddTaskBtn').addEventListener('click', async () => {
            const btn = document.getElementById('confirmAddTaskBtn');
            const taskName = document.getElementById('newTaskNameInput').value.trim();
            const taskType = document.querySelector('input[name="taskType"]:checked').value;
            const startDate = document.getElementById('taskStartDateInput').value;
            const endDate = document.getElementById('taskEndDateInput').value;
            const selectedBranches = Array.from(document.querySelectorAll('input[name="branch"]:checked')).map(cb => cb.value);

            if (!taskName) return showNotification('الرجاء إدخال اسم المهمة.', true);
            if (taskType === 'TimeLimited' && (!startDate || !endDate)) return showNotification('يجب تحديد وقت البدء والانتهاء للمهام المحددة بوقت.', true);
            if (selectedBranches.length === 0) return showNotification('يجب اختيار فرع واحد على الأقل.', true);
            
            btn.disabled = true;
            try {
                await apiCall('createTask', 'POST', { 
                    sectionID: state.currentSection.id,
                    taskName, taskType, startDate, endDate,
                    branchIDs: selectedBranches
                });
                showNotification('تم إنشاء المهمة بنجاح.', false);
                addTaskModal.classList.add('hidden');
                render(); // Re-render tasks view
            } finally { btn.disabled = false; }
        });

        // Start the app
        render();
    }
    
    initializeApp();
});
</script>
</html>
