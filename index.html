<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Follow Up</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* === POLISHED GLASSMORPHISM UI === */
        :root {
            --bg-color: #111827;
            --primary-text: #f9fafb;
            --secondary-text: #d1d5db;
            --border-color: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(31, 41, 55, 0.5);
            --glass-bg-hover: rgba(55, 65, 81, 0.7);
            --blue: #60a5fa; --blue-glow: 0 0 20px rgba(96, 165, 250, 0.5);
            --green: #4ade80; --green-glow: 0 0 20px rgba(74, 222, 128, 0.5);
            --red: #f87171;
            --orange: #fb923c;
            --purple: #c084fc;
            --font-family: 'Tajawal', sans-serif;
            --border-radius: 1rem;
            --transition-speed: 0.2s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-family); color: var(--primary-text); line-height: 1.6;
            background: linear-gradient(243deg, #1d2b64, #f8cdda, #1d2b64, #f8cdda);
            background-size: 400% 400%; animation: gradientBG 30s ease infinite;
            display: flex; min-height: 100vh;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Layout */
        #sidebar { width: 280px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-left: 1px solid var(--border-color); padding: 2rem; display: flex; flex-direction: column; height: 100vh; position: fixed; right: 0; top: 0; }
        #main-content { margin-right: 280px; width: calc(100% - 280px); padding: 2rem; }
        
        /* Sidebar */
        .sidebar-header { text-align: center; margin-bottom: 2.5rem; }
        .sidebar-header i { font-size: 2.5rem; color: var(--blue); text-shadow: var(--blue-glow); }
        .sidebar-header h1 { font-size: 1.5rem; font-weight: 800; margin-top: 0.5rem; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        /* Content Header */
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .content-title { font-size: 1.75rem; font-weight: 800; display: flex; align-items: center; gap: 1rem; }
        .back-btn { background: none; border: none; font-size: 1.5rem; color: var(--secondary-text); cursor: pointer; padding: 0.5rem; border-radius: 99px; line-height: 1; transition: all var(--transition-speed) ease; }
        .back-btn:hover { background: var(--glass-bg); color: var(--blue); }
        
        /* Buttons */
        .btn { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 0.75rem; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 0.75rem; font-size: 0.95rem; background: var(--glass-bg); color: var(--primary-text); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: all var(--transition-speed) ease; }
        .btn:hover:not(:disabled) { background: var(--glass-bg-hover); border-color: white; transform: translateY(-2px); }
        .btn:active:not(:disabled) { transform: translateY(-1px) scale(0.98); }
        .btn-primary { background: var(--blue); border-color: var(--blue); color: white; box-shadow: var(--blue-glow); }
        .btn-primary:hover:not(:disabled) { background: #3b82f6; box-shadow: var(--blue-glow), 0 0 30px rgba(96, 165, 250, 0.7); }
        .btn:disabled { background: rgba(55, 65, 81, 0.7); color: #9ca3af; cursor: not-allowed; border-color: transparent; }
        .content-header .btn { width: auto; }
        
        /* Cards */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
        .card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--border-radius); display: flex; flex-direction: column; border: 1px solid var(--border-color); cursor: pointer; transition: all var(--transition-speed) ease-in-out; }
        .card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.5); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .card:active { transform: translateY(-2px) scale(0.99); }
        .card-content { padding: 1.5rem; flex-grow: 1; }
        .card-footer { padding: 0.75rem 1.5rem; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--secondary-text); }
        .delete-btn { font-size: 0.8rem; color: var(--red); background: none; border: none; cursor: pointer; padding: 0.5rem; border-radius: 0.5rem; transition: background-color var(--transition-speed) ease; }
        .delete-btn:hover { background-color: #ef444420; }
        .card-name { font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem; }
        
        .task-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.25rem; }
        .tag { padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 700; border-radius: 99px; border: 1px solid; }
        .tag-purple { background-color: #c084fc30; color: var(--purple); border-color: var(--purple); }
        .tag-orange { background-color: #fb923c30; color: var(--orange); border-color: var(--orange); }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; color: var(--secondary-text); margin: 1.25rem 0 0.5rem; }
        .progress-bar-bg { width: 100%; background-color: rgba(0,0,0,0.2); border-radius: 99px; height: 8px; overflow: hidden; }
        .progress-bar-fg { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

        .branch-card { background: var(--glass-bg); border-radius: var(--border-radius); padding: 1.5rem; border: 1px solid var(--border-color); }
        .status-radio-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-top: 1rem; }
        .status-radio-group input[type="radio"] { display: none; }
        .status-radio-group label { text-align: center; padding: 0.6rem; border-radius: 0.5rem; border: 1px solid var(--border-color); cursor: pointer; font-weight: 700; color: var(--secondary-text); font-size: 0.85rem; transition: all var(--transition-speed) ease; }
        .status-radio-group label:hover { background-color: var(--glass-bg-hover); border-color: white; }
        .status-radio-group input[type="radio"]:checked + label { color: white; transform: scale(1.05); }
        .status-radio-group input[value="done"]:checked + label, .status-radio-group input[value="late-done"]:checked + label { background-color: var(--green); border-color: var(--green); box-shadow: var(--green-glow); }
        .status-radio-group input[value="pending"]:checked + label { background-color: var(--red); border-color: var(--red); box-shadow: 0 0 20px #f8717180; }
        .status-radio-group input[value="not-required"]:checked + label { background-color: var(--gray); border-color: var(--gray); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-overlay.visible { opacity: 1; visibility: visible; }
        .modal-content { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 2.5rem; border-radius: var(--border-radius); width: 90%; max-width: 550px; border: 1px solid var(--border-color); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.visible .modal-content { transform: scale(1); }
        .modal-actions .btn { width: auto; }
        .modal-content input { width: 100%; padding: 0.8rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border-color); font-family: var(--font-family); font-size: 1rem; margin-bottom: 1.25rem; background-color: rgba(17, 24, 39, 0.8); color: var(--primary-text); transition: all var(--transition-speed) ease; }
        .modal-content input:focus { border-color: var(--blue); box-shadow: var(--blue-glow); outline: none; }
        .modal-content input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .loader-container { text-align: center; padding: 5rem 2rem; }
        .fa-spinner { font-size: 2.5rem; color: var(--blue); animation: fa-spin 1.5s infinite linear; }
        @keyframes fa-spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <aside id="sidebar"></aside>
    <main id="main-content"></main>
    <div id="modal-container"></div>
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMuoWji2pZmZXbi-Bk1sl7alyV6PDVWctac6Fizsl5A6RlkgHb8CqjuIbIIn9pkpsD1A/exec';

    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    const modalContainer = document.getElementById('modal-container');
    let state = { view: 'sections', currentSection: null, currentTask: null, allBranches: [] };
    
    const apiCall = async (action, method = 'GET', body = null) => { try { const url = new URL(SCRIPT_URL); const options = { method, redirect: 'follow', muteHttpExceptions: true }; if (method === 'POST') options.body = JSON.stringify({ action, ...body }); else { url.searchParams.append('action', action); if (body) Object.keys(body).forEach(key => url.searchParams.append(key, body[key])); } const response = await fetch(url, options); const data = await response.json(); if (!data.success) throw new Error(data.message || 'Unknown API error'); return data; } catch (error) { console.error("API Call Failed:", error); throw error; } };
    const showLoader = (message = 'جاري التحميل...') => { mainContent.innerHTML = `<div class="loader-container"><i class="fas fa-spinner"></i><p>${message}</p></div>`; };
    
    const navigate = async (view, data = {}) => {
        state.view = view;
        if (view === 'tasks') { state.currentSection = data.section; state.currentTask = null; if (state.allBranches.length === 0) { try { state.allBranches = (await apiCall('getBranches')).branches; } catch (e) {} } } 
        else if (view === 'taskDetail') { state.currentTask = data.task; } 
        else { state.currentSection = null; state.currentTask = null; }
        render();
    };

    const render = () => { showLoader(); updateChrome(); const viewHandlers = { sections: handleLoadSections, tasks: () => handleLoadTasks(state.currentSection.id), taskDetail: () => handleLoadTaskDetails(state.currentTask.id) }; viewHandlers[state.view](); };
    
    const updateChrome = () => {
        sidebar.innerHTML = `<div class="sidebar-header"><i class="fas fa-rocket"></i><h1>لوحة المهام</h1></div><div class="sidebar-actions"><button id="addSectionBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة قسم جديد</button></div>`;
        let headerHTML = `<header class="content-header"><h2 class="content-title">${state.view === 'sections' ? 'الأقسام' : `<button class="back-btn"><i class="fas fa-arrow-right"></i></button> ${state.currentSection?.name || state.currentTask?.name || ''}`}</h2><div class="content-actions">${state.view === 'tasks' ? `<button id="addTaskBtn" class="btn btn-primary"><i class="fas fa-plus"></i> مهمة جديدة</button>` : ''}</div></header><div id="content-area"></div>`;
        mainContent.innerHTML = headerHTML;
    };

    const handleLoadSections = async () => { try { const data = await apiCall('getSections'); renderSections(data.sections); } catch (e) { document.getElementById('content-area').innerHTML = `<p class="loader-container">فشل تحميل الأقسام.</p>`; } };
    const handleLoadTasks = async (sectionId) => { try { const data = await apiCall('getTasksForSection', 'GET', { sectionID: sectionId }); renderTasks(data.tasks); } catch (e) { document.getElementById('content-area').innerHTML = `<p class="loader-container">فشل تحميل المهام.</p>`; } };
    const handleLoadTaskDetails = async (taskId) => { try { const data = await apiCall('getTaskDetails', 'GET', { taskID: taskId }); state.currentTask = { ...state.currentTask, ...data.task }; renderTaskDetail(data); } catch (e) { navigate('tasks', { section: state.currentSection }); } };

    const renderSections = (sections) => { const area = document.getElementById('content-area'); area.className = 'grid-container'; if (!sections || !sections.length) { area.innerHTML = `<p class="loader-container">لا توجد أقسام.</p>`; return; } area.innerHTML = sections.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).map(s => `<div class="card section-item" data-id="${s.id}" data-name="${s.name}"><div class="card-content"><h3 class="card-name">${s.name}</h3><p class="card-stats">عدد المهام: ${s.taskCount}</p></div><div class="card-footer"><span><i class="fas fa-calendar-alt"></i> ${new Date(s.createdAt).toLocaleDateString('ar-EG')}</span><button class="delete-btn" data-action="delete-section"><i class="fas fa-trash-alt"></i></button></div></div>`).join(''); };
    const renderTasks = (tasks) => {
        const area = document.getElementById('content-area');
        area.className = 'grid-container';
        if (!tasks || !tasks.length) { area.innerHTML = `<p class="loader-container">لا توجد مهام.</p>`; return; }
        area.innerHTML = tasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).map(t => {
            const progressColor = t.completion > 75 ? 'green' : t.completion > 30 ? 'orange' : 'red';
            const deadline = (t.type === 'TimeLimited' && t.endDate) ? `<div class="tag tag-orange"><i class="fas fa-hourglass-end"></i> تنتهي: ${new Date(t.endDate).toLocaleDateString('ar-EG')}</div>` : '';
            return `<div class="card task-item" data-json='${JSON.stringify(t)}'>
                <div class="card-content">
                    <h3 class="card-name">${t.name}</h3>
                    <div class="progress-label"><span>نسبة الإنجاز</span><span>${t.completion}%</span></div>
                    <div class="progress-bar-bg"><div class="progress-bar-fg" style="background-color: var(--${progressColor}); box-shadow: 0 0 10px var(--${progressColor}); width: ${t.completion}%;"></div></div>
                    <div class="task-tags">${deadline}<div class="tag tag-purple"><i class="fas fa-info-circle"></i> ${t.type === 'TimeLimited' ? 'مهمة بوقت' : 'مهمة قياسية'}</div></div>
                </div>
                <div class="card-footer"><span><i class="fas fa-calendar-alt"></i> أنشئت: ${new Date(t.createdAt).toLocaleDateString('ar-EG')}</span><button class="delete-btn" data-action="delete-task"><i class="fas fa-trash-alt"></i></button></div>
            </div>`;
        }).join('');
    };
    const renderTaskDetail = (data) => {
        const area = document.getElementById('content-area');
        area.className = 'grid-container';
        area.innerHTML = `${!data.branches || !data.branches.length ? `<p class="loader-container">لم يتم تحديد فروع.</p>` : data.branches.map(b => `<div class="branch-card"><div class="card-name">${b.name}</div><div class="status-radio-group" data-branch-id="${b.id}" data-task-id="${data.task.id}"><input type="radio" id="pending-${b.id}" name="status-${b.id}" value="pending" ${b.status === 'pending' ? 'checked' : ''} ${data.task.status !== 'Open' ? 'disabled' : ''}><label for="pending-${b.id}">لم يتم</label><input type="radio" id="done-${b.id}" name="status-${b.id}" value="done" ${b.status === 'done' || b.status === 'late-done' ? 'checked' : ''} ${data.task.status !== 'Open' ? 'disabled' : ''}><label for="done-${b.id}">${b.status === 'late-done' ? 'تم (متأخر)' : 'تم'}</label><input type="radio" id="not-required-${b.id}" name="status-${b.id}" value="not-required" ${b.status === 'not-required' ? 'checked' : ''} ${data.task.status !== 'Open' ? 'disabled' : ''}><label for="not-required-${b.id}">غير مطلوب</label></div></div>`).join('')}`;
    };

    const renderModal = (type) => {
        const commonActions = `<div class="modal-actions"><button class="btn" data-action="close-modal">إلغاء</button><button class="btn btn-primary" id="confirm-${type}-btn">تأكيد</button></div>`;
        const modals = {
            section: `<h2>إنشاء قسم جديد</h2><input type="text" id="sectionNameInput" placeholder="اكتب اسم القسم هنا...">`,
            task: `<h2>إنشاء مهمة جديدة</h2>
                <div class="form-group"><label>اسم المهمة</label><input type="text" id="newTaskNameInput"></div>
                <div class="form-group"><label>نوع المهمة</label><div class="status-radio-group" id="taskTypeSelector"><input type="radio" name="taskType" value="Standard" id="taskTypeStandard" checked><label for="taskTypeStandard">قياسية</label><input type="radio" name="taskType" value="TimeLimited" id="taskTypeTimeLimited"><label for="taskTypeTimeLimited">محددة بوقت</label></div></div>
                <div id="timeLimitedFields" class="hidden" style="display: flex; gap: 1rem;"><div style="flex: 1;"><label>وقت البدء</label><input type="datetime-local" id="taskStartDateInput"></div><div style="flex: 1;"><label>وقت الإنتهاء</label><input type="datetime-local" id="taskEndDateInput"></div></div>
                <div class="form-group"><label>الفروع المستهدفة</label><div id="branchSelectionContainer">جاري تحميل الفروع...</div></div>`
        };
        modalContainer.innerHTML = `<div class="modal-overlay visible"><div class="modal-content">${modals[type]}${commonActions}</div></div>`;
    };

    // --- EVENT HANDLING ---
    document.addEventListener('click', async e => {
        const section = e.target.closest('.section-item'), task = e.target.closest('.task-item'), actionBtn = e.target.closest('[data-action]'), backBtn = e.target.closest('.back-btn'), addSectionBtn = e.target.closest('#addSectionBtn'), addTaskBtn = e.target.closest('#addTaskBtn');
        if (actionBtn) {
             const action = actionBtn.dataset.action;
             if (action === 'delete-section') { if (confirm('هل أنت متأكد من حذف هذا القسم وكل مهامه؟')) apiCall('deleteSection', 'POST', { sectionID: section.dataset.id }).then(render); }
             if (action === 'delete-task') { if (confirm('هل أنت متأكد من حذف هذه المهمة؟')) apiCall('deleteTask', 'POST', { taskID: JSON.parse(task.dataset.json).id }).then(render); }
             if (action === 'close-modal') { e.target.closest('.modal-overlay').remove(); }
             return;
        }
        if (task) { navigate('taskDetail', { task: JSON.parse(task.dataset.json) }); }
        else if (section) { navigate('tasks', { section: { id: section.dataset.id, name: section.dataset.name } }); }
        else if (backBtn) { navigate(state.view === 'taskDetail' ? 'tasks' : 'sections', { section: state.currentSection }); }
        else if (addSectionBtn) { renderModal('section'); }
        else if (addTaskBtn) { renderModal('task'); if (state.allBranches.length > 0) document.getElementById('branchSelectionContainer').innerHTML = state.allBranches.map(b => `<label><input type="checkbox" value="${b.id}"> ${b.name}</label>`).join(''); }
        else if (e.target.closest('#confirm-section-btn')) { const name = document.getElementById('sectionNameInput').value.trim(); if (!name) return; apiCall('createSection', 'POST', { sectionName: name }).then(() => { modalContainer.innerHTML = ''; render(); }); }
        else if (e.target.closest('#confirm-task-btn')) {
            const taskName = document.getElementById('newTaskNameInput').value.trim(), taskType = document.querySelector('#taskTypeSelector input:checked').value, startDate = document.getElementById('taskStartDateInput').value, endDate = document.getElementById('taskEndDateInput').value, selectedBranches = Array.from(document.querySelectorAll('#branchSelectionContainer input:checked')).map(cb => cb.value);
            if (!taskName || !selectedBranches.length) return alert('اسم المهمة واختيار فرع واحد على الأقل مطلوبان.');
            if (taskType === 'TimeLimited' && (!startDate || !endDate)) return alert('يجب تحديد وقت البدء والانتهاء.');
            try { await apiCall('createTask', 'POST', { sectionID: state.currentSection.id, taskName, taskType, startDate, endDate, branchIDs: selectedBranches }); modalContainer.innerHTML = ''; render(); } catch (err) {}
        }
    });

    document.addEventListener('change', async e => {
        if (e.target.name.startsWith('status-')) { const group = e.target.closest('.status-radio-group'), { taskId, branchId } = group.dataset; Array.from(group.querySelectorAll('input')).forEach(i => i.disabled = true); try { await apiCall('updateStatus', 'POST', { taskID: taskId, branchID: branchId, newStatus: e.target.value }); } finally { Array.from(group.querySelectorAll('input')).forEach(i => i.disabled = false); } }
        if (e.target.name === 'taskType') { document.getElementById('timeLimitedFields').classList.toggle('hidden', e.target.value === 'Standard'); }
    });
    
    render();
});
</script>
</html>
