<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .nav-link { cursor: pointer; }
        .form-check-input { cursor: pointer; }
        .action-btn { cursor: pointer; margin-left: 5px;}
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="container mt-3">
        <header class="d-flex justify-content-between align-items-center p-3 my-3 text-white bg-primary rounded shadow-sm">
            <h4 class="mb-0">Company Task Manager</h4>
            <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#newTaskModal">＋ Assign New Task</button>
        </header>

        <!-- The rest of your HTML structure remains the same as before -->
        <ul class="nav nav-tabs" id="main-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tasks-tab" data-bs-toggle="tab" data-bs-target="#tasks-content" type="button" role="tab">Tasks Dashboard</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="reports-tab" data-bs-toggle="tab" data-bs-target="#reports-content" type="button" role="tab">Reporting</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin-content" type="button" role="tab">Manage</button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <!-- Tasks Tab -->
            <div class="tab-pane fade show active p-3 bg-white border border-top-0" id="tasks-content" role="tabpanel">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="filter-section" class="form-label">Filter by Section</label>
                        <select id="filter-section" class="form-select"><option value="all">All Sections</option></select>
                    </div>
                    <div class="col-md-4">
                        <label for="filter-branch" class="form-label">Filter by Branch</label>
                        <select id="filter-branch" class="form-select"><option value="all">All Branches</option></select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Done?</th>
                                <th>Task Title</th>
                                <th>Assigned To</th>
                                <th>Status</th>
                                <th>Assigned On</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="task-table-body">
                            <!-- Task rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Reports Tab -->
            <div class="tab-pane fade p-3 bg-white border border-top-0" id="reports-content" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                         <label for="report-type" class="form-label">Report On:</label>
                         <select id="report-type" class="form-select">
                             <option value="Overall">Overall Company</option>
                             <option value="Section">A Section</option>
                             <option value="Branch">A Branch</option>
                         </select>
                    </div>
                    <div class="col-md-5">
                         <label for="report-item" class="form-label">Select Item:</label>
                         <select id="report-item" class="form-select" disabled></select>
                    </div>
                    <div class="col-md-3 align-self-end">
                        <button id="generate-report-btn" class="btn btn-success w-100">Generate Report</button>
                    </div>
                </div>
                <hr>
                <div id="report-output" class="mt-4" style="display:none;">
                    <h4 id="report-title"></h4>
                    <div class="row">
                        <div class="col-md-6" id="chart-div"></div>
                        <div class="col-md-6" id="stats-div"></div>
                    </div>
                </div>
            </div>

            <!-- Admin Tab -->
            <div class="tab-pane fade p-3 bg-white border border-top-0" id="admin-content" role="tabpanel">
                <div class="row">
                    <!-- Manage Sections -->
                    <div class="col-md-6">
                        <h5>Manage Sections</h5>
                        <form id="add-section-form" class="d-flex">
                            <input type="text" id="new-section-name" class="form-control me-2" placeholder="New Section Name" required>
                            <button type="submit" class="btn btn-primary">Add</button>
                        </form>
                        <ul id="section-list" class="list-group mt-3"></ul>
                    </div>
                    <!-- Manage Branches -->
                    <div class="col-md-6">
                        <h5>Manage Branches</h5>
                        <form id="add-branch-form">
                            <div class="mb-2">
                                <input type="text" id="new-branch-name" class="form-control" placeholder="New Branch Name" required>
                            </div>
                            <div class="mb-2">
                                <select id="branch-section-select" class="form-select" required>
                                    <option value="" disabled selected>Assign to Section...</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Branch</button>
                        </form>
                        <ul id="branch-list" class="list-group mt-3"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Task Modal -->
    <div class="modal fade" id="newTaskModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Assign New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="new-task-form">
                        <div class="mb-3">
                            <label for="task-title" class="form-label">Task Title</label>
                            <input type="text" class="form-control" id="task-title" required>
                        </div>
                         <div class="mb-3">
                            <label for="task-description" class="form-label">Description</label>
                            <textarea class="form-control" id="task-description" rows="2"></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="task-type" class="form-label">Task Type</label>
                                <select id="task-type" class="form-select">
                                    <option value="Standard">Standard</option>
                                    <option value="Timed">Timed</option>
                                </select>
                            </div>
                            <div class="col-md-6" id="time-period-div" style="display:none;">
                                <label for="task-time-period" class="form-label">Time Period (in minutes)</label>
                                <input type="number" class="form-control" id="task-time-period" min="1">
                            </div>
                        </div>
                        <hr>
                        <h6>Assign To</h6>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="assign-section-select" class="form-label">From Section:</label>
                                <select id="assign-section-select" class="form-select" required>
                                    <option value="" disabled selected>Select a section...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                               <label class="form-label">To Branch(es): (Select one or more)</label>
                               <div id="assign-branch-checklist" class="border p-2 rounded" style="max-height: 150px; overflow-y:auto;">
                                   <small class="text-muted">Please select a section first.</small>
                               </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="submit-new-task" class="btn btn-primary">Assign Task</button>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script>
        // ==========================================================
        //  HARDCODE YOUR SCRIPT URL HERE
        // ==========================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYEpNN3u-IMnif253O0ZGdBQ62G6evFSR40XkG_fKZmbU1uCaeHU479eeZNJw49LzH/exec";
        // ==========================================================

        // --- GLOBAL STATE ---
        let allData = { sections: [], branches: [], tasks: [] };

        // --- API HELPER FUNCTION ---
        async function callAppsScript(functionName, parameters = {}) {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-t' }, // Use text/plain for simplicity with GAS
                body: JSON.stringify({ functionName, parameters }),
            });
            const result = await res.json();
            if (result.status === 'error') {
                throw new Error(result.message);
            }
            return result.data;
        }

        // --- ON PAGE LOAD ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                google.charts.load('current', {'packages':['corechart']});
                addEventListeners();
                const initialData = await callAppsScript('getInitialData');
                onInitialDataSuccess(initialData);
            } catch (error) {
                alert('Failed to load initial data: ' + error.message);
                document.getElementById('loader').style.display = 'none';
            }
        });

        function onInitialDataSuccess(data) {
            allData = data;
            populateStaticElements();
            renderTaskTable();
            document.getElementById('loader').style.display = 'none';
        }
        
        // --- ACTION HANDLERS (Communicate with Backend) ---
        async function handleAction(action, params, successMessage) {
            document.getElementById('loader').style.display = 'flex';
            try {
                await callAppsScript(action, params);
                if (successMessage) alert(successMessage);
                // Simple reload to refresh all data.
                location.reload();
            } catch (error) {
                alert(`An error occurred: ${error.message}`);
                document.getElementById('loader').style.display = 'none';
            }
        }
        
        function handleCompletionToggle(assignmentId, isDone) {
            // Optimistic update for better UX, then reload on error if needed
            const task = allData.tasks.find(t => t.assignmentId === assignmentId);
            const originalStatus = task.completionStatus;
            task.completionStatus = isDone ? "Done" : "Not Yet";
            renderTaskTable(); // Re-render immediately

            callAppsScript('updateCompletionStatus', { assignmentId, isDone })
                .catch(error => {
                    alert(`Failed to update status: ${error.message}`);
                    task.completionStatus = originalStatus; // Revert on failure
                    renderTaskTable();
                });
        }
        
        function handleTaskStatusChange(assignmentId, newStatus) {
            handleAction('updateTaskStatus', { assignmentId, newStatus }, `Task status updated to ${newStatus}.`);
        }

        function handleNewTaskSubmit() {
            const form = document.getElementById('new-task-form');
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const checkedBoxes = document.querySelectorAll('#assign-branch-checklist input:checked');
            if (checkedBoxes.length === 0) { alert('Please select at least one branch.'); return; }

            const taskData = {
                title: document.getElementById('task-title').value,
                description: document.getElementById('task-description').value,
                taskType: document.getElementById('task-type').value,
                timePeriod: document.getElementById('task-time-period').value,
                assignedBySectionId: document.getElementById('assign-section-select').value,
                branchIds: Array.from(checkedBoxes).map(cb => cb.value)
            };
            handleAction('assignNewTask', { taskData }, 'Task(s) assigned successfully!');
        }

        function handleAddSection(e) {
            e.preventDefault();
            const sectionName = document.getElementById('new-section-name').value;
            handleAction('addSection', { sectionName }, 'Section added successfully.');
        }

        function handleAddBranch(e) {
            e.preventDefault();
            const branchData = {
                branchName: document.getElementById('new-branch-name').value,
                sectionId: document.getElementById('branch-section-select').value
            };
            handleAction('addBranch', { branchData }, 'Branch added successfully.');
        }
        
        async function handleGenerateReport() {
            const reportType = document.getElementById('report-type').value;
            const itemId = document.getElementById('report-item').value;
            if ((reportType === 'Section' || reportType === 'Branch') && !itemId) {
                alert('Please select an item to report on.'); return;
            }
            
            document.getElementById('loader').style.display = 'flex';
            try {
                const reportData = await callAppsScript('getReportData', { reportType, id: itemId });
                onReportDataReceived(reportData);
            } catch (error) {
                alert(`Failed to generate report: ${error.message}`);
                document.getElementById('loader').style.display = 'none';
            }
        }
        
        function onReportDataReceived(data) {
            const { stats, averageResponseHours } = data;
            // The rest of this function is identical to the previous version...
            const reportOutput = document.getElementById('report-output');
            const itemSelect = document.getElementById('report-item');
            const itemName = itemSelect.disabled ? 'Company' : itemSelect.options[itemSelect.selectedIndex].text;
            
            document.getElementById('report-title').innerText = `Report for ${itemName}`;
            const chartData = google.visualization.arrayToDataTable([
              ['Status', 'Count'], ['Done', stats.done], ['Not Yet', stats.notYet]
            ]);
            const options = { title: 'Task Completion Status', pieHole: 0.4 };
            const chart = new google.visualization.PieChart(document.getElementById('chart-div'));
            chart.draw(chartData, options);

            const statsDiv = document.getElementById('stats-div');
            statsDiv.innerHTML = `
                <ul class="list-group">
                    <li class="list-group-item d-flex justify-content-between align-items-center">Total Tasks <span class="badge bg-primary rounded-pill">${stats.total}</span></li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">Tasks Open <span class="badge bg-success rounded-pill">${stats.open}</span></li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">Tasks Closed <span class="badge bg-secondary rounded-pill">${stats.closed}</span></li>
                    <li class="list-group-item d-flex justify-content-between align-items-center"><strong>Average Response Time</strong> <span class="badge bg-info rounded-pill">${averageResponseHours} hours</span></li>
                </ul>`;

            reportOutput.style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }

        // --- The rest of the functions (rendering, event listeners, etc.) are largely unchanged ---
        // (Copied from previous version for completeness)

        function populateStaticElements() {
            const sectionFilter = document.getElementById('filter-section');
            allData.sections.forEach(s => sectionFilter.innerHTML += `<option value="${s.id}">${s.name}</option>`);
            const sectionList = document.getElementById('section-list');
            const branchSectionSelect = document.getElementById('branch-section-select');
            const assignSectionSelect = document.getElementById('assign-section-select');
            sectionList.innerHTML = '';
            branchSectionSelect.innerHTML = '<option value="" disabled selected>Assign to Section...</option>';
            assignSectionSelect.innerHTML = '<option value="" disabled selected>Select a section...</option>';
            allData.sections.forEach(s => {
                sectionList.innerHTML += `<li class="list-group-item">${s.name}</li>`;
                branchSectionSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                assignSectionSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
            const branchList = document.getElementById('branch-list');
            branchList.innerHTML = '';
            allData.branches.forEach(b => {
                const sectionName = allData.sections.find(s => s.id === b.sectionId)?.name || 'N/A';
                branchList.innerHTML += `<li class="list-group-item">${b.name} <span class="badge bg-secondary float-end">${sectionName}</span></li>`;
            });
        }
        function renderTaskTable() {
            const tableBody = document.getElementById('task-table-body');
            tableBody.innerHTML = '';
            const sectionFilter = document.getElementById('filter-section').value;
            const branchFilter = document.getElementById('filter-branch').value;
            let filteredTasks = allData.tasks;
            if (sectionFilter !== 'all') {
                const branchesInSection = allData.branches.filter(b => b.sectionId === sectionFilter).map(b => b.id);
                filteredTasks = filteredTasks.filter(t => branchesInSection.includes(t.assignedToBranchId));
            }
            if (branchFilter !== 'all') {
                filteredTasks = filteredTasks.filter(t => t.assignedToBranchId === branchFilter);
            }
            if (filteredTasks.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No tasks found.</td></tr>`;
                return;
            }
            filteredTasks.forEach(task => {
                const branchName = allData.branches.find(b => b.id === task.assignedToBranchId)?.name || 'N/A';
                const isChecked = task.completionStatus === 'Done';
                const row = `
                    <tr>
                        <td>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" ${isChecked ? 'checked' : ''} 
                                       onchange="handleCompletionToggle('${task.assignmentId}', this.checked)"
                                       ${task.status === 'Closed' ? 'disabled' : ''}>
                            </div>
                        </td>
                        <td>${task.title}</td>
                        <td>${branchName}</td>
                        <td><span class="badge ${task.status === 'Open' ? 'bg-success' : 'bg-secondary'}">${task.status}</span></td>
                        <td>${task.assignedTimestamp}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger action-btn" onclick="handleTaskStatusChange('${task.assignmentId}', 'Closed')" ${task.status === 'Closed' ? 'disabled' : ''}>Close</button>
                            <button class="btn btn-sm btn-outline-primary action-btn" onclick="handleTaskStatusChange('${task.assignmentId}', 'Open')" ${task.status !== 'Closed' ? 'disabled' : ''}>Re-Open</button>
                        </td>
                    </tr>`;
                tableBody.innerHTML += row;
            });
        }
        function updateBranchFilter() {
            const sectionId = document.getElementById('filter-section').value;
            const branchFilter = document.getElementById('filter-branch');
            branchFilter.innerHTML = '<option value="all">All Branches</option>';
            if(sectionId !== 'all') {
                allData.branches.filter(b => b.sectionId === sectionId).forEach(b => {
                    branchFilter.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                });
            }
            renderTaskTable();
        }
        function addEventListeners() {
            document.getElementById('task-type').addEventListener('change', (e) => {
                document.getElementById('time-period-div').style.display = e.target.value === 'Timed' ? 'block' : 'none';
            });
            document.getElementById('assign-section-select').addEventListener('change', (e) => {
                const sectionId = e.target.value;
                const checklistDiv = document.getElementById('assign-branch-checklist');
                checklistDiv.innerHTML = '';
                const branches = allData.branches.filter(b => b.sectionId === sectionId);
                if(branches.length > 0) {
                    branches.forEach(b => {
                        checklistDiv.innerHTML += `
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="${b.id}" id="br-check-${b.id}">
                                <label class="form-check-label" for="br-check-${b.id}">${b.name}</label>
                            </div>`;
                    });
                } else {
                    checklistDiv.innerHTML = '<small class="text-muted">No branches found for this section.</small>';
                }
            });
            document.getElementById('submit-new-task').addEventListener('click', handleNewTaskSubmit);
            document.getElementById('add-section-form').addEventListener('submit', handleAddSection);
            document.getElementById('add-branch-form').addEventListener('submit', handleAddBranch);
            document.getElementById('filter-section').addEventListener('change', updateBranchFilter);
            document.getElementById('filter-branch').addEventListener('change', renderTaskTable);
            document.getElementById('report-type').addEventListener('change', updateReportItemDropdown);
            document.getElementById('generate-report-btn').addEventListener('click', handleGenerateReport);
        }
        function updateReportItemDropdown() {
            const reportType = document.getElementById('report-type').value;
            const itemSelect = document.getElementById('report-item');
            itemSelect.innerHTML = '';
            itemSelect.disabled = true;
            if (reportType === 'Section') {
                allData.sections.forEach(s => itemSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`);
                itemSelect.disabled = false;
            } else if (reportType === 'Branch') {
                allData.branches.forEach(b => itemSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`);
                itemSelect.disabled = false;
            }
        }
    </script>
</body>
</html>
