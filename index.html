<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابع المهام للفروع</title>
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Libraries for JPG Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary-text: #2c3e50;
            --secondary-text: #8492a6;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
            --green: #10B981; --green-light: #A7F3D0;
            --red: #EF4444; --red-light: #FECACA;
            --gray: #6B7280; --gray-light: #D1D5DB;
            --blue: #3B82F6; --blue-light: #BFDBFE;
            --orange: #F97316; --orange-light: #FED7AA;
            --font-family: 'Tajawal', sans-serif;
            --border-radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--primary-text); line-height: 1.7; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }
        .hidden { display: none !important; }

        /* --- UI Components --- */
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 12px; font-family: var(--font-family); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 0.75rem; }
        .btn-primary { background: linear-gradient(45deg, var(--blue), #60A5FA); color: white; box-shadow: 0 4px 15px -5px var(--blue); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 20px -5px var(--blue); }
        .btn-secondary { background-color: var(--card-bg); color: var(--blue); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #f8fafc; border-color: var(--blue); }

        /* --- Header --- */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); }
        .header h1 { font-size: 2.25rem; }
        .view-toggle { display: flex; background: #e9eef3; border-radius: 12px; padding: 5px; }
        .view-toggle button { background: none; border: none; padding: 0.6rem 1.2rem; font-size: 0.9rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .view-toggle button.active { background: var(--card-bg); color: var(--blue); font-weight: 700; box-shadow: 0 2px 10px -2px rgba(0,0,0,0.1); }

        /* --- Dashboard Views --- */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Task Item */
        .task-item { background: var(--card-bg); border-radius: var(--border-radius); padding: 1.5rem; box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s ease; border-left: 6px solid; }
        .task-item:hover { transform: translateY(-5px); box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1); }
        .task-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
        .task-item-name { font-size: 1.25rem; font-weight: 700; }
        .task-status-tag { padding: 0.3rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; background-color: var(--orange-light); color: var(--orange); }
        .progress-bar-container { width: 100%; margin-top: 1rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; color: var(--secondary-text); margin-bottom: 0.5rem; }
        .progress-bar-bg { width: 100%; background-color: var(--bg-color); border-radius: 10px; height: 12px; }
        .progress-bar-fg { height: 100%; border-radius: 10px; transition: width 0.5s ease-out; background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent); background-size: 40px 40px;}
        .completion-bar { background-color: var(--green); }
        .responsiveness-bar { background-color: var(--blue); }
        .task-item-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--border-color); font-size: 0.9rem; color: var(--secondary-text); }

        /* Branch Item */
        .branch-summary-item { background: var(--card-bg); border-radius: var(--border-radius); padding: 1.5rem; box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s ease; border-left: 6px solid var(--green); }
        .branch-summary-item:hover { transform: translateY(-5px); box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1); }
        .branch-item-name { font-size: 1.5rem; font-weight: 700; }
        .branch-item-stats { font-size: 1rem; color: var(--secondary-text); font-weight: 500; }
        .branch-item-stats span { font-weight: 700; color: var(--primary-text); }

        /* Detail View Cards */
        #taskDetailView .branch-card { background: var(--card-bg); border-radius: var(--border-radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .status-radio-group { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .status-radio-group input[type="radio"] { display: none; }
        .status-radio-group label { flex-grow: 1; text-align: center; padding: 0.7rem; border-radius: 10px; border: 2px solid var(--border-color); cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .status-radio-group input[type="radio"]:checked + label { font-weight: 700; color: white; border-width: 2px; transform: translateY(-2px); }
        .status-radio-group input[value="done"]:checked + label { background-color: var(--green); border-color: var(--green); box-shadow: 0 4px 10px -4px var(--green); }
        .status-radio-group input[value="pending"]:checked + label { background-color: var(--red); border-color: var(--red); box-shadow: 0 4px 10px -4px var(--red); }
        .status-radio-group input[value="not-required"]:checked + label { background-color: var(--gray); border-color: var(--gray); box-shadow: 0 4px 10px -4px var(--gray); }

        /* --- Modal (Glassmorphism) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.3); padding: 2.5rem; border-radius: var(--border-radius); width: 90%; max-width: 500px; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.2); }
        .modal-content h2 { margin-bottom: 1.5rem; }
        .modal-content input { width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color); font-family: var(--font-family); font-size: 1rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.8); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; }
        
        /* --- Report Template (similar styles to main UI) --- */
        .report-container { /* This style is applied via JS for both templates */ }

        /* Loader */
        .message-container { text-align: center; padding: 5rem 2rem; font-size: 1.2rem; color: var(--secondary-text); }
        .fa-spinner { font-size: 2.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h1 id="mainTitle">لوحة التحكم</h1>
                <p style="color: var(--secondary-text);">أهلاً بك, قم باختيار طريقة العرض المناسبة لك.</p>
            </div>
            <div class="view-toggle" id="viewToggle">
                <button class="active" data-view="tasks">عرض حسب المهمة</button>
                <button data-view="branches">عرض حسب الفرع</button>
            </div>
            <div>
                 <button class="btn btn-primary" id="addTaskBtn"><i class="fas fa-plus"></i> إضافة مهمة جديدة</button>
                 <button class="btn btn-secondary hidden" id="downloadReportBtn"><i class="fas fa-download"></i> تحميل التقرير</button>
            </div>
        </header>
        <div id="contentArea" class="grid-container"></div>
    </div>
    
    <!-- Modal for adding new tasks -->
    <div id="addTaskModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>إنشاء مهمة جديدة</h2>
            <input type="text" id="newTaskNameInput" placeholder="اكتب اسم المهمة هنا...">
            <div class="modal-actions">
                <button id="cancelAddTaskBtn" class="btn btn-secondary">إلغاء</button>
                <button id="confirmAddTaskBtn" class="btn btn-primary">إضافة المهمة</button>
            </div>
        </div>
    </div>
    
    <!-- Report templates can remain the same -->
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // SCRIPT_URL and other initial variables are the same
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwEGBntNxhizbx5LNfg1TUNQjoziY8qqJxos5sBLTjW1A1QEecWS5mUQVIdod1PKvT2wQ/exec';
    let currentView = 'tasks';
    let currentTaskData = null;
    let taskChartInstance = null;
    let branchChartInstance = null;

    const mainTitle = document.getElementById('mainTitle');
    const contentArea = document.getElementById('contentArea');
    const viewToggle = document.getElementById('viewToggle');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const downloadReportBtn = document.getElementById('downloadReportBtn');
    const addTaskModal = document.getElementById('addTaskModal');
    const confirmAddTaskBtn = document.getElementById('confirmAddTaskBtn');
    const cancelAddTaskBtn = document.getElementById('cancelAddTaskBtn');
    const newTaskNameInput = document.getElementById('newTaskNameInput');

    // API Function is robust and remains the same
    async function apiCall(action, method = 'GET', body = null) { /* ... same as before ... */ }

    // --- VIEW RENDERING ---
    function showLoader(message = 'جاري التحميل...') { /* ... same as before ... */ }

    function showTaskDashboardView(tasks) {
        contentArea.innerHTML = '';
        if (!tasks || tasks.length === 0) {
            contentArea.innerHTML = `<p class="message-container">لا توجد مهام حالياً. قم بإضافة مهمة جديدة.</p>`;
            return;
        }
        tasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(task => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.dataset.taskId = task.id;
            const completionColor = task.completion > 80 ? 'green' : task.completion > 40 ? 'orange' : 'red';
            item.style.borderColor = `var(--${completionColor})`;

            item.innerHTML = `
                <div class="task-item-header">
                    <h3 class="task-item-name">${task.name}</h3>
                    <span class="task-status-tag">${task.status}</span>
                </div>
                <div class="task-item-body">
                    <div class="progress-bar-container">
                        <div class="progress-label"><span>نسبة الإنجاز الكلية</span><span>${task.completion}%</span></div>
                        <div class="progress-bar-bg"><div class="progress-bar-fg completion-bar" style="width: ${task.completion}%;"></div></div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-label"><span>نسبة الإستجابة (للمطلوب)</span><span>${task.responsiveness}%</span></div>
                        <div class="progress-bar-bg"><div class="progress-bar-fg responsiveness-bar" style="width: ${task.responsiveness}%;"></div></div>
                    </div>
                </div>
                <div class="task-item-footer"><i class="fas fa-calendar-alt"></i> أنشئت في: ${new Date(task.createdAt).toLocaleDateString('ar-EG')}</div>
            `;
            contentArea.appendChild(item);
        });
    }

    function showBranchDashboardView(branches) {
        contentArea.innerHTML = '';
        if (!branches || branches.length === 0) {
            contentArea.innerHTML = `<p class="message-container">لم يتم العثور على فروع.</p>`;
            return;
        }
        branches.forEach(branch => {
            const item = document.createElement('div');
            item.className = 'branch-summary-item';
            item.dataset.branchId = branch.id;
            item.dataset.branchName = branch.name;
            item.innerHTML = `
                <h3 class="branch-item-name">${branch.name}</h3>
                <p class="branch-item-stats"><span>${branch.tasksCompleted}</span> من <span>${branch.totalActiveTasks}</span> مهام منجزة</p>
                <div class="progress-bar-bg" style="margin-top: 1rem;"><div class="progress-bar-fg completion-bar" style="width: ${branch.totalActiveTasks > 0 ? (branch.tasksCompleted / branch.totalActiveTasks) * 100 : 0}%;"></div></div>
            `;
            contentArea.appendChild(item);
        });
    }

    function showTaskDetailView(data) { /* ... same as before, no changes needed ... */ }

    // --- EVENT HANDLERS ---
    async function handleLoadDashboard() {
        showLoader();
        try {
            if (currentView === 'tasks') {
                const data = await apiCall('getTasks');
                showTaskDashboardView(data.tasks);
                addTaskBtn.classList.remove('hidden');
            } else {
                const data = await apiCall('getBranchSummary');
                showBranchDashboardView(data.branches);
                addTaskBtn.classList.add('hidden');
            }
        } catch (error) {
            contentArea.innerHTML = `<p class="message-container">حدث خطأ أثناء تحميل البيانات. الرجاء المحاولة مرة أخرى.</p>`;
        }
    }

    contentArea.addEventListener('click', (e) => {
        if (currentView === 'tasks') {
            const taskItem = e.target.closest('.task-item');
            if (taskItem) handleSelectTask(taskItem.dataset.taskId);
        } else {
            const branchItem = e.target.closest('.branch-summary-item');
            if (branchItem) handleSelectBranch(branchItem.dataset.branchId, branchItem.dataset.branchName);
        }
    });
    
    // All other handlers (handleSelectTask, handleStatusChange, generate reports, modal logic)
    // are robust and can be pasted from your previous working file.
    // For brevity, they are omitted here but are essential.

    viewToggle.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') {
            const selectedView = e.target.dataset.view;
            if (selectedView !== currentView) {
                currentView = selectedView;
                viewToggle.querySelector('.active').classList.remove('active');
                e.target.classList.add('active');
                handleLoadDashboard();
            }
        }
    });

    // Modal Logic
    addTaskBtn.addEventListener('click', () => addTaskModal.classList.remove('hidden'));
    cancelAddTaskBtn.addEventListener('click', () => addTaskModal.classList.add('hidden'));
    confirmAddTaskBtn.addEventListener('click', async () => {
        const taskName = newTaskNameInput.value.trim();
        if (!taskName) return alert('الرجاء إدخال اسم للمهمة.');
        confirmAddTaskBtn.disabled = true;
        await apiCall('createTask', 'POST', { taskName });
        confirmAddTaskBtn.disabled = false;
        addTaskModal.classList.add('hidden');
        newTaskNameInput.value = '';
        await handleLoadDashboard();
    });

    // Initial Load
    handleLoadDashboard();
});
</script>
</html>
