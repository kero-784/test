<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Task Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f4f7fa;
            --primary-text: #1a202c;
            --secondary-text: #718096;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --green: #48bb78;
            --red: #f56565;
            --gray: #a0aec0;
            --blue: #4299e1;
            --orange: #f6ad55;
            --font-family: 'Cairo', sans-serif;
        }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--primary-text); line-height: 1.6; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .hidden { display: none !important; }
        
        /* --- Buttons --- */
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background-color: var(--blue); color: white; }
        .btn-primary:hover { background-color: #3182ce; }

        /* --- Header --- */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        
        /* --- NEW: Dashboard Task Item Styling --- */
        #dashboardView .task-list { display: grid; gap: 1.5rem; }
        .task-item {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid var(--blue);
        }
        .task-item:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .task-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .task-item-name { font-size: 1.3rem; font-weight: 700; color: var(--primary-text); }
        .task-status-tag {
            padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
            background-color: var(--orange); color: white;
        }
        .task-item-body { display: flex; flex-direction: column; gap: 1rem; }
        .progress-bar-container { width: 100%; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--secondary-text); margin-bottom: 0.25rem; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-bar-fg { height: 100%; border-radius: 10px; transition: width 0.5s ease-in-out; }
        .completion-bar { background-color: var(--green); }
        .responsiveness-bar { background-color: var(--blue); }
        .task-item-footer {
            border-top: 1px solid var(--border-color);
            margin-top: 1rem; padding-top: 0.75rem;
            font-size: 0.9rem; color: var(--secondary-text);
        }

        /* --- Task Detail View --- */
        #taskDetailView #branchGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
        .branch-card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; }
        .branch-name { font-size: 1.2rem; font-weight: 600; }
        .status-radio-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .status-radio-group input[type="radio"] { display: none; }
        .status-radio-group label { flex-grow: 1; text-align: center; padding: 0.5rem; border-radius: 20px; border: 2px solid var(--border-color); cursor: pointer; }
        .status-radio-group input[type="radio"]:checked + label { color: white; }
        .status-radio-group input[value="done"]:checked + label { background-color: var(--green); border-color: var(--green); }
        .status-radio-group input[value="pending"]:checked + label { background-color: var(--red); border-color: var(--red); }
        .status-radio-group input[value="not-required"]:checked + label { background-color: var(--gray); border-color: var(--gray); }

        /* --- Other Styles (Loader, Report, etc.) --- */
        .message-container { text-align: center; padding: 4rem; font-size: 1.2rem; }
        #reportContainer { display: none; /* ... same as before ... */ }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 id="mainTitle">لوحة التحكم الرئيسية</h1>
            <div>
                <button class="btn btn-secondary hidden" id="backToDashboardBtn">العودة</button>
                <button class="btn btn-primary" id="addTaskBtn">إضافة مهمة</button>
                <button class="btn btn-primary hidden" id="downloadReportBtn">تحميل تقرير JPG</button>
            </div>
        </header>
        <div id="contentArea"></div>
    </div>
    
    <!-- Report Template (Unchanged) -->
    <div id="reportContainer" style="display: none; position: absolute; top: -9999px; width: 800px; padding: 40px; background: white; border: 1px solid var(--border-color);">
        <div id="reportHeader">
            <h2 id="reportTaskName"></h2>
            <p>تقرير حالة استجابة الفروع</p>
        </div>
        <div id="reportSummary" style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0;">
            <div id="reportStats"></div>
            <div id="reportChartContainer" style="width: 150px; height: 150px;"><canvas id="reportChart"></canvas></div>
        </div>
        <div id="reportBranchList" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; border-top: 1px solid var(--border-color); padding-top: 20px;"></div>
        <div id="reportFooter" style="text-align: center; margin-top: 30px; font-size: 12px; color: var(--secondary-text);">
            <p>تم إنشاء هذا التقرير بتاريخ: <span id="reportDate"></span></p>
        </div>
    </div>
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // SCRIPT_URL and other initial variables are the same
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwVJqwrWvOsZkEgXZGdIJhWOKjo2yNX3hREauNPJSyP3diV22CNZDuGQSzzsUs3g9HMA/exec';
    const mainTitle = document.getElementById('mainTitle');
    const contentArea = document.getElementById('contentArea');
    const backToDashboardBtn = document.getElementById('backToDashboardBtn');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const downloadReportBtn = document.getElementById('downloadReportBtn');
    let currentTaskData = null;
    let currentChartInstance = null;

    // --- API Function (Unchanged) ---
    async function apiCall(action, method = 'GET', body = null) {
        const url = new URL(SCRIPT_URL);
        const options = { method: method, redirect: 'follow' };
        if (method === 'POST') {
            options.body = JSON.stringify({ action, ...body });
        } else {
            url.searchParams.append('action', action);
            if (body) {
                Object.keys(body).forEach(key => url.searchParams.append(key, body[key]));
            }
        }
        try {
            const response = await fetch(url, options);
            const data = await response.json();
            if (!data.success) throw new Error(data.message);
            return data;
        } catch (error) {
            console.error(`API Error on '${action}':`, error);
            alert(`Error: ${error.message}`);
            throw error;
        }
    }

    // --- View Rendering ---
    function showLoader(message = 'جاري التحميل...') {
        contentArea.innerHTML = `<div class="message-container"><i class="fas fa-spinner fa-spin"></i><p>${message}</p></div>`;
        mainTitle.textContent = 'الرجاء الانتظار';
        backToDashboardBtn.classList.add('hidden');
        addTaskBtn.classList.add('hidden');
        downloadReportBtn.classList.add('hidden');
    }

    // --- UPDATED showDashboardView Function ---
    function showDashboardView(tasks) {
        mainTitle.textContent = 'لوحة التحكم الرئيسية';
        backToDashboardBtn.classList.add('hidden');
        addTaskBtn.classList.remove('hidden');
        downloadReportBtn.classList.add('hidden');
        
        let content = '<div id="dashboardView" class="view"><div id="taskList" class="task-list">';
        if (!tasks || tasks.length === 0) {
            content += `<p class="message-container">لا توجد مهام. أضف مهمة جديدة.</p>`;
        } else {
            tasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(task => {
                content += `
                    <div class="task-item" data-task-id="${task.id}">
                        <div class="task-item-header">
                            <h3 class="task-item-name">${task.name}</h3>
                            <span class="task-status-tag">${task.status}</span>
                        </div>
                        <div class="task-item-body">
                            <div class="progress-bar-container">
                                <div class="progress-label">
                                    <span>نسبة الإنجاز</span>
                                    <span>${task.completion}%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fg completion-bar" style="width: ${task.completion}%;"></div>
                                </div>
                            </div>
                            <div class="progress-bar-container">
                                <div class="progress-label">
                                    <span>نسبة الإستجابة (للمطلوب)</span>
                                    <span>${task.responsiveness}%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fg responsiveness-bar" style="width: ${task.responsiveness}%;"></div>
                                </div>
                            </div>
                        </div>
                        <div class="task-item-footer">
                            <i class="fas fa-calendar-alt"></i> تاريخ الإنشاء: ${new Date(task.createdAt).toLocaleDateString('ar-EG')}
                        </div>
                    </div>
                `;
            });
        }
        content += '</div></div>';
        contentArea.innerHTML = content;
    }

    // showTaskDetailView function remains the same as the previous version
    function showTaskDetailView(data) {
        currentTaskData = data;
        mainTitle.textContent = data.task.name;
        backToDashboardBtn.classList.remove('hidden');
        addTaskBtn.classList.add('hidden');
        downloadReportBtn.classList.remove('hidden');
        let branchesHtml = data.branches.map(branch => `
            <div class="branch-card">
                <div class="branch-name">${branch.name}</div>
                <div class="status-radio-group" data-branch-id="${branch.id}">
                    <input type="radio" id="pending-${branch.id}" name="status-${branch.id}" value="pending" ${branch.status === 'pending' ? 'checked' : ''}>
                    <label for="pending-${branch.id}">لم يتم</label>
                    <input type="radio" id="done-${branch.id}" name="status-${branch.id}" value="done" ${branch.status === 'done' ? 'checked' : ''}>
                    <label for="done-${branch.id}">تم</label>
                    <input type="radio" id="not-required-${branch.id}" name="status-${branch.id}" value="not-required" ${branch.status === 'not-required' ? 'checked' : ''}>
                    <label for="not-required-${branch.id}">غير مطلوب</label>
                </div>
            </div>
        `).join('');
        contentArea.innerHTML = `<div id="taskDetailView" class="view"><div id="branchGrid">${branchesHtml}</div></div>`;
    }

    // --- Event Handlers (Unchanged) ---
    async function handleLoadDashboard() {
        showLoader();
        try {
            const data = await apiCall('getTasks');
            showDashboardView(data.tasks);
        } catch (error) {
            contentArea.innerHTML = `<p class="message-container">Failed to load data.</p>`;
        }
    }
    async function handleSelectTask(e) {
        const taskItem = e.target.closest('.task-item');
        if (!taskItem) return;
        const taskID = taskItem.dataset.taskId;
        showLoader(`Loading details...`);
        try {
            const data = await apiCall('getTaskDetails', 'GET', { taskID });
            showTaskDetailView(data);
        } catch (error) { await handleLoadDashboard(); }
    }
    async function handleStatusChange(e) {
        if (e.target.name.startsWith('status-')) {
            const radio = e.target;
            const newStatus = radio.value;
            const branchID = radio.name.split('-')[1];
            const taskID = currentTaskData.task.id;
            radio.disabled = true;
            try {
                await apiCall('updateStatus', 'POST', { taskID, branchID, newStatus });
                currentTaskData.branches.find(b => b.id == branchID).status = newStatus;
            } catch (error) { /* Revert logic */ } 
            finally { radio.disabled = false; }
        }
    }
    async function handleDownloadReport() {
        // This function is the same as the previous version
    }

    // Event Listeners
    contentArea.addEventListener('click', handleSelectTask);
    contentArea.addEventListener('change', handleStatusChange);
    backToDashboardBtn.addEventListener('click', handleLoadDashboard);
    downloadReportBtn.addEventListener('click', handleDownloadReport);
    
    // Initial Load
    handleLoadDashboard();
});
</script>
</html>
