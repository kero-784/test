<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Follow Up</title>
    <!-- Fonts, Icons, and Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8; --primary-text: #2c3e50; --secondary-text: #5a6b82; /* Darker secondary text */
            --card-bg: #ffffff; --border-color: #e2e8f0; --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
            --green: #10B981; --red: #EF4444; --gray: #6B7280; --blue: #3B82F6; --orange: #F97316;
            --purple: #8B5CF6; --yellow: #F59E0B;
            --font-family: 'Tajawal', sans-serif; --border-radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--primary-text); line-height: 1.7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }
        .hidden { display: none !important; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 0.75rem; }
        .btn-primary { background: linear-gradient(45deg, var(--blue), #60A5FA); color: white; box-shadow: 0 4px 15px -5px var(--blue); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 20px -5px var(--blue); }
        .btn-secondary { background-color: var(--card-bg); color: var(--blue); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #f8fafc; border-color: var(--blue); }
        .btn-danger { background-color: var(--red); color: white; }
        .btn:disabled { background-color: var(--gray); color: white; cursor: not-allowed; box-shadow: none; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; }
        .header-title { flex-grow: 1; }
        .header-title h1 { display: flex; align-items: center; gap: 1rem; }
        .header-title .back-btn { background: none; border: none; font-size: 1.5rem; color: var(--secondary-text); cursor: pointer; transition: color 0.2s; }
        .header-title .back-btn:hover { color: var(--blue); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); height: 0; padding: 0; margin: 0; border: none; } }
        
        .section-item, .task-item { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); transition: all 0.3s ease; overflow: hidden; display: flex; flex-direction: column; }
        .section-item { border-left: 6px solid var(--purple); }
        .section-item:hover, .task-item:hover { transform: translateY(-5px); box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1); }
        .item-actions { padding: 0.5rem 1rem 0; text-align: left; }
        .delete-btn { background: none; border: none; color: var(--secondary-text); cursor: pointer; font-size: 1rem; padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; transition: all 0.2s ease; }
        .delete-btn:hover { background-color: #FEE2E2; color: var(--red); }
        
        .section-item-clickable { padding: 0 1.5rem 1.5rem; cursor: pointer; flex-grow: 1; }
        .section-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .section-item-name { font-size: 1.25rem; font-weight: 700; }
        .section-item-stats { font-size: 0.9rem; color: var(--secondary-text); }
        
        .task-item.status-Closed, .task-item.status-ClosedForAssessment { opacity: 0.7; background: #fafafa; }
        .task-item.status-Closed .task-item-name::after, .task-item.status-ClosedForAssessment .task-item-name::after { content: '(مغلقة)'; font-size: 0.9rem; color: var(--red); margin-right: 8px; }
        .task-item-clickable { padding: 0 1.5rem 1.5rem; cursor: pointer; flex-grow: 1; }
        .task-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .task-item-name { font-size: 1.25rem; font-weight: 700; }
        .task-type-icon { font-size: 1rem; color: var(--secondary-text); }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; color: var(--secondary-text); margin-bottom: 0.5rem; }
        .progress-bar-bg { width: 100%; background-color: var(--bg-color); border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fg { height: 100%; border-radius: 10px; background-color: var(--green); }
        .task-item-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--border-color); font-size: 0.9rem; color: var(--secondary-text); display: flex; justify-content: space-between; }
        
        #taskDetailView .task-meta { color: var(--secondary-text); margin-bottom: 1.5rem; }
        .branch-card { background: var(--card-bg); border-radius: var(--border-radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .status-radio-group { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .status-radio-group input[type="radio"] { display: none; }
        /* == FONT COLOR FIX == */
        .status-radio-group label { flex-grow: 1; text-align: center; padding: 0.7rem; border-radius: 10px; border: 2px solid var(--border-color); cursor: pointer; font-weight: 700; /* Bolder font */ color: var(--secondary-text); /* Darker default color */ transition: all 0.2s ease; }
        .status-radio-group input[type="radio"]:checked + label { color: white; border-width: 2px; transform: translateY(-2px); }
        .status-radio-group input[value="done"]:checked + label, .status-radio-group input[value="late-done"]:checked + label { background-color: var(--green); border-color: var(--green); box-shadow: 0 4px 10px -4px var(--green); }
        .status-radio-group input[value="pending"]:checked + label { background-color: var(--red); border-color: var(--red); box-shadow: 0 4px 10px -4px var(--red); }
        .status-radio-group input[value="not-required"]:checked + label { background-color: var(--gray); border-color: var(--gray); box-shadow: 0 4px 10px -4px var(--gray); }
        .late-done-label::after { content: ' (متأخر)'; font-size: 0.75rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s; }
        .modal-content { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.3); padding: 2.5rem; border-radius: var(--border-radius); width: 90%; max-width: 600px; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.2); }
        .modal-content h2 { margin-bottom: 1.5rem; }
        .modal-content input[type="text"], .modal-content input[type="datetime-local"], .modal-content input[type="date"] { width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color); font-family: var(--font-family); font-size: 1rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.8); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 0.5rem; }
        .branch-selection-container { max-height: 200px; overflow-y: auto; background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color); }
        .branch-checkbox-item { display: block; margin-bottom: 0.75rem; }
        .branch-checkbox-item input { margin-left: 10px; }
        #reportPreviewModal .modal-content { max-width: 900px; padding: 1rem; }
        #reportPreviewImage { width: 100%; height: auto; border-radius: var(--border-radius); box-shadow: var(--shadow); }
        
        .message-container { text-align: center; padding: 5rem 2rem; font-size: 1.2rem; color: var(--secondary-text); }
        .fa-spinner { font-size: 2.5rem; margin-bottom: 1rem; }
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .notification { padding: 1rem 1.5rem; border-radius: 12px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 1rem; opacity: 0; transform: translateX(100%); animation: slideInAndOut 5s forwards; }
        .notification.error { background: linear-gradient(45deg, var(--red), #F87171); } .notification.success { background: linear-gradient(45deg, var(--green), #34D399); }
        @keyframes slideInAndOut { 0%, 100% { opacity: 0; transform: translateX(100%); } 10%, 90% { opacity: 1; transform: translateX(0); } }
        #debug-console { position: fixed; bottom: 20px; left: 20px; width: 450px; height: 300px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); color: white; border-radius: var(--border-radius); box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1999; display: flex; flex-direction: column; font-size: 14px; }
        .debug-header { padding: 0.75rem 1rem; background: rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; cursor: move; }
        #close-debug { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .debug-log-area { flex-grow: 1; padding: 1rem; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
        .debug-log-area p { margin-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .log-INFO { color: #BFDBFE; } .log-SUCCESS { color: #A7F3D0; } .log-ERROR { color: #FECACA; font-weight: bold; }
        .log-DATA { color: #FED7AA; white-space: pre-wrap; word-break: break-all; font-size: 0.75rem; }
        .log-EVENT { color: #FBCFE8; }
        
        .report-template-container { width: 800px; padding: 0; background: white; font-family: var(--font-family); color: var(--primary-text); border: 1px solid var(--border-color); }
        .report-header-bg { padding: 30px 40px; background-color: #f8fafc; border-bottom: 1px solid var(--border-color); text-align: center; }
        .report-header-bg h2 { font-size: 28px; margin: 0; }
        .report-header-bg p { font-size: 16px; color: var(--secondary-text); margin: 5px 0 0; }
        .report-body { padding: 30px 40px; }
        .report-kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .report-stat-card { background-color: #f8fafc; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border-color); }
        .report-stat-card .stat-value { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .report-stat-card .stat-label { font-size: 1rem; color: var(--secondary-text); }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 12px 15px; text-align: right; border-bottom: 1px solid var(--border-color); }
        .report-table th { background-color: #f8fafc; font-size: 0.9rem; color: var(--secondary-text); text-transform: uppercase; }
        .report-table tbody tr:nth-child(even) { background-color: #f8fafc; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; color: white; display: inline-block; }
        .status-badge-done { background-color: var(--green); } .status-badge-pending { background-color: var(--red); }
        .status-badge-not-required { background-color: var(--gray); } .status-badge-late-done { background-color: var(--orange); }
        .report-footer { padding: 20px 40px; text-align: center; background-color: #f8fafc; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--secondary-text); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header"><div id="headerTitle" class="header-title"></div><div id="headerActions"></div></header>
        <div id="contentArea" class="grid-container"></div>
    </div>
    <!-- Modals -->
    <div id="sectionModal" class="modal-overlay hidden"><div class="modal-content"><h2>إنشاء قسم جديد</h2><input type="text" id="sectionNameInput" placeholder="اكتب اسم القسم هنا..."><div class="modal-actions"><button id="cancelAddSectionBtn" class="btn btn-secondary">إلغاء</button><button id="confirmAddSectionBtn" class="btn btn-primary">إضافة القسم</button></div></div></div>
    <div id="addTaskModal" class="modal-overlay hidden"><div class="modal-content"><h2>إنشاء مهمة جديدة</h2><div class="form-group"><label for="newTaskNameInput">اسم المهمة</label><input type="text" id="newTaskNameInput" placeholder="اكتب اسم المهمة هنا..."></div><div class="form-group"><label>نوع المهمة</label><div class="status-radio-group"><input type="radio" id="taskTypeStandard" name="taskType" value="Standard" checked><label for="taskTypeStandard">قياسية</label><input type="radio" id="taskTypeTimeLimited" name="taskType" value="TimeLimited"><label for="taskTypeTimeLimited">محددة بوقت</label></div></div><div id="timeLimitedFields" class="form-group hidden" style="display: flex; gap: 1rem;"><div style="flex: 1;"><label for="taskStartDateInput">وقت البدء</label><input type="datetime-local" id="taskStartDateInput"></div><div style="flex: 1;"><label for="taskEndDateInput">وقت الإنتهاء</label><input type="datetime-local" id="taskEndDateInput"></div></div><div class="form-group"><label>الفروع المستهدفة</label><div id="branchSelectionContainer" class="branch-selection-container"></div></div><div class="modal-actions"><button id="cancelAddTaskBtn" class="btn btn-secondary">إلغاء</button><button id="confirmAddTaskBtn" class="btn btn-primary">إضافة المهمة</button></div></div></div>
    <div id="dateRangeModal" class="modal-overlay hidden"><div class="modal-content"><h2>تحديد فترة التقرير</h2><div style="display: flex; gap: 1rem;"><div class="form-group" style="flex: 1;"><label for="reportStartDate">من تاريخ</label><input type="date" id="reportStartDate"></div><div class="form-group" style="flex: 1;"><label for="reportEndDate">إلى تاريخ</label><input type="date" id="reportEndDate"></div></div><div class="modal-actions"><button id="cancelDateRangeBtn" class="btn btn-secondary">إلغاء</button><button id="generateSectionReportBtn" class="btn btn-primary">إنشاء التقرير</button></div></div></div>
    <div id="reportPreviewModal" class="modal-overlay hidden"><div class="modal-content"><img id="reportPreviewImage" src="" alt="Report Preview"><div class="modal-actions" style="margin-top: 1.5rem;"><button id="closeReportPreviewBtn" class="btn btn-secondary">إغلاق</button><button id="downloadReportImageBtn" class="btn btn-primary"><i class="fas fa-download"></i> تحميل</button></div></div></div>
    <div id="notification-container"></div>
    <div id="debug-console" class="hidden"><div class="debug-header"><h3><i class="fas fa-bug"></i> Debug Console</h3><button id="close-debug">×</button></div><div class="debug-log-area" id="debug-log-area"></div></div>
    <div id="reportTemplateWrapper" class="hidden" style="position: absolute; left: -9999px; top: -9999px;"><div id="reportTemplateContainer" class="report-template-container"><div class="report-header-bg"><h2 id="report-title"></h2><p id="report-subtitle"></p></div><div class="report-body"><div id="report-kpi-grid" class="report-kpi-grid"></div><div id="report-table-container"><table class="report-table"><thead id="report-table-head"></thead><tbody id="report-table-body"></tbody></table></div></div><div class="report-footer"><p>تم إنشاء هذا التقرير بتاريخ: <span id="report-date"></span></p></div></div></div>
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwl1bzURuoyLksDCuwKZYuMrSKjjRvljEgcoTgNokMzxY5Op491RQl-mr0SfxJha8eF4w/exec'; // <-- IMPORTANT: REPLACE WITH YOUR URL
    const isDebugMode = new URLSearchParams(window.location.search).get('debug') === 'true';

    const contentArea = document.getElementById('contentArea'), headerTitle = document.getElementById('headerTitle'), headerActions = document.getElementById('headerActions'), notificationContainer = document.getElementById('notification-container'), debugConsole = document.getElementById('debug-console'), debugLogArea = document.getElementById('debug-log-area');
    const sectionModal = document.getElementById('sectionModal'), addTaskModal = document.getElementById('addTaskModal'), dateRangeModal = document.getElementById('dateRangeModal'), reportPreviewModal = document.getElementById('reportPreviewModal');

    let state = { view: 'sections', currentSection: null, currentTask: null, allBranches: [], reportImageData: null, reportFileName: 'report.jpg' };
    
    function logToConsole(message, level = 'INFO', data = null) { if (!isDebugMode) return; const p = document.createElement('p'); p.className = `log-${level}`; const timestamp = new Date().toLocaleTimeString(); p.innerHTML = `<strong>[${timestamp}] ${level}:</strong> ${message}`; if (data) { const pre = document.createElement('pre'); pre.className = 'log-DATA'; pre.textContent = JSON.stringify(data, null, 2); p.appendChild(pre); } debugLogArea.appendChild(p); debugLogArea.scrollTop = debugLogArea.scrollHeight; }
    function showNotification(message, isError = true) { const n = document.createElement('div'); n.className = `notification ${isError ? 'error' : 'success'}`; n.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i><span>${message}</span>`; notificationContainer.appendChild(n); setTimeout(() => n.remove(), 5000); }
    async function apiCall(action, method = 'GET', body = null) { logToConsole(`API Call: ${action}`, 'INFO', body); const url = new URL(SCRIPT_URL); const options = { method, redirect: 'follow', muteHttpExceptions: true }; if (method === 'POST') { options.body = JSON.stringify({ action, ...body }); } else { url.searchParams.append('action', action); if (body) Object.keys(body).forEach(key => url.searchParams.append(key, body[key])); } try { const response = await fetch(url, options); if (!response.ok) throw new Error(`Network error: ${response.statusText}`); const data = await response.json(); if (!data.success) throw new Error(data.message || 'Unknown API error'); logToConsole(`API Success: ${action}`, 'SUCCESS', data); return data; } catch (error) { logToConsole(`API Error: ${action}`, 'ERROR', { message: error.message }); showNotification(error.message, true); throw error; } }
    
    // == FRONTEND OPTIMIZATION: PRE-FETCH BRANCHES ==
    async function navigate(view, data = {}) {
        logToConsole('Navigating', 'EVENT', { view, data });
        state.view = view;
        if (view === 'tasks') {
            state.currentSection = data.section; state.currentTask = null;
            // Pre-fetch branches when entering a section view
            if (state.allBranches.length === 0) {
                try {
                    const branchData = await apiCall('getBranches');
                    state.allBranches = branchData.branches;
                    logToConsole('Branches pre-fetched and cached on frontend.', 'SUCCESS');
                } catch (error) {
                    showNotification('Warning: Could not pre-fetch branch list.', true);
                }
            }
        } else if (view === 'taskDetail') {
            state.currentTask = data.task;
        } else {
            state.currentSection = null; state.currentTask = null;
        }
        render();
    }

    function showLoader(message = 'جاري التحميل...') { contentArea.innerHTML = `<div class="message-container"><i class="fas fa-spinner fa-spin"></i><p>${message}</p></div>`; }
    function render() { showLoader(); updateHeader(); contentArea.classList.add('grid-container'); if (state.view === 'sections') handleLoadSections(); else if (state.view === 'tasks') handleLoadTasks(state.currentSection.id); else if (state.view === 'taskDetail') handleLoadTaskDetails(state.currentTask.id); }

    function updateHeader() {
        headerTitle.innerHTML = ''; headerActions.innerHTML = '';
        if (state.view === 'sections') {
            headerTitle.innerHTML = '<h1>الأقسام</h1>';
            headerActions.innerHTML = `<button id="addSectionBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة قسم</button>`;
            document.getElementById('addSectionBtn').addEventListener('click', openSectionModal);
        } else if (state.view === 'tasks') {
            headerTitle.innerHTML = `<h1><button class="back-btn"><i class="fas fa-arrow-right"></i></button> ${state.currentSection.name}</h1>`;
            headerActions.innerHTML = `<button id="addTaskBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة مهمة</button><button id="sectionReportBtn" class="btn btn-secondary"><i class="fas fa-file-alt"></i> تقرير القسم</button>`;
            headerTitle.querySelector('.back-btn').addEventListener('click', () => navigate('sections'));
            document.getElementById('addTaskBtn').addEventListener('click', openAddTaskModal);
            document.getElementById('sectionReportBtn').addEventListener('click', openDateRangeModal);
        } else if (state.view === 'taskDetail') {
            headerTitle.innerHTML = `<h1><button class="back-btn"><i class="fas fa-arrow-right"></i></button> ${state.currentTask.name}</h1>`;
            let closeBtnHtml = state.currentTask.type === 'Standard' && state.currentTask.status === 'Open' ? `<button id="closeTaskBtn" class="btn btn-danger"><i class="fas fa-lock"></i> إغلاق المهمة</button>` : '';
            headerActions.innerHTML = `${closeBtnHtml}<button id="taskReportBtn" class="btn btn-secondary"><i class="fas fa-download"></i> تقرير المهمة</button>`;
            headerTitle.querySelector('.back-btn').addEventListener('click', () => navigate('tasks', { section: state.currentSection }));
            if (document.getElementById('closeTaskBtn')) document.getElementById('closeTaskBtn').addEventListener('click', handleCloseTask);
            document.getElementById('taskReportBtn').addEventListener('click', () => generateAndShowReport('task', { taskId: state.currentTask.id }));
        }
    }
    
    function renderSections(sections) { if (!sections || sections.length === 0) { contentArea.innerHTML = `<p class="message-container">لا توجد أقسام. قم بإضافة قسم جديد.</p>`; return; } contentArea.innerHTML = ''; sections.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(s => { const i = document.createElement('div'); i.className = 'section-item'; i.dataset.sectionId = s.id; i.innerHTML = `<div class="item-actions"><button class="delete-btn" title="حذف القسم"><i class="fas fa-trash-alt"></i></button></div><div class="section-item-clickable" data-section-name="${s.name}"><div class="section-item-header"><h3 class="section-item-name">${s.name}</h3></div><p class="section-item-stats">عدد المهام: ${s.taskCount}</p></div>`; contentArea.appendChild(i); }); }
    function renderTasks(tasks) { if (!tasks || tasks.length === 0) { contentArea.innerHTML = `<p class="message-container">لا توجد مهام في هذا القسم.</p>`; return; } contentArea.innerHTML = ''; tasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(t => { const i = document.createElement('div'); i.className = `task-item status-${t.status}`; i.dataset.taskId = t.id; const c = t.completion > 80 ? 'green' : t.completion > 40 ? 'orange' : 'red'; i.style.borderColor = `var(--${c})`; const icn = t.type === 'TimeLimited' ? '<i class="fas fa-clock task-type-icon" title="مهمة محددة بوقت"></i>' : '<i class="fas fa-check-double task-type-icon" title="مهمة قياسية"></i>'; const d = t.type === 'TimeLimited' && t.endDate ? `<i class="fas fa-hourglass-end"></i> تنتهي في: ${new Date(t.endDate).toLocaleString('ar-EG')}` : `<i class="fas fa-calendar-alt"></i> أنشئت في: ${new Date(t.createdAt).toLocaleDateString('ar-EG')}`; i.innerHTML = `<div class="item-actions"><button class="delete-btn" title="حذف المهمة"><i class="fas fa-trash-alt"></i></button></div><div class="task-item-clickable" data-task-json='${JSON.stringify(t)}'><div class="task-item-header"><h3 class="task-item-name">${t.name}</h3>${icn}</div><div class="progress-bar-container"><div class="progress-label"><span>نسبة الإنجاز</span><span>${t.completion}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fg" style="width: ${t.completion}%;"></div></div></div><div class="task-item-footer">${d}</div></div>`; contentArea.appendChild(i); }); }
    function renderTaskDetail(data) { contentArea.classList.remove('grid-container'); state.currentTask.status = data.task.status; updateHeader(); let meta = `نوع المهمة: ${data.task.type === 'TimeLimited' ? 'محددة بوقت' : 'قياسية'}`; if (data.task.type === 'TimeLimited' && data.task.endDate) meta += ` | تنتهي في: ${new Date(data.task.endDate).toLocaleString('ar-EG')}`; if (data.task.status !== 'Open') meta += ` | <span style="color:var(--red); font-weight:bold;">الحالة: مغلقة</span>`; contentArea.innerHTML = `<div id="taskDetailView" class="view"><p class="task-meta">${meta}</p><div class="grid-container" id="branchGrid"></div></div>`; const branchGrid = document.getElementById('branchGrid'); if (!data.branches || data.branches.length === 0) { branchGrid.innerHTML = `<p class="message-container">لم يتم تحديد فروع لهذه المهمة.</p>`; return; } const isTaskClosed = data.task.status !== 'Open'; data.branches.forEach(b => { const card = document.createElement('div'); card.className = 'branch-card'; const doneLabel = b.status === 'late-done' ? 'تم (متأخر)' : 'تم'; const disabledAttr = isTaskClosed ? 'disabled' : ''; card.innerHTML = `<div class="branch-name">${b.name}</div><div class="status-radio-group" data-branch-id="${b.id}"><input type="radio" id="pending-${b.id}" name="status-${b.id}" value="pending" ${b.status === 'pending' ? 'checked' : ''} ${disabledAttr}><label for="pending-${b.id}">لم يتم</label><input type="radio" id="done-${b.id}" name="status-${b.id}" value="done" ${b.status === 'done' || b.status === 'late-done' ? 'checked' : ''} ${disabledAttr}><label for="done-${b.id}" class="${b.status === 'late-done' ? 'late-done-label': ''}">${doneLabel}</label><input type="radio" id="not-required-${b.id}" name="status-${b.id}" value="not-required" ${b.status === 'not-required' ? 'checked' : ''} ${disabledAttr}><label for="not-required-${b.id}">غير مطلوب</label></div>`; branchGrid.appendChild(card); }); }

    async function handleLoadSections() { try { const data = await apiCall('getSections'); renderSections(data.sections); } catch (error) { contentArea.innerHTML = `<p class="message-container">فشل تحميل الأقسام. يرجى إعادة تحميل الصفحة.</p>`; } }
    async function handleLoadTasks(sectionId) { try { const data = await apiCall('getTasksForSection', 'GET', { sectionID: sectionId }); renderTasks(data.tasks); } catch (error) { contentArea.innerHTML = `<p class="message-container">فشل تحميل المهام. يرجى المحاولة مرة أخرى.</p>`; } }
    async function handleLoadTaskDetails(taskId) { contentArea.classList.remove('grid-container'); showLoader(`جاري تحميل تفاصيل المهمة...`); try { const data = await apiCall('getTaskDetails', 'GET', { taskID: taskId }); state.currentTask = { ...state.currentTask, ...data.task }; renderTaskDetail(data); } catch (error) { navigate('tasks', { section: state.currentSection }); } }
    async function handleStatusChange(e) { if (e.target.name.startsWith('status-')) { const r = e.target, n = r.value, b = r.closest('.status-radio-group').dataset.branchId, t = state.currentTask.id, g = r.closest('.status-radio-group'); Array.from(g.querySelectorAll('input')).forEach(i => i.disabled = true); try { const res = await apiCall('updateStatus', 'POST', { taskID: t, branchID: b, newStatus: n }); if(res.actualStatus === 'late-done') { const l = g.querySelector(`label[for="done-${b}"]`); l.textContent = 'تم (متأخر)'; l.classList.add('late-done-label'); } } catch (error) { handleLoadTaskDetails(t); } finally { Array.from(g.querySelectorAll('input')).forEach(i => i.disabled = false); } } }
    async function handleDelete(e) { const d = e.target.closest('.delete-btn'); if (!d) return; e.stopPropagation(); const s = e.target.closest('.section-item'), t = e.target.closest('.task-item'); if (s) { if (confirm(`هل أنت متأكد من حذف هذا القسم؟ سيتم حذف جميع المهام بداخله بشكل نهائي.`)) { try { await apiCall('deleteSection', 'POST', { sectionID: s.dataset.sectionId }); showNotification('تم حذف القسم بنجاح.', false); s.style.animation = 'fadeOut 0.5s forwards'; setTimeout(() => s.remove(), 500); } catch(error) {} } } else if (t) { if (confirm('هل أنت متأكد من حذف هذه المهمة؟ لا يمكن التراجع عن هذا الإجراء.')) { try { await apiCall('deleteTask', 'POST', { taskID: t.dataset.taskId }); showNotification('تم حذف المهمة بنجاح.', false); t.style.animation = 'fadeOut 0.5s forwards'; setTimeout(() => t.remove(), 500); } catch(error) {} } } }
    async function handleCloseTask() { if(!state.currentTask || !state.currentTask.id) return; if (confirm('هل أنت متأكد من إغلاق هذه المهمة؟ لن تتمكن من تعديل حالات الفروع بعد الإغلاق.')) { try { await apiCall('updateTaskStatus', 'POST', { taskID: state.currentTask.id, newStatus: 'Closed' }); showNotification('تم إغلاق المهمة بنجاح.', false); render(); } catch(error) {} } }
    
    async function generateAndShowReport(type, options) { showLoader('جاري إنشاء التقرير...'); logToConsole('Generating report', 'EVENT', { type, options }); try { const data = type === 'task' ? await apiCall('getTaskDetails', 'GET', { taskID: options.taskId }) : await apiCall('getSectionReportDetails', 'GET', { sectionID: options.sectionId, startDate: options.startDate, endDate: options.endDate }); const t = document.getElementById('reportTemplateContainer'), st = {done: 'تم', 'late-done': 'تم (متأخر)', pending: 'لم يتم', 'not-required': 'غير مطلوب'}, sc = {done: 'status-badge-done', 'late-done': 'status-badge-late-done', pending: 'status-badge-pending', 'not-required': 'status-badge-not-required'}; t.querySelector('#report-kpi-grid').innerHTML = ''; t.querySelector('#report-table-head').innerHTML = ''; t.querySelector('#report-table-body').innerHTML = ''; if (type === 'task') { const { task, branches } = data; state.reportFileName = `Task_Report_${task.name.replace(/\s/g, '_')}.jpg`; t.querySelector('#report-title').textContent = `تقرير مهمة: ${task.name}`; t.querySelector('#report-subtitle').textContent = `حالة استجابة الفروع`; const d = branches.filter(b => b.status === 'done' || b.status === 'late-done').length, p = branches.filter(b => b.status === 'pending').length, nr = branches.filter(b => b.status === 'not-required').length; t.querySelector('#report-kpi-grid').innerHTML = `<div class="report-stat-card"><div class="stat-value" style="color: var(--green);">${d}</div><div class="stat-label">تم التنفيذ</div></div><div class="report-stat-card"><div class="stat-value" style="color: var(--red);">${p}</div><div class="stat-label">لم يتم</div></div><div class="report-stat-card"><div class="stat-value" style="color: var(--gray);">${nr}</div><div class="stat-label">غير مطلوب</div></div><div class="report-stat-card"><div class="stat-value" style="color: var(--blue);">${branches.length}</div><div class="stat-label">إجمالي الفروع</div></div>`; t.querySelector('#report-table-head').innerHTML = `<tr><th>الفرع</th><th>الحالة</th></tr>`; t.querySelector('#report-table-body').innerHTML = branches.map(b => `<tr><td>${b.name}</td><td><span class="status-badge ${sc[b.status]}">${st[b.status]}</span></td></tr>`).join(''); } else { const { section, report } = data; state.reportFileName = `Section_Report_${section.name.replace(/\s/g, '_')}.jpg`; t.querySelector('#report-title').textContent = `تقرير قسم: ${section.name}`; t.querySelector('#report-subtitle').textContent = `للفترة من ${new Date(options.startDate).toLocaleDateString('ar-EG')} إلى ${new Date(options.endDate).toLocaleDateString('ar-EG')}`; t.querySelector('#report-kpi-grid').innerHTML = `<div class="report-stat-card"><div class="stat-value" style="color: var(--purple);">${report.overall.totalTasks}</div><div class="stat-label">إجمالي المهام</div></div><div class="report-stat-card"><div class="stat-value" style="color: var(--green);">${report.overall.done + report.overall.lateDone}</div><div class="stat-label">مهام منفذة</div></div><div class="report-stat-card"><div class="stat-value" style="color: var(--red);">${report.overall.pending}</div><div class="stat-label">مهام معلقة</div></div><div class="report-stat-card"><div class="stat-value" style="color: var(--orange);">${report.overall.lateDone}</div><div class="stat-label">تنفيذ متأخر</div></div>`; t.querySelector('#report-table-head').innerHTML = `<tr><th>المهمة</th><th>تاريخ الإنشاء</th><th>تم</th><th>متأخر</th><th>معلق</th><th>غير مطلوب</th></tr>`; t.querySelector('#report-table-body').innerHTML = report.tasks.map(tsk => `<tr><td>${tsk.name}</td><td>${new Date(tsk.createdAt).toLocaleDateString('ar-EG')}</td><td>${tsk.stats.done}</td><td>${tsk.stats.lateDone}</td><td>${tsk.stats.pending}</td><td>${tsk.stats.notRequired}</td></tr>`).join(''); } t.querySelector('#report-date').textContent = new Date().toLocaleString('ar-EG'); const canvas = await html2canvas(t, { scale: 2, useCORS: true }); state.reportImageData = canvas.toDataURL('image/jpeg', 0.95); document.getElementById('reportPreviewImage').src = state.reportImageData; reportPreviewModal.classList.remove('hidden'); } catch (error) { logToConsole('Report generation failed', 'ERROR', error); showNotification('فشل إنشاء التقرير.', true); } finally { render(); } }

    function openSectionModal() { document.getElementById('sectionNameInput').value = ''; sectionModal.classList.remove('hidden'); }
    function openDateRangeModal() { dateRangeModal.classList.remove('hidden'); }
    function openAddTaskModal() { document.getElementById('newTaskNameInput').value = ''; document.getElementById('taskTypeStandard').checked = true; document.getElementById('timeLimitedFields').classList.add('hidden'); const bc = document.getElementById('branchSelectionContainer'); bc.innerHTML = ''; if (state.allBranches.length > 0) { bc.innerHTML = state.allBranches.map(b => `<label class="branch-checkbox-item"><input type="checkbox" name="branch" value="${b.id}"> ${b.name}</label>`).join(''); } else { bc.innerHTML = 'لم يتم العثور على فروع أو فشل تحميلها.'; } addTaskModal.classList.remove('hidden'); }
    
    function initializeApp() {
        logToConsole('Application Initializing...', 'INFO');
        if (isDebugMode) { debugConsole.classList.remove('hidden'); document.getElementById('close-debug').addEventListener('click', () => debugConsole.classList.add('hidden')); }
        contentArea.addEventListener('click', e => { const s = e.target.closest('.section-item-clickable'); if (s) { navigate('tasks', { section: { id: s.closest('.section-item').dataset.sectionId, name: s.dataset.sectionName }}); return; } const t = e.target.closest('.task-item-clickable'); if (t) { navigate('taskDetail', { task: JSON.parse(t.dataset.taskJson) }); return; } handleDelete(e); });
        contentArea.addEventListener('change', handleStatusChange);
        document.getElementById('cancelAddSectionBtn').addEventListener('click', () => sectionModal.classList.add('hidden'));
        document.getElementById('confirmAddSectionBtn').addEventListener('click', async () => { const b = document.getElementById('confirmAddSectionBtn'), n = document.getElementById('sectionNameInput').value.trim(); if (!n) return showNotification('الرجاء إدخال اسم للقسم.', true); b.disabled = true; try { await apiCall('createSection', 'POST', { sectionName: n }); showNotification('تم إنشاء القسم بنجاح.', false); sectionModal.classList.add('hidden'); render(); } finally { b.disabled = false; } });
        document.getElementById('cancelAddTaskBtn').addEventListener('click', () => addTaskModal.classList.add('hidden'));
        document.querySelector('input[name="taskType"][value="TimeLimited"]').addEventListener('change', () => document.getElementById('timeLimitedFields').classList.remove('hidden'));
        document.querySelector('input[name="taskType"][value="Standard"]').addEventListener('change', () => document.getElementById('timeLimitedFields').classList.add('hidden'));
        document.getElementById('confirmAddTaskBtn').addEventListener('click', async () => { const b = document.getElementById('confirmAddTaskBtn'), n = document.getElementById('newTaskNameInput').value.trim(), t = document.querySelector('input[name="taskType"]:checked').value, sD = document.getElementById('taskStartDateInput').value, eD = document.getElementById('taskEndDateInput').value, sB = Array.from(document.querySelectorAll('input[name="branch"]:checked')).map(cb => cb.value); if (!n) return showNotification('الرجاء إدخال اسم المهمة.', true); if (t === 'TimeLimited' && (!sD || !eD)) return showNotification('يجب تحديد وقت البدء والانتهاء.', true); if (sB.length === 0) return showNotification('يجب اختيار فرع واحد على الأقل.', true); b.disabled = true; try { await apiCall('createTask', 'POST', { sectionID: state.currentSection.id, taskName: n, taskType: t, startDate: sD, endDate: eD, branchIDs: sB }); showNotification('تم إنشاء المهمة بنجاح.', false); addTaskModal.classList.add('hidden'); render(); } finally { b.disabled = false; } });
        document.getElementById('cancelDateRangeBtn').addEventListener('click', () => dateRangeModal.classList.add('hidden'));
        document.getElementById('generateSectionReportBtn').addEventListener('click', () => { const s = document.getElementById('reportStartDate').value, e = document.getElementById('reportEndDate').value; if (!s || !e) return showNotification('الرجاء تحديد تاريخ البدء والانتهاء.', true); dateRangeModal.classList.add('hidden'); generateAndShowReport('section', { sectionId: state.currentSection.id, startDate: s, endDate: e }); });
        document.getElementById('closeReportPreviewBtn').addEventListener('click', () => reportPreviewModal.classList.add('hidden'));
        document.getElementById('downloadReportImageBtn').addEventListener('click', () => { if (!state.reportImageData) return; const l = document.createElement('a'); l.href = state.reportImageData; l.download = state.reportFileName; l.click(); });
        render();
    }
    initializeApp();
});
</script>
</html>
