<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد بطاقات الأسعار</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        :root {
            --bg-color: #f4f7fa; --preview-bg: #e2e8f0; --text-color: #334155;
            --primary-color: #3b82f6; --primary-hover: #2563eb; --card-bg: #ffffff;
            --border-color: #e2e8f0; --muted-text: #64748b;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --radius-md: 8px; --radius-lg: 12px; --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            --label-price-color: #ef4444; --label-border-width: 1px; --label-border-style: dashed; --label-border-color: #cbd5e1;
            --label-padding: 5px; --label-border-radius: 8px; --price-box-bg: rgba(255, 255, 255, 0.85);
            --price-box-border-color: var(--label-price-color); --label-item-font-size: 16px;
            --label-item-font-weight: 700; --label-item-text-transform: none; --label-price-font-size: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color);
            display: flex; height: 100vh; overflow: hidden;
        }
        .app-container { display: flex; width: 100%; height: 100%; flex-direction: row-reverse; }

        .control-panel {
            width: 450px; min-width: 420px; background-color: var(--bg-color);
            padding: 30px; height: 100vh; overflow-y: auto; border-left: 1px solid var(--border-color);
        }
        .preview-panel {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 30px; height: 100vh; background-color: var(--preview-bg);
        }

        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 25px; }
        h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        h3 { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); margin: 40px 0 25px 0; border-bottom: 2px solid; padding-bottom: 15px;}
        
        button { background-color: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: var(--radius-md); font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); box-shadow: var(--shadow); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .btn-icon svg { width:18px; height:18px; }
        
        input, select { width: 100%; padding: 10px 12px; border-radius: var(--radius-md); border: 1px solid var(--border-color); font-family: 'Cairo', sans-serif; background-color: #f8fafc; transition: var(--transition); }
        input:focus, select:focus { border-color: var(--primary-color); background-color: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); outline: none; }
        input[type="color"] { padding: 4px; height: 42px; }
        input[type="radio"] { width: auto; }
        
        .section-card { background: var(--card-bg); padding: 25px; border-radius: var(--radius-lg); box-shadow: var(--shadow); margin-bottom: 30px; }
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .app-status { padding: 15px 20px; margin-bottom: 20px; border-radius: var(--radius-md); color: #fff; text-align: center; font-weight: 600; display: none; }
        .app-status.error { background: #ef4444; } .app-status.success { background: #22c55e; }
        
        #search-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        #search-field { flex: 0 0 120px; }
        #search-container { border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 5px; background-color: #f8fafc; flex-grow: 1; }
        #search-container:focus-within { border-color: var(--primary-color); background-color: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        #search-input { border: none; flex-grow: 1; padding: 5px; outline: none; background: transparent; }
        .search-tag { background-color: #e2e8f0; color: var(--muted-text); padding: 5px 8px 5px 12px; border-radius: 6px; display: flex; align-items: center; font-size: 14px; gap: 8px; }
        .search-tag .field { font-weight: 700; color: var(--primary-color); }
        .search-tag-remove { background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0; line-height: 1; display: flex; }
        .search-tag-remove:hover { color: var(--text-color); }
        .search-tag-remove svg { width: 14px; height: 14px; }

        #item-list { max-height: 30vh; overflow-y: auto; border: 1px solid var(--border-color); border-radius: var(--radius-lg); background: white; }
        .item-card { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; position: relative; }
        .item-card:last-child { border-bottom: none; }
        .item-card:hover { background-color: #f8fafc; }
        .item-card.selected { background-color: #eff6ff; color: #1e40af; font-weight: 600; }
        .item-card.selected::before { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px; background-color: var(--primary-color); }
        
        #a4-sheet { background: white; width: 21cm; height: 29.7cm; box-shadow: var(--shadow-lg); transform-origin: top center; transform: scale(0.65); display: grid; align-content: start; padding: 10mm; grid-template-columns: 1fr; }
        #print-button { margin-top: 25px; }
        
        .price-label { display: flex; flex-direction: row; align-items: center; overflow: hidden; background-color: white; border: var(--label-border-width) var(--label-border-style) var(--label-border-color); border-radius: var(--label-border-radius); padding: var(--label-padding); }
        .label-logo-area { flex: 0 0 25%; text-align: center; padding: 5px; }
        .label-logo-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .label-info-area { flex: 1; text-align: center; padding: 0 10px; font-size: var(--label-item-font-size); font-weight: var(--label-item-font-weight); text-transform: var(--label-item-text-transform); }
        .label-price-area { flex: 0 0 30%; text-align: center; padding: 0 5px; }
        .label-price-container { border: 2px solid var(--price-box-border-color); border-radius: 8px; text-align: center; background: var(--price-box-bg); padding: 5px 10px; display: inline-block; }
        .label-price { font-size: var(--label-price-font-size); font-weight: 700; color: var(--label-price-color); white-space: nowrap; }

        #a4-sheet.mode-preprinted .price-label { background: transparent; border-color: #a0aec0; }
        #a4-sheet.mode-preprinted .label-logo-area,
        #a4-sheet.mode-preprinted .label-price-container { visibility: hidden; }
        
        .slider-value { font-weight: 600; color: var(--primary-color); }
        fieldset { border: none; border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; background-color: #f8fafc; border: 1px solid var(--border-color); }
        legend { font-weight: 700; padding: 0 5px; font-size: 1.1rem; }
        .control-group { margin-bottom: 20px; } .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--muted-text); }
        .radio-group { display: flex; flex-direction: column; gap: 15px; }
        .radio-group label { margin-bottom: 0; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        .grid-2, .grid-3 { display: grid; gap: 15px; grid-template-columns: repeat(2, 1fr); align-items: end;}
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        
        #layout-calculation-status { background-color: #eef2ff; padding: 10px; border-radius: var(--radius-md); text-align: center; font-weight: 600; color: #4338ca; margin-top: 15px; display:none; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--bg-color); } ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        @media print {
            html, body {
                height: 100%;
                margin: 0 !important;
                padding: 0 !important;
            }
            .control-panel, #print-button, .app-status { display: none !important; }
            .preview-panel {
                padding: 0 !important;
            }
            #a4-sheet {
                transform: none !important;
                box-shadow: none !important;
                border: none !important;
                margin: 0 auto !important; /* Center the sheet */
                width: 21cm !important;
                height: 29.7cm !important;
                display: grid !important;
                padding: 10mm !important; /* **FIX:** This defines the unprintable border */
            }
            .price-label {
                page-break-inside: avoid !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                border-color: #000 !important;
            }
            #a4-sheet.mode-preprinted .price-label {
                border-color: transparent !important;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="preview-panel">
            <div id="a4-sheet"></div>
            <button id="print-button" style="display:none;"><span class="btn-icon"></span> طباعة</button>
        </div>
        
        <aside class="control-panel">
            <h1>مولد بطاقات الأسعار</h1>
            <div id="app-status" class="app-status"></div>

            <section class="section-card"><h2>1. تحميل البيانات</h2><div id="loader" class="loader"></div></section>
            
            <section id="item-selection-section" class="section-card" style="display:none;">
                <h2>2. بحث وتحديد الأصناف</h2>
                <div id="search-controls">
                    <select id="search-field"><option value="name">الاسم</option><option value="code">الكود</option></select>
                    <div id="search-container"><input type="search" id="search-input" placeholder="اكتب للبحث ثم اضغط Enter..."></div>
                </div>
                <div id="item-list" class="item-list"></div>
            </section>
            
            <section id="generation-section" class="section-card" style="display:none;"><h2>3. إنشاء البطاقة</h2><div class="grid-2"><input type="number" id="price-input" placeholder="أدخل السعر الموحد" step="0.01"><button id="generate-btn">إنشاء وتحديث المعاينة</button></div></section>
            
            <h3>4. تخصيص التصميم والطباعة</h3>

            <fieldset>
                <legend>وضع الطباعة</legend>
                 <div class="control-group radio-group">
                    <label><input type="radio" name="print-mode" value="full" checked> <strong>تصميم كامل:</strong> لطباعة بطاقة كاملة على ورق عادي.</label>
                    <label><input type="radio" name="print-mode" value="preprinted"> <strong>نص فقط:</strong> لطباعة النصوص فقط على نموذج مُعَد مسبقًا.</label>
                 </div>
            </fieldset>

             <fieldset>
                <legend>تخطيط الصفحة (لـ 8 بطاقات)</legend>
                <div class="control-group grid-2">
                    <div><label>ارتفاع البطاقة (mm)</label><input type="number" id="label-height" value="30" step="0.1"></div>
                    <div><label>مسافة رأسية (mm)</label><input type="number" id="gap-vertical" value="4.2" step="0.1"></div>
                </div>
                 <div id="layout-calculation-status"></div>
            </fieldset>

             <div id="full-design-controls">
                <fieldset>
                    <legend>الإطار والحدود</legend>
                    <div class="control-group"><label>حواف دائرية (px): <span id="label-border-radius-value" class="slider-value">8</span></label><input type="range" id="label-border-radius" min="0" max="30" value="8"></div>
                    <div class="control-group grid-3">
                        <div><label>عرض الإطار (px)</label><input type="number" id="label-border-width" value="1" min="0"></div>
                        <div><label>لون الإطار</label><input type="color" id="label-border-color" value="#cbd5e1"></div>
                        <div><label>نمط الإطار</label><select id="label-border-style"><option value="dashed">متقطع</option><option value="solid">صلب</option><option value="dotted">منقط</option></select></div>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>الألوان</legend>
                    <div class="control-group grid-3">
                        <div><label>خلفية السعر</label><input type="color" id="price-box-bg" value="#ffffff"></div>
                        <div><label>إطار السعر</label><input type="color" id="price-box-border-color" value="#ef4444"></div>
                        <div><label>لون السعر</label><input type="color" id="label-price-color" value="#ef4444"></div>
                    </div>
                </fieldset>
            </div>

            <fieldset>
                <legend>النصوص والخطوط</legend>
                <div class="control-group grid-2">
                     <div><label>خط الصنف (px): <span id="item-font-size-value" class="slider-value">16</span></label><input type="range" id="item-font-size" min="8" max="28" value="16"></div>
                     <div><label>خط السعر (px): <span id="price-font-size-value" class="slider-value">24</span></label><input type="range" id="price-font-size" min="12" max="48" value="24"></div>
                </div>
            </fieldset>

        </aside>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyMvUxMBy7UyTWAqT7EMYlwkTdh1Zdc0BWupeMVOYyJSWxcivkSBnozStQSfJGacklAXQ/exec';
    
    const icons = { print: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 2.75C5 1.784 5.784 1 6.75 1h6.5c.966 0 1.75.784 1.75 1.75v3.552c.377.046.752.11 1.126.195.784.175 1.437.638 1.83 1.262.394.624.594 1.344.594 2.103v2.888c0 .76-.2 1.48-.594 2.104-.393.623-1.046 1.086-1.83 1.261-.374.086-.749.15-1.126.195v3.552C15 18.216 14.216 19 13.25 19h-6.5C5.784 19 5 18.216 5 17.25V2.75Z" clip-rule="evenodd" /></svg>`, close: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="M5.28 4.22a.75.75 0 0 0-1.06 1.06L6.94 8l-2.72 2.72a.75.75 0 1 0 1.06 1.06L8 9.06l2.72 2.72a.75.75 0 1 0 1.06-1.06L9.06 8l2.72-2.72a.75.75 0 0 0-1.06-1.06L8 6.94 5.28 4.22Z" /></svg>` };
    const state = { allItems: [], selectedItemIds: new Set(), currentLogoSrc: 'logo.png', currentPreviewData: null, printMode: 'full', searchTags: [] };
    const dom = { appStatus: document.getElementById('app-status'), loader: document.getElementById('loader'), itemSelectionSection: document.getElementById('item-selection-section'), generationSection: document.getElementById('generation-section'), searchInput: document.getElementById('search-input'), searchField: document.getElementById('search-field'), searchContainer: document.getElementById('search-container'), itemList: document.getElementById('item-list'), priceInput: document.getElementById('price-input'), generateBtn: document.getElementById('generate-btn'), a4Sheet: document.getElementById('a4-sheet'), printButton: document.getElementById('print-button'), layoutStatus: document.getElementById('layout-calculation-status'), printModeRadios: document.querySelectorAll('input[name="print-mode"]'), fullDesignControls: document.getElementById('full-design-controls'), controls: {} };
    const controlIds = [ 'label-height', 'gap-vertical', 'label-border-radius', 'label-border-width', 'label-border-color', 'label-border-style', 'price-box-bg', 'price-box-border-color', 'label-price-color', 'item-font-size', 'price-font-size'];
    controlIds.forEach(id => { dom.controls[id.replace(/-(\w)/g, (_, p1) => p1.toUpperCase())] = document.getElementById(id); });
    
    const debounce = (func, delay) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => func.apply(this, a), delay); }; };
    const showStatus = (message, type = 'success') => { dom.appStatus.textContent = message; dom.appStatus.className = `app-status ${type}`; dom.appStatus.style.display = 'block'; setTimeout(() => dom.appStatus.style.display = 'none', 4000); };
    
    // --- **FIXED** findCommonName function ---
    const findCommonName = (items) => {
        if (!items || items.length === 0) return '';
        // **CRITICAL FIX:** Sanitize names first to get the pure name string from the object.
        const allNames = items.map(item => item.name);

        if (items.length === 1) return allNames[0];

        const extractUnit = (name) => {
            const units = ['ملل', 'مل', 'جم', 'جرام', 'كجم', 'لتر', 'متر', 'gm', 'g', 'kg', 'ml', 'l'];
            const regex = new RegExp(`(\\d*\\.?\\d+\\s?(${units.join('|')}))($|\\s)`, 'i');
            const match = name.match(regex);
            return match ? match[1].trim() : null;
        };
        
        const allUnits = allNames.map(extractUnit);
        const firstUnit = allUnits[0];
        const isCommonUnit = firstUnit && allUnits.every(unit => unit === firstUnit);
        const commonUnit = isCommonUnit ? firstUnit : null;

        const namesForComparison = allNames.map(name => commonUnit ? name.replace(commonUnit, '').trim() : name);

        const findCommonPrefix = (arr) => {
            if (arr.length === 0) return '';
            const wordsArr = arr.map(s => String(s).split(' '));
            if (wordsArr[0].length === 0) return '';
            let common = [];
            for (let i = 0; i < wordsArr[0].length; i++) {
                if (wordsArr.every(words => words.length > i && words[i] === wordsArr[0][i])) {
                    common.push(wordsArr[0][i]);
                } else {
                    break;
                }
            }
            return common.join(' ');
        };

        let finalName = findCommonPrefix(namesForComparison);
        if (finalName === '') {
            finalName = 'أنواع';
        } else if (items.length > 1) {
            finalName += ' أنواع';
        }

        if (commonUnit) {
            finalName += ` ${commonUnit}`;
        }
        
        return finalName.replace(/\s+/g, ' ').trim();
    };

    const renderItems = (items) => {
        dom.itemList.innerHTML = items.length === 0 ? '<p style="padding:20px;text-align:center;">لا توجد نتائج</p>' : '';
        items.forEach(item => {
            const isSelected = state.selectedItemIds.has(item.id); const card = document.createElement('label');
            card.className = `item-card ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `<input type="checkbox" data-id="${item.id}" data-name="${item.name}" ${isSelected ? 'checked' : ''}><div class="details"><span class="item-name">${item.name}</span><span class="item-meta">الكود: ${item.code || 'N/A'}</span></div>`;
            card.querySelector('input').addEventListener('change', (e) => { const id = parseInt(e.target.dataset.id); e.target.checked ? state.selectedItemIds.add(id) : state.selectedItemIds.delete(id); card.classList.toggle('selected', e.target.checked); });
            dom.itemList.appendChild(card);
        });
    };

    const handleAdvancedSearch = () => {
        if (state.searchTags.length === 0) { renderItems(state.allItems); return; }
        const filtered = state.allItems.filter(item => {
            return state.searchTags.every(tag => String(item[tag.field] || '').toLowerCase().includes(tag.value.toLowerCase()));
        });
        renderItems(filtered);
    };

    const renderSearchTags = () => {
        dom.searchContainer.querySelectorAll('.search-tag').forEach(tag => tag.remove());
        state.searchTags.forEach((tag, index) => {
            const tagEl = document.createElement('div'); tagEl.className = 'search-tag';
            tagEl.innerHTML = `<span class="field">${tag.field_label}:</span><span>${tag.value}</span><button class="search-tag-remove">${icons.close}</button>`;
            tagEl.querySelector('.search-tag-remove').addEventListener('click', () => { state.searchTags.splice(index, 1); renderSearchTags(); handleAdvancedSearch(); });
            dom.searchContainer.insertBefore(tagEl, dom.searchInput);
        });
    };

    const updatePreview = () => {
        if (!state.currentPreviewData) return;
        const { name, price } = state.currentPreviewData;
        const { controls } = dom; const root = document.documentElement.style;

        Object.entries({
            '--label-border-width': `${controls.labelBorderWidth.value}px`, '--label-border-style': controls.labelBorderStyle.value, '--label-border-color': controls.labelBorderColor.value,
            '--label-border-radius': `${controls.labelBorderRadius.value}px`, '--price-box-bg': controls.priceBoxBg.value, '--price-box-border-color': controls.priceBoxBorderColor.value,
            '--label-price-color': controls.labelPriceColor.value, '--label-item-font-size': `${controls.itemFontSize.value}px`, '--label-price-font-size': `${controls.priceFontSize.value}px`,
        }).forEach(([prop, val]) => root.setProperty(prop, val));
        
        dom.a4Sheet.innerHTML = '';
        dom.a4Sheet.className = state.printMode === 'preprinted' ? 'mode-preprinted' : '';
        
        // **FIX:** Correct A4 Layout Calculation
        const PRINTABLE_HEIGHT = 297 - (10 * 2); // 297mm A4 height minus 10mm top/bottom browser margins
        const labelH = parseFloat(controls.labelHeight.value);
        const gapV = parseFloat(controls.gapVertical.value);

        if(labelH <= 0) return;
        const totalLabels = Math.floor((PRINTABLE_HEIGHT + gapV) / (labelH + gapV));
        
        dom.a4Sheet.style.gridTemplateRows = `repeat(${totalLabels}, ${labelH}mm)`;
        dom.a4Sheet.style.gap = `${gapV}mm`;

        const logoHtml = `<img src="${state.currentLogoSrc}" alt="Logo">`;
        for (let i = 0; i < totalLabels; i++) {
            const label = document.createElement('div'); label.className = 'price-label';
            label.innerHTML = `<div class="label-logo-area">${logoHtml}</div><div class="label-info-area">${name}</div><div class="label-price-area"><div class="label-price-container"><div class="label-price">${price.toFixed(2)} ج.م</div></div></div>`;
            dom.a4Sheet.appendChild(label);
        }

        dom.layoutStatus.textContent = `التخطيط الحالي: ${totalLabels} بطاقة في الصفحة.`;
        dom.layoutStatus.style.display = 'block';
        dom.printButton.querySelector('.btn-icon').innerHTML = icons.print;
        dom.printButton.style.display = totalLabels > 0 ? 'inline-flex' : 'none';
    };

    const generateLabelData = () => {
        if (state.selectedItemIds.size === 0) return showStatus('خطأ: يرجى تحديد صنف.', 'error');
        const price = parseFloat(dom.priceInput.value);
        if (isNaN(price) || price <= 0) return showStatus('خطأ: سعر غير صحيح.', 'error');
        const selectedItems = state.allItems.filter(item => state.selectedItemIds.has(item.id));
        state.currentPreviewData = { name: findCommonName(selectedItems), price };
        updatePreview();
    };

    const loadData = async () => {
        dom.loader.style.display = 'block';
        try {
            const response = await fetch(WEB_APP_URL);
            if (!response.ok) throw new Error(`خطأ بالخادم (${response.status})`);
            const data = await response.json(); if (data.error) throw new Error(data.message);
            state.allItems = data; showStatus(`تم تحميل ${state.allItems.length} صنف.`, 'success');
            dom.itemSelectionSection.style.display = 'block'; dom.generationSection.style.display = 'block';
            renderItems(state.allItems);
        } catch (error) { showStatus(`فشل تحميل البيانات: ${error.message}.`, 'error');
        } finally { dom.loader.style.display = 'none'; }
    };
    
    const debouncedUpdatePreview = debounce(updatePreview, 250);
    dom.generateBtn.addEventListener('click', generateLabelData);
    dom.printButton.addEventListener('click', () => window.print());
    
    dom.searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); const value = dom.searchInput.value.trim(); if (!value) return;
            const field = dom.searchField.value; const field_label = dom.searchField.options[dom.searchField.selectedIndex].text;
            state.searchTags.push({ value, field, field_label });
            renderSearchTags(); handleAdvancedSearch(); dom.searchInput.value = '';
        }
    });

    dom.printModeRadios.forEach(radio => radio.addEventListener('change', (e) => {
        state.printMode = e.target.value;
        dom.fullDesignControls.style.display = state.printMode === 'full' ? 'block' : 'none';
        if (state.currentPreviewData) updatePreview();
    }));
    
    Object.values(dom.controls).forEach(control => { if (control) control.addEventListener(control.type.match(/range|color|number/) ? 'input' : 'change', debouncedUpdatePreview); });
    
    ['label-border-radius', 'item-font-size', 'price-font-size'].forEach(id => {
        const input = document.getElementById(id), span = document.getElementById(`${id}-value`);
        if(input && span) { span.textContent = input.value; input.addEventListener('input', e => span.textContent = e.target.value); }
    });
    
    loadData();
});
</script>
</body>
</html>
