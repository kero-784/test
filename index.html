<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management System</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS Client via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>Clinic Login</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-code" placeholder="Login Code">
            <button onclick="handleLogin()">Login</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="screen hidden">
        <!-- Fixed Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Clinic CMS</h3>
                <p id="user-display">Role: Admin</p>
            </div>
            <ul id="sidebar-nav" class="nav-list">
                <!-- Links injected dynamically via JS based on role -->
            </ul>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Horizontal Tabs for Secondary Navigation -->
            <div class="horizontal-tabs" id="horizontal-tabs">
                <!-- Secondary tabs injected here by the active module -->
            </div>
            
            <!-- Module Content Injected Here -->
            <div id="module-container" class="module-container">
                <h2>Welcome to the Clinic Management System</h2>
                <p>Select a module from the sidebar.</p>
            </div>
        </main>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
