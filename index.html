<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Management System</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="notification-sound" src="notification.mp3" preload="auto"></audio>
    <div id="app-container">
        <!-- Login View -->
        <div id="login-view" class="view">
             <!-- ... Unchanged ... -->
        </div>

        <!-- Main Application View -->
        <div id="main-view" class="view" style="display:none;">
            <div id="loading-indicator" class="loading-overlay"></div>
            <div class="app-header"></div>
            <div id="message-container"></div>
            
            <!-- Branch User View -->
            <div id="branch-user-content" class="role-content">
                <!-- UPDATED: The full original form is restored -->
                <div class="card mb-3">
                    <div class="card-header">Item Details & Pricing</div>
                    <div class="card-body">
                        <div class="form-row">
                            <div class="form-group col-md-6" style="position: relative;"><label for="code">Code:</label><input type="text" class="form-control" id="code" oninput="handleCodeInput()"><div id="autocomplete-suggestions" class="autocomplete-box"></div></div>
                            <div class="form-group col-md-6"><label for="type">Type:</label><select class="form-control" id="type" onchange="toggleCurrentPriceField()"><option value="شراء">شراء</option><option value="مرتجع">مرتجع</option></select></div>
                        </div>
                        <div class="form-group" id="currentPriceDiv" style="display:none;"><label for="currentPrice">Current Price:</label><input type="number" step="0.001" class="form-control" id="currentPrice"></div>
                        <div class="form-group"><label for="name">Name:</label><input type="text" class="form-control" id="name" readonly></div>
                        <div class="form-group"><label for="supplierName">Supplier Name:</label><input type="text" class="form-control" id="supplierName" readonly></div>
                        <div class="form-group"><label for="alternateSupplierCheck">شراء من مورد اخر:</label><div class="form-check" style="padding: 8px 0;"><input type="checkbox" class="form-check-input" id="alternateSupplierCheck" onchange="toggleAlternateSupplier()" style="margin-left: 0;"><label class="form-check-label" for="alternateSupplierCheck" style="margin-left: 20px;"></label></div></div>
                        <div class="form-group" id="alternateSupplierDiv" style="display: none;"><label for="alternateSupplierName">Alternate Supplier Name:</label><input type="text" class="form-control" id="alternateSupplierName"></div>
                        <hr>
                        <div class="form-group">
                            <label for="unitPrice">Final Unit Price:</label>
                            <div class="input-group">
                                <input type="number" step="0.001" class="form-control" id="unitPrice">
                                <div class="input-group-append"><button class="btn btn-outline-secondary" type="button" onclick="openCalculatorModal()" title="Calculate from Case Cost"><i class="fas fa-calculator"></i></button></div>
                            </div>
                        </div>
                        <button class="btn btn-success" onclick="addToList()"><i class="fas fa-plus"></i> Add Item</button>
                    </div>
                </div>

                <!-- UPDATED: Submission list card with all original details -->
                <div id="submission-list-card" class="card mb-3" style="display:none;">
                    <div class="card-header">Pending Requests</div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-striped">
                                <thead>
                                    <tr>
                                        <th>Code</th><th>Name</th><th>Supplier</th><th>Units</th><th>Discount</th><th>VAT</th><th>Piece</th><th>Case</th><th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="submission-list-tbody"></tbody>
                            </table>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                             <button class="btn btn-danger" onclick="clearRequestList()"><i class="fas fa-trash"></i> Clear List</button>
                             <button class="btn btn-primary" onclick="submitAllRequests()"><i class="fas fa-paper-plane"></i> Submit All Requests to Officer</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">My Submission History</div>
                    <div class="card-body table-responsive">
                        <!-- ... unchanged ... -->
                    </div>
                </div>
            </div>

            <!-- Officer View -->
            <div id="officer-content" class="role-content">
                 <!-- ... Unchanged ... -->
            </div>
        </div>
        
        <!-- All Modals (Unchanged) -->
        <div id="reports-view" class="view" style="display:none;"></div>
        <div class="modal fade" id="request-details-modal" tabindex="-1"></div>
        <div class="modal fade" id="calculatorModal" tabindex="-1"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
