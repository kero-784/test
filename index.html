<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Task Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f4f7fa;
            --primary-text: #1a202c;
            --secondary-text: #718096;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --green: #48bb78;
            --red: #f56565;
            --gray: #a0aec0;
            --blue: #4299e1;
            --orange: #f6ad55;
            --font-family: 'Cairo', sans-serif;
        }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--primary-text); line-height: 1.6; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .hidden { display: none !important; }
        
        /* Buttons, Header etc. remain the same */
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn:disabled { background-color: var(--gray); cursor: not-allowed; }
        .btn-primary { background-color: var(--blue); color: white; }
        .btn-primary:not(:disabled):hover { background-color: #3182ce; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 2rem; }

        /* Dashboard Task Item Styling */
        #dashboardView .task-list { display: grid; gap: 1.5rem; }
        .task-item { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); padding: 1.5rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border-left: 5px solid var(--blue); }
        .task-item:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .task-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .task-item-name { font-size: 1.3rem; font-weight: 700; }
        .task-status-tag { padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; background-color: var(--orange); color: white; }
        .task-item-body { display: flex; flex-direction: column; gap: 1rem; }
        .progress-bar-container { width: 100%; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--secondary-text); margin-bottom: 0.25rem; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-bar-fg { height: 100%; border-radius: 10px; transition: width 0.5s ease-in-out; }
        .completion-bar { background-color: var(--green); }
        .responsiveness-bar { background-color: var(--blue); }
        .task-item-footer { border-top: 1px solid var(--border-color); margin-top: 1rem; padding-top: 0.75rem; font-size: 0.9rem; color: var(--secondary-text); }
        
        /* Task Detail View (Radio Buttons) */
        #taskDetailView #branchGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
        .branch-card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; }
        .branch-name { font-size: 1.2rem; font-weight: 600; }
        .status-radio-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .status-radio-group input[type="radio"] { display: none; }
        .status-radio-group label { flex-grow: 1; text-align: center; padding: 0.5rem; border-radius: 20px; border: 2px solid var(--border-color); cursor: pointer; }
        .status-radio-group input[type="radio"]:checked + label { color: white; }
        .status-radio-group input[value="done"]:checked + label { background-color: var(--green); border-color: var(--green); }
        .status-radio-group input[value="pending"]:checked + label { background-color: var(--red); border-color: var(--red); }
        .status-radio-group input[value="not-required"]:checked + label { background-color: var(--gray); border-color: var(--gray); }

        /* Loader & Messages */
        .message-container { text-align: center; padding: 4rem; font-size: 1.2rem; }
        
        /* --- ENHANCED: Hidden JPG Report Container Styling --- */
        #reportContainer {
            display: none; width: 800px; padding: 40px; background: white; font-family: var(--font-family); color: var(--primary-text);
            border: 1px solid var(--border-color);
        }
        #reportHeader { text-align: center; border-bottom: 2px solid var(--blue); padding-bottom: 20px; margin-bottom: 20px; }
        #reportHeader h2 { font-size: 28px; color: var(--blue); margin: 0; }
        #reportHeader p { font-size: 16px; color: var(--secondary-text); margin: 5px 0 0; }
        #reportSummary { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; }
        #reportMainStats { flex-grow: 1; }
        .stat-item { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center;}
        .stat-item span { font-weight: 700; padding: 4px 10px; border-radius: 5px; color: white; margin-left: 10px; font-size: 1.2rem; }
        .stat-done { background-color: var(--green); }
        .stat-pending { background-color: var(--red); }
        .stat-not-required { background-color: var(--gray); }
        #reportChartContainer { width: 170px; height: 170px; }
        #reportProgressStats { border-top: 1px solid var(--border-color); padding-top: 20px; margin-bottom: 20px; }
        #reportBranchList { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .report-branch-item { display: flex; justify-content: space-between; padding: 8px; border-radius: 5px; }
        .report-branch-item:nth-child(odd) { background-color: #f9fafb; }
        .report-branch-item .status { font-weight: 700; }
        .report-branch-item .status-done { color: var(--green); }
        .report-branch-item .status-pending { color: var(--red); }
        .report-branch-item .status-not-required { color: var(--gray); }
        #reportFooter { text-align: center; margin-top: 30px; font-size: 12px; color: var(--secondary-text); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 id="mainTitle">لوحة التحكم الرئيسية</h1>
            <div>
                <button class="btn btn-secondary hidden" id="backToDashboardBtn">العودة</button>
                <button class="btn btn-primary" id="addTaskBtn">إضافة مهمة</button>
                <button class="btn btn-primary hidden" id="downloadReportBtn">تحميل تقرير JPG</button>
            </div>
        </header>
        <div id="contentArea"></div>
    </div>
    
    <!-- ENHANCED: Report Template with placeholders for new stats -->
    <div id="reportContainer">
        <div id="reportHeader">
            <h2 id="reportTaskName"></h2>
            <p>تقرير حالة استجابة الفروع</p>
        </div>
        <div id="reportSummary">
            <div id="reportMainStats">
                <div class="stat-item">تم التنفيذ <span id="reportDoneStat" class="stat-done"></span></div>
                <div class="stat-item">لم يتم <span id="reportPendingStat" class="stat-pending"></span></div>
                <div class="stat-item">غير مطلوب <span id="reportNotRequiredStat" class="stat-not-required"></span></div>
            </div>
            <div id="reportChartContainer">
                <canvas id="reportChart"></canvas>
            </div>
        </div>
        <div id="reportProgressStats">
             <div class="progress-bar-container">
                <div class="progress-label">
                    <span>نسبة الإنجاز</span>
                    <span id="reportCompletionStat"></span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fg completion-bar" id="reportCompletionBar"></div>
                </div>
            </div>
        </div>
        <div id="reportBranchList"></div>
        <div id="reportFooter">
            <p>تم إنشاء هذا التقرير بتاريخ: <span id="reportDate"></span></p>
        </div>
    </div>
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // SCRIPT_URL and other initial variables are the same
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwVJqwrWvOsZkEgXZGdIJhWOKjo2yNX3hREauNPJSyP3diV22CNZDuGQSzzsUs3g9HMA/exec';
    const mainTitle = document.getElementById('mainTitle');
    const contentArea = document.getElementById('contentArea');
    const backToDashboardBtn = document.getElementById('backToDashboardBtn');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const downloadReportBtn = document.getElementById('downloadReportBtn');
    let currentTaskData = null;
    let currentChartInstance = null;

    // --- API Function (Unchanged) ---
    async function apiCall(action, method = 'GET', body = null) {
        const url = new URL(SCRIPT_URL);
        // This is a simplified version of the API call for brevity, use your full working version.
        const options = { method, redirect: 'follow' };
        if (method === 'POST') options.body = JSON.stringify({ action, ...body });
        else url.searchParams.append('action', action);
        const response = await fetch(url, options);
        return response.json();
    }

    // --- View Rendering (All functions are the same as before) ---
    function showLoader(message = 'جاري التحميل...') { /* ... same ... */ }
    function showDashboardView(tasks) { /* ... same ... */ }
    function showTaskDetailView(data) { /* ... same ... */ }

    // --- Event Handlers ---
    async function handleLoadDashboard() { /* ... same ... */ }
    async function handleSelectTask(e) { /* ... same ... */ }
    async function handleStatusChange(e) { /* ... same ... */ }

    // --- CORRECTED & ENHANCED handleDownloadReport Function ---
    async function handleDownloadReport() {
        if (!currentTaskData) return;
        showLoader('جاري إنشاء التقرير...');
        
        try {
            // 1. Calculate all necessary statistics for the current task
            const totalBranches = currentTaskData.branches.length;
            const doneCount = currentTaskData.branches.filter(b => b.status === 'done').length;
            const pendingCount = currentTaskData.branches.filter(b => b.status === 'pending').length;
            const notRequiredCount = currentTaskData.branches.filter(b => b.status === 'not-required').length;
            
            const requiredBranches = totalBranches - notRequiredCount;
            const completionPercentage = (totalBranches > 0) ? Math.round((doneCount / totalBranches) * 100) : 0;

            // 2. Populate the hidden report template with data
            document.getElementById('reportTaskName').textContent = currentTaskData.task.name;
            document.getElementById('reportDate').textContent = new Date().toLocaleString('ar-EG');
            
            // Populate main stats
            document.getElementById('reportDoneStat').textContent = doneCount;
            document.getElementById('reportPendingStat').textContent = pendingCount;
            document.getElementById('reportNotRequiredStat').textContent = notRequiredCount;
            
            // Populate progress stats
            document.getElementById('reportCompletionStat').textContent = `${completionPercentage}%`;
            document.getElementById('reportCompletionBar').style.width = `${completionPercentage}%`;

            // Populate branch list
            const statusTranslations = {'done': 'تم', 'pending': 'لم يتم', 'not-required': 'غير مطلوب'};
            const statusClasses = {'done': 'status-done', 'pending': 'status-pending', 'not-required': 'status-not-required'};
            document.getElementById('reportBranchList').innerHTML = currentTaskData.branches.map(b => 
                `<div class="report-branch-item">
                    <span>${b.name}</span>
                    <span class="status ${statusClasses[b.status]}">${statusTranslations[b.status]}</span>
                 </div>`
            ).join('');
            
            // 3. Render the pie chart
            const chartCanvas = document.getElementById('reportChart');
            if (currentChartInstance) currentChartInstance.destroy();
            currentChartInstance = new Chart(chartCanvas, {
                type: 'doughnut',
                data: {
                    labels: ['تم', 'لم يتم', 'غير مطلوب'],
                    datasets: [{
                        data: [doneCount, pendingCount, notRequiredCount],
                        backgroundColor: [getComputedStyle(document.body).getPropertyValue('--green'), getComputedStyle(document.body).getPropertyValue('--red'), getComputedStyle(document.body).getPropertyValue('--gray')],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: { plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
            });

            // 4. Use html2canvas to create the JPG
            const reportElement = document.getElementById('reportContainer');
            reportElement.style.display = 'block';
            reportElement.style.position = 'absolute';
            reportElement.style.right = '-9999px'; // Position it off-screen
            reportElement.style.top = '0';

            // Wait a moment for the chart to fully render
            await new Promise(resolve => setTimeout(resolve, 500));

            const canvas = await html2canvas(reportElement, { scale: 2 });
            const link = document.createElement('a');
            link.download = `report_${currentTaskData.task.name.replace(/[\s\W]/g, '_')}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95); // High quality JPG
            link.click();

            reportElement.style.display = 'none'; // Hide it again

        } catch (err) {
            console.error("Failed to generate report:", err);
            alert("فشل إنشاء التقرير. الرجاء المحاولة مرة أخرى.");
        } finally {
            // Go back to the task detail view, which implicitly redraws the view correctly
            showTaskDetailView(currentTaskData);
        }
    }

    // --- Full Event Handlers and Initializer (for copy-pasting) ---
    // (The placeholder functions from before are now filled in for completeness)
    async function handleLoadDashboard() {
        showLoader();
        try {
            const data = await apiCall('getTasks');
            showDashboardView(data.tasks);
        } catch (error) {
            contentArea.innerHTML = `<div class="message-container"><p>Failed to load data. Please check the API URL and try again.</p></div>`;
        }
    }
    async function handleSelectTask(e) {
        const taskItem = e.target.closest('.task-item');
        if (!taskItem) return;
        const taskID = taskItem.dataset.taskId;
        showLoader(`Loading details...`);
        try {
            const data = await apiCall('getTaskDetails', 'GET', { taskID });
            showTaskDetailView(data);
        } catch (error) {
            await handleLoadDashboard();
        }
    }
    async function handleStatusChange(e) {
        if (e.target.name.startsWith('status-')) {
            const radio = e.target;
            const newStatus = radio.value;
            const branchID = radio.name.split('-')[1];
            const taskID = currentTaskData.task.id;
            radio.disabled = true;
            try {
                await apiCall('updateStatus', 'POST', { taskID, branchID, newStatus });
                currentTaskData.branches.find(b => b.id == branchID).status = newStatus;
            } catch (error) {
                // Revert on failure
                const oldStatus = currentTaskData.branches.find(b => b.id == branchID).status;
                document.getElementById(`${oldStatus}-${branchID}`).checked = true;
            } finally {
                radio.disabled = false;
            }
        }
    }

    // Event Listeners
    contentArea.addEventListener('click', handleSelectTask);
    contentArea.addEventListener('change', handleStatusChange);
    backToDashboardBtn.addEventListener('click', handleLoadDashboard);
    downloadReportBtn.addEventListener('click', handleDownloadReport);
    
    // (Modal listeners for adding tasks should be here if you have them)

    // Initial Load
    handleLoadDashboard();
});
</script>
</html>
