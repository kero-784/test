<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Management Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root{--bg-color:#121212;--surface-color:rgba(255,255,255,0.05);--glass-blur:15px;--border-color:rgba(255,255,255,0.1);--primary-color:#6a5acd;--primary-glow:rgba(106,90,205,0.4);--text-color:#e0e0e0;--text-secondary-color:#a0a0a0;--success-color:#28a745;--error-color:#dc3545;--border-radius:12px;--shadow:0 8px 32px 0 rgba(0,0,0,0.37)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background-color:var(--bg-color);color:var(--text-color);background-image:radial-gradient(circle at 1% 1%,var(--primary-glow) 0,transparent 30%),radial-gradient(circle at 99% 99%,var(--primary-glow) 0,transparent 40%);min-height:100vh;line-height:1.6}.container{max-width:1200px;margin:0 auto;padding:2rem}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}header h1{font-size:2.5rem;font-weight:700;background:linear-gradient(45deg,var(--primary-color),#af72d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.actions{display:flex;gap:1rem;align-items:center}.btn{background:rgba(255,255,255,0.1);border:1px solid var(--border-color);color:var(--text-color);padding:.75rem 1.5rem;border-radius:var(--border-radius);cursor:pointer;font-weight:500;transition:all .3s ease;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}.btn:hover{background:var(--primary-color);border-color:var(--primary-color);box-shadow:0 0 15px var(--primary-glow)}.search-input{background:var(--surface-color);border:1px solid var(--border-color);color:var(--text-color);padding:.75rem 1rem;border-radius:var(--border-radius);width:100%;max-width:300px;font-size:1rem;transition:all .3s ease}.search-input:focus{outline:none;border-color:var(--primary-color);box-shadow:0 0 10px var(--primary-glow)}#supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}.supplier-card{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:1.5rem;backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));box-shadow:var(--shadow);transition:transform .3s ease,box-shadow .3s ease;display:flex;flex-direction:column;gap:1rem}.supplier-card:hover{transform:translateY(-5px);box-shadow:0 0 25px var(--primary-glow)}.card-header{display:flex;justify-content:space-between;align-items:flex-start}.card-header h3{font-size:1.25rem;color:var(--text-color);max-width:80%}.card-header .code{font-size:.9rem;background:var(--primary-color);color:#fff;padding:.25rem .5rem;border-radius:6px;font-weight:600}.card-body p{font-size:.95rem;color:var(--text-secondary-color)}.card-body strong{color:var(--text-color);font-weight:500}.card-footer{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color);display:flex;gap:.5rem;justify-content:flex-end}.card-footer .btn{padding:.5rem 1rem;font-size:.9rem}.btn-edit{background:rgba(106,90,205,0.2);border-color:rgba(106,90,205,0.5)}.btn-edit:hover{background:var(--primary-color);border-color:var(--primary-color)}.btn-delete{background:rgba(220,53,69,0.2);border-color:rgba(220,53,69,0.5)}.btn-delete:hover{background:var(--error-color);border-color:var(--error-color)}#loader{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border:5px solid var(--surface-color);border-top-color:var(--primary-color);border-radius:50%;animation:spin 1s linear infinite;z-index:1001}@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}#modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;justify-content:center;align-items:center;z-index:1000;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease}#modal.show{opacity:1;visibility:visible}.modal-content{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:2.5rem;backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));box-shadow:var(--shadow);width:90%;max-width:500px;transform:scale(.95);transition:transform .3s ease}#modal.show .modal-content{transform:scale(1)}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}.modal-header h2{font-size:1.75rem}.close-btn{font-size:2rem;background:none;border:none;color:var(--text-secondary-color);cursor:pointer;transition:color .3s ease}.close-btn:hover{color:var(--text-color)}.form-group{margin-bottom:1.5rem}.form-group label{display:block;margin-bottom:.5rem;color:var(--text-secondary-color);font-weight:500}.form-group input{width:100%;padding:.75rem 1rem;background:rgba(0,0,0,.2);border:1px solid var(--border-color);border-radius:var(--border-radius);color:var(--text-color);font-size:1rem}.form-group input:focus{outline:none;border-color:var(--primary-color)}.modal-footer{display:flex;justify-content:flex-end;gap:1rem;margin-top:2rem}#no-suppliers-msg{text-align:center;padding:3rem;color:var(--text-secondary-color);grid-column:1 / -1;background:var(--surface-color);border-radius:var(--border-radius);border:1px solid var(--border-color)}#toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px}.toast{padding:12px 20px;border-radius:var(--border-radius);color:#fff;font-weight:500;box-shadow:0 4px 15px rgba(0,0,0,.2);opacity:0;transform:translateX(100%);animation:slideIn .5s forwards}.toast.exit{animation:slideOut .5s forwards}@keyframes slideIn{to{opacity:1;transform:translateX(0)}}@keyframes slideOut{to{opacity:0;transform:translateX(100%)}}.toast.success{background:var(--success-color)}.toast.error{background:var(--error-color)}
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Supplier Hub</h1>
            <div class="actions">
                <input type="search" id="searchInput" class="search-input" placeholder="Search suppliers...">
                <button id="addSupplierBtn" class="btn">Add Supplier</button>
            </div>
        </header>

        <main>
            <div id="loader" style="display: none;"></div>
            <div id="supplier-grid">
                <!-- Supplier cards will be injected here by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Supplier</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="supplierForm">
                <input type="hidden" id="formMode" value="add">
                <input type="hidden" id="originalSupplierCode">
                
                <div class="form-group">
                    <label for="supplierCode">Supplier Code</label>
                    <input type="text" id="supplierCode" required>
                </div>
                <div class="form-group">
                    <label for="supplierName">Supplier Name</label>
                    <input type="text" id="supplierName" required>
                </div>
                <div class="form-group">
                    <label for="invoiceDiscount">Invoice Discount (%)</label>
                    <input type="number" id="invoiceDiscount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="returnPeriod">Return Period (days)</label>
                    <input type="number" id="returnPeriod" required>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelBtn" class="btn">Cancel</button>
                    <button type="submit" id="saveBtn" class="btn">Save Supplier</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="toast-container"></div>

    <script>
        // --- CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw3Jyvbrn9fWTTBtLQfMreD3uq1I6iL0QcwJV354Oc8azbYnbGm6W3Wmv_0TcqSkqVk6g/exec'; // <-- IMPORTANT: PASTE YOUR URL HERE

        // --- DOM ELEMENTS ---
        const loader = document.getElementById('loader');
        const supplierGrid = document.getElementById('supplier-grid');
        const searchInput = document.getElementById('searchInput');
        const addSupplierBtn = document.getElementById('addSupplierBtn');
        const modal = document.getElementById('modal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const supplierForm = document.getElementById('supplierForm');
        const modalTitle = document.getElementById('modalTitle');
        const saveBtn = document.getElementById('saveBtn');
        const formModeInput = document.getElementById('formMode');
        const originalSupplierCodeInput = document.getElementById('originalSupplierCode');
        const toastContainer = document.getElementById('toast-container');
        
        let allSuppliers = [];

        // --- CORE FUNCTIONS ---

        const showLoader = (show) => {
            loader.style.display = show ? 'block' : 'none';
        };
        
        const showToast = (message, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('exit');
                toast.addEventListener('animationend', () => toast.remove());
            }, 5000); // Increased duration for error messages
        };

        const renderSuppliers = (suppliers) => {
            supplierGrid.innerHTML = '';
            if (!suppliers || suppliers.length === 0) {
                const message = searchInput.value ? 'No suppliers match your search.' : 'No suppliers found. Click "Add Supplier" to start!';
                supplierGrid.innerHTML = `<p id="no-suppliers-msg">${message}</p>`;
                return;
            }
            
            suppliers.forEach(supplier => {
                const card = document.createElement('div');
                card.className = 'supplier-card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${supplier.SupplierName || 'N/A'}</h3>
                        <span class="code">${supplier.SupplierCode || 'N/A'}</span>
                    </div>
                    <div class="card-body">
                        <p><strong>Invoice Discount:</strong> ${supplier.InvoiceDiscount || 0}%</p>
                        <p><strong>Return Period:</strong> ${supplier.ReturnPeriod || 0} days</p>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-edit" data-code="${supplier.SupplierCode}">Edit</button>
                        <button class="btn btn-delete" data-code="${supplier.SupplierCode}">Delete</button>
                    </div>
                `;
                supplierGrid.appendChild(card);
            });
        };

        const fetchSuppliers = async () => {
            showLoader(true);
            supplierGrid.innerHTML = '';
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                if (!response.ok) { // Catches HTTP errors (e.g., 404, 500)
                    throw new Error(`Network error: ${response.status} ${response.statusText}`);
                }
                const result = await response.json();
                
                if (result.success) {
                    allSuppliers = result.data;
                    renderSuppliers(allSuppliers);
                } else {
                    // Catches application-level errors from Apps Script
                    throw new Error(result.message || 'An unknown error occurred in the script.');
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                showToast(error.message, 'error');
                supplierGrid.innerHTML = `<p id="no-suppliers-msg">Error loading data. <br><small>${error.message}</small></p>`;
            } finally {
                showLoader(false);
            }
        };
        
        /**
         * Generic function to handle POST requests (Create, Update, Delete)
         */
        const postData = async (action, data) => {
            showLoader(true);
            saveBtn.disabled = true; // Prevent double-clicks
            try {
                const payload = { action, data };
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' },
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast(result.data.message || 'Operation successful!');
                    hideModal();
                    await fetchSuppliers(); // Refresh data from sheet
                } else {
                    throw new Error(result.message || `Failed to perform action: ${action}`);
                }
            } catch (error) {
                console.error(`${action} Error:`, error);
                showToast(error.message, 'error');
            } finally {
                showLoader(false);
                saveBtn.disabled = false;
            }
        };

        const handleFormSubmit = (e) => {
            e.preventDefault();
            const mode = formModeInput.value;
            
            const supplierData = {
                SupplierCode: document.getElementById('supplierCode').value.trim(),
                SupplierName: document.getElementById('supplierName').value.trim(),
                InvoiceDiscount: document.getElementById('invoiceDiscount').value,
                ReturnPeriod: document.getElementById('returnPeriod').value,
            };

            const action = mode === 'add' ? 'create' : 'update';
            if (mode === 'edit') {
                supplierData.originalSupplierCode = originalSupplierCodeInput.value;
            }
            
            postData(action, supplierData);
        };
        
        const handleDelete = (supplierCode) => {
            if (!confirm(`Are you sure you want to delete supplier ${supplierCode}? This action cannot be undone.`)) {
                return;
            }
            postData('delete', { supplierCode });
        };
        
        // --- MODAL & UI LOGIC ---

        const showModal = (mode = 'add', supplier = null) => {
            formModeInput.value = mode;
            supplierForm.reset();
            
            if (mode === 'add') {
                modalTitle.textContent = 'Add New Supplier';
                document.getElementById('supplierCode').disabled = false;
            } else if (mode === 'edit' && supplier) {
                modalTitle.textContent = 'Edit Supplier';
                document.getElementById('supplierCode').value = supplier.SupplierCode;
                document.getElementById('supplierName').value = supplier.SupplierName;
                document.getElementById('invoiceDiscount').value = supplier.InvoiceDiscount;
                document.getElementById('returnPeriod').value = supplier.ReturnPeriod;
                originalSupplierCodeInput.value = supplier.SupplierCode; // Keep track of the original code
                document.getElementById('supplierCode').disabled = false; // Allow editing code, backend handles mapping
            }
            modal.classList.add('show');
        };

        const hideModal = () => {
            modal.classList.remove('show');
        };

        const handleFilter = (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredSuppliers = allSuppliers.filter(supplier =>
                (supplier.SupplierName || '').toLowerCase().includes(searchTerm) ||
                (supplier.SupplierCode || '').toLowerCase().includes(searchTerm)
            );
            renderSuppliers(filteredSuppliers);
        };
        
        // --- EVENT LISTENERS ---
        document.addEventListener('DOMContentLoaded', fetchSuppliers);

        addSupplierBtn.addEventListener('click', () => showModal('add'));
        closeModalBtn.addEventListener('click', hideModal);
        cancelBtn.addEventListener('click', hideModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) hideModal();
        });
        
        supplierForm.addEventListener('submit', handleFormSubmit);
        searchInput.addEventListener('input', handleFilter);
        
        supplierGrid.addEventListener('click', (e) => {
            const target = e.target.closest('.btn'); // More robust event delegation
            if (!target) return;

            const card = target.closest('.supplier-card');
            const code = card.querySelector('.code').textContent;

            if (target.classList.contains('btn-edit')) {
                const supplierToEdit = allSuppliers.find(s => s.SupplierCode == code);
                if (supplierToEdit) showModal('edit', supplierToEdit);
            }
            
            if (target.classList.contains('btn-delete')) {
                handleDelete(code);
            }
        });

    </script>
</body>
</html>
