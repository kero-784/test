<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Task Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    
    <!-- Libraries for JPG Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f4f7fa;
            --primary-text: #1a202c;
            --secondary-text: #718096;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --green: #48bb78;
            --red: #f56565;
            --gray: #a0aec0;
            --blue: #4299e1;
            --font-family: 'Cairo', sans-serif;
        }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--primary-text); line-height: 1.6; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .hidden { display: none !important; }
        h1, h2 { font-weight: 700; }
        
        /* --- Buttons & General UI --- */
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-family: var(--font-family); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn:disabled { background-color: var(--gray); cursor: not-allowed; }
        .btn-primary { background-color: var(--blue); color: white; }
        .btn-primary:not(:disabled):hover { background-color: #3182ce; transform: translateY(-2px); }

        /* --- Header --- */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        
        /* --- Views (Dashboard / Task Details) --- */
        .view { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Dashboard View --- */
        #dashboardView .task-list { display: grid; gap: 1rem; }
        #dashboardView .task-item { background: var(--card-bg); padding: 1.25rem; border-radius: 12px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border-right: 5px solid var(--blue); }
        #dashboardView .task-item:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        #dashboardView .task-item-name { font-size: 1.2rem; font-weight: 600; }

        /* --- Task Detail View --- */
        #taskDetailView #branchGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
        .branch-card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .branch-name { font-size: 1.2rem; font-weight: 600; }

        /* --- NEW: Status Radio Button Group Styling --- */
        .status-radio-group { display: flex; gap: 0.5rem; width: 100%; justify-content: space-around; }
        .status-radio-group input[type="radio"] { display: none; }
        .status-radio-group label {
            flex-grow: 1; text-align: center; padding: 0.5rem; border-radius: 20px;
            font-weight: 600; font-size: 0.9rem; cursor: pointer; user-select: none;
            border: 2px solid var(--border-color); color: var(--secondary-text); transition: all 0.2s ease;
        }
        /* Style for selected (checked) radio button label */
        .status-radio-group input[type="radio"]:checked + label { color: white; transform: scale(1.05); }
        .status-radio-group input[value="done"]:checked + label { background-color: var(--green); border-color: var(--green); }
        .status-radio-group input[value="pending"]:checked + label { background-color: var(--red); border-color: var(--red); }
        .status-radio-group input[value="not-required"]:checked + label { background-color: var(--gray); border-color: var(--gray); }

        /* --- Loader and Messages --- */
        .message-container { text-align: center; padding: 4rem; font-size: 1.2rem; color: var(--secondary-text); }
        .message-container .fa-spinner { font-size: 2rem; }

        /* --- NEW: Hidden JPG Report Container Styling --- */
        #reportContainer {
            display: none; /* Hidden by default */
            width: 800px;
            padding: 40px;
            background: white;
            font-family: var(--font-family);
            color: var(--primary-text);
            border: 1px solid var(--border-color);
        }
        #reportHeader h2 { font-size: 24px; color: var(--blue); }
        #reportHeader p { font-size: 16px; color: var(--secondary-text); }
        #reportSummary { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; }
        #reportStats { display: flex; flex-direction: column; gap: 15px; }
        .stat-item { font-size: 18px; }
        .stat-item span { font-weight: 700; padding: 3px 8px; border-radius: 5px; color: white; margin-right: 10px; }
        .stat-done { background-color: var(--green); }
        .stat-pending { background-color: var(--red); }
        .stat-not-required { background-color: var(--gray); }
        #reportChartContainer { width: 150px; height: 150px; }
        #reportBranchList {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px 20px; border-top: 1px solid var(--border-color); padding-top: 20px;
        }
        .report-branch-item { display: flex; justify-content: space-between; padding: 8px; border-radius: 5px; }
        .report-branch-item:nth-child(odd) { background-color: #f9fafb; }
        .report-branch-item .status { font-weight: 700; }
        .report-branch-item .status-done { color: var(--green); }
        .report-branch-item .status-pending { color: var(--red); }
        .report-branch-item .status-not-required { color: var(--gray); }
        #reportFooter { text-align: center; margin-top: 30px; font-size: 12px; color: var(--secondary-text); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 id="mainTitle">لوحة التحكم الرئيسية</h1>
            <div>
                <button class="btn btn-secondary hidden" id="backToDashboardBtn">العودة</button>
                <button class="btn btn-primary" id="addTaskBtn">إضافة مهمة</button>
                <button class="btn btn-primary hidden" id="downloadReportBtn">تحميل تقرير JPG</button>
            </div>
        </header>
        <div id="contentArea"></div>
    </div>
    
    <!-- This is the hidden template that will be converted to a JPG -->
    <div id="reportContainer">
        <div id="reportHeader">
            <h2 id="reportTaskName"></h2>
            <p>تقرير حالة استجابة الفروع</p>
        </div>
        <div id="reportSummary">
            <div id="reportStats"></div>
            <div id="reportChartContainer">
                <canvas id="reportChart"></canvas>
            </div>
        </div>
        <div id="reportBranchList"></div>
        <div id="reportFooter">
            <p>تم إنشاء هذا التقرير بتاريخ: <span id="reportDate"></span></p>
        </div>
    </div>
</body>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // !!! IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT URL HERE !!!
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAtsnQADumOh4-5certhapwfppDOc5Cn7MnZO0L_xVwp_edZcj3IqPofKlBOaMlllGfw/exec'; 

    const mainTitle = document.getElementById('mainTitle');
    const contentArea = document.getElementById('contentArea');
    const backToDashboardBtn = document.getElementById('backToDashboardBtn');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const downloadReportBtn = document.getElementById('downloadReportBtn');
    let currentTaskData = null;
    let currentChartInstance = null;

    // --- API Function (No changes needed here) ---
    async function apiCall(action, method = 'GET', body = null) {
        const url = new URL(SCRIPT_URL);
        const options = { method: method, redirect: 'follow' };
        if (method === 'POST') {
            const postData = body || {};
            postData.action = action;
            options.body = JSON.stringify(postData);
        } else {
            url.searchParams.append('action', action);
            if (body) {
                Object.keys(body).forEach(key => url.searchParams.append(key, body[key]));
            }
        }
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`Network response error: ${response.statusText}`);
            const data = await response.json();
            if (!data.success) throw new Error(data.message || 'API error');
            return data;
        } catch (error) {
            console.error(`API Error on action '${action}':`, error);
            alert(`Error: ${error.message}`);
            throw error;
        }
    }

    // --- View Rendering ---
    function showLoader(message = 'جاري التحميل...') {
        contentArea.innerHTML = `<div class="message-container"><i class="fas fa-spinner fa-spin"></i><p>${message}</p></div>`;
        mainTitle.textContent = 'الرجاء الانتظار';
        backToDashboardBtn.classList.add('hidden');
        addTaskBtn.classList.add('hidden');
        downloadReportBtn.classList.add('hidden');
    }

    function showDashboardView(tasks) {
        mainTitle.textContent = 'لوحة التحكم الرئيسية';
        backToDashboardBtn.classList.add('hidden');
        addTaskBtn.classList.remove('hidden');
        downloadReportBtn.classList.add('hidden');
        let content = '<div id="dashboardView" class="view"><div id="taskList" class="task-list">';
        if (tasks.length === 0) {
            content += `<p>لا توجد مهام. أضف مهمة جديدة.</p>`;
        } else {
            tasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(task => {
                content += `<div class="task-item" data-task-id="${task.id}"><div class="task-item-name">${task.name}</div><i class="fa-solid fa-chevron-left"></i></div>`;
            });
        }
        content += '</div></div>';
        contentArea.innerHTML = content;
    }

    function showTaskDetailView(data) {
        currentTaskData = data;
        mainTitle.textContent = data.task.name;
        backToDashboardBtn.classList.remove('hidden');
        addTaskBtn.classList.add('hidden');
        downloadReportBtn.classList.remove('hidden');

        let branchesHtml = '';
        data.branches.forEach(branch => {
            branchesHtml += `
                <div class="branch-card">
                    <div class="branch-name">${branch.name}</div>
                    <div class="status-radio-group" data-branch-id="${branch.id}">
                        <input type="radio" id="pending-${branch.id}" name="status-${branch.id}" value="pending" ${branch.status === 'pending' ? 'checked' : ''}>
                        <label for="pending-${branch.id}">لم يتم</label>
                        
                        <input type="radio" id="done-${branch.id}" name="status-${branch.id}" value="done" ${branch.status === 'done' ? 'checked' : ''}>
                        <label for="done-${branch.id}">تم</label>
                        
                        <input type="radio" id="not-required-${branch.id}" name="status-${branch.id}" value="not-required" ${branch.status === 'not-required' ? 'checked' : ''}>
                        <label for="not-required-${branch.id}">غير مطلوب</label>
                    </div>
                </div>
            `;
        });
        contentArea.innerHTML = `<div id="taskDetailView" class="view"><div id="branchGrid">${branchesHtml}</div></div>`;
    }

    // --- Event Handlers ---
    async function handleLoadDashboard() { /* ... unchanged ... */ } // Placeholder, full code below
    async function handleSelectTask(e) { /* ... unchanged ... */ } // Placeholder, full code below

    async function handleStatusChange(e) {
        if (e.target.name.startsWith('status-')) {
            const radio = e.target;
            const newStatus = radio.value;
            const branchID = radio.name.split('-')[1];
            const taskID = currentTaskData.task.id;
            
            radio.disabled = true; // Prevent multiple clicks while updating
            try {
                await apiCall('updateStatus', 'POST', { taskID, branchID, newStatus });
                const branch = currentTaskData.branches.find(b => b.id == branchID);
                branch.status = newStatus; // Update local state
            } catch (error) {
                // If API call fails, revert the radio button
                radio.checked = false; 
                const oldStatus = currentTaskData.branches.find(b => b.id == branchID).status;
                document.getElementById(`${oldStatus}-${branchID}`).checked = true;
            } finally {
                radio.disabled = false;
            }
        }
    }

    async function handleDownloadReport() {
        if (!currentTaskData) return;
        showLoader('جاري إنشاء التقرير...');
        
        try {
            // 1. Populate the hidden report template with data
            const stats = {
                done: currentTaskData.branches.filter(b => b.status === 'done').length,
                pending: currentTaskData.branches.filter(b => b.status === 'pending').length,
                notRequired: currentTaskData.branches.filter(b => b.status === 'not-required').length
            };
            
            document.getElementById('reportTaskName').textContent = currentTaskData.task.name;
            document.getElementById('reportDate').textContent = new Date().toLocaleString('ar-EG');
            
            document.getElementById('reportStats').innerHTML = `
                <div class="stat-item"><span class="stat-done">${stats.done}</span> تم التنفيذ</div>
                <div class="stat-item"><span class="stat-pending">${stats.pending}</span> لم يتم</div>
                <div class="stat-item"><span class="stat-not-required">${stats.notRequired}</span> غير مطلوب</div>
            `;

            const statusTranslations = {'done': 'تم', 'pending': 'لم يتم', 'not-required': 'غير مطلوب'};
            const statusClasses = {'done': 'status-done', 'pending': 'status-pending', 'not-required': 'status-not-required'};
            document.getElementById('reportBranchList').innerHTML = currentTaskData.branches.map(b => 
                `<div class="report-branch-item">
                    <span>${b.name}</span>
                    <span class="status ${statusClasses[b.status]}">${statusTranslations[b.status]}</span>
                 </div>`
            ).join('');
            
            // 2. Render the pie chart
            const chartCanvas = document.getElementById('reportChart');
            if (currentChartInstance) {
                currentChartInstance.destroy();
            }
            currentChartInstance = new Chart(chartCanvas, {
                type: 'pie',
                data: {
                    labels: ['تم', 'لم يتم', 'غير مطلوب'],
                    datasets: [{
                        data: [stats.done, stats.pending, stats.notRequired],
                        backgroundColor: [getComputedStyle(document.body).getPropertyValue('--green'), getComputedStyle(document.body).getPropertyValue('--red'), getComputedStyle(document.body).getPropertyValue('--gray')]
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            // 3. Use html2canvas to create the JPG
            const reportElement = document.getElementById('reportContainer');
            reportElement.style.display = 'block'; // Make it visible for rendering
            reportElement.style.position = 'absolute';
            reportElement.style.top = '-9999px'; // Position it off-screen

            await new Promise(resolve => setTimeout(resolve, 500)); // Allow chart animation to finish

            const canvas = await html2canvas(reportElement, { useCORS: true, scale: 2 });
            const link = document.createElement('a');
            link.download = `report_${currentTaskData.task.name.replace(/[\s\W]/g, '_')}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();

            reportElement.style.display = 'none'; // Hide it again

        } catch (err) {
            console.error("Failed to generate report:", err);
            alert("فشل إنشاء التقرير. الرجاء المحاولة مرة أخرى.");
        } finally {
            // Go back to the task detail view
            showTaskDetailView(currentTaskData);
        }
    }

    // --- Full Event Handlers and Initializer (for copy-pasting) ---
    async function handleLoadDashboard() {
        showLoader();
        try {
            const data = await apiCall('getTasks');
            showDashboardView(data.tasks);
        } catch (error) {
            contentArea.innerHTML = `<div class="message-container"><p>Failed to load data. Please check the API URL and try again.</p></div>`;
        }
    }
    async function handleSelectTask(e) {
        const taskItem = e.target.closest('.task-item');
        if (!taskItem) return;
        const taskID = taskItem.dataset.taskId;
        showLoader(`Loading details for: ${taskItem.querySelector('.task-item-name').textContent}...`);
        try {
            const data = await apiCall('getTaskDetails', 'GET', { taskID });
            showTaskDetailView(data);
        } catch (error) {
            await handleLoadDashboard();
        }
    }
    // Dummy functions for modal - assumed to exist from previous versions
    function setupModalListeners() {
        // This part of the code for adding a task is assumed to exist and work.
        // It's removed for brevity but should be in your final code.
    }

    // Event Listeners
    contentArea.addEventListener('click', handleSelectTask);
    contentArea.addEventListener('change', handleStatusChange); // Use 'change' for radio buttons
    backToDashboardBtn.addEventListener('click', handleLoadDashboard);
    downloadReportBtn.addEventListener('click', handleDownloadReport);
    setupModalListeners(); // Call this if you have the modal code

    // Initial Load
    handleLoadDashboard();
});
</script>
</html>
