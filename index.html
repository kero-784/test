<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf Price Pro</title>
    <!-- The link to favicon.png is removed to prevent 404 errors if the file doesn't exist. -->
    <!-- You can add it back if you have the file: <link rel="icon" type="image/png" href="favicon.png"> -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');

        :root {
            /* Color Palette */
            --bg-color: #f8fafc;
            --preview-bg: #e2e8f0;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #16a34a;
            --error-color: #dc2626;

            /* Sizing & Spacing */
            --spacing-1: 4px; --spacing-2: 8px; --spacing-3: 12px; --spacing-4: 16px;
            --spacing-5: 20px; --spacing-6: 24px; --spacing-8: 32px;

            /* Borders & Shadows */
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.07), 0 4px 6px -4px rgba(0,0,0,0.07);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

            /* Dynamic Label Properties (Controlled by JS) */
            --label-price-color: #dc2626;
            --label-border-width: 1px;
            --label-border-style: dashed;
            --label-border-color: #cbd5e1;
            --label-padding: 5px;
            --label-border-radius: 8px;
            --price-box-bg: rgba(255, 255, 255, 0.85);
            --price-box-border-color: var(--label-price-color);
            --label-item-font-size: 16px;
            --label-item-font-weight: 700;
            --label-item-text-transform: none;
            --label-price-font-size: 24px;
        }

        /* --- Base & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex; height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- Main Layout --- */
        .app-container { display: flex; width: 100%; height: 100%; flex-direction: row-reverse; }
        .control-panel {
            width: 550px; /* Increased dashboard size */
            min-width: 550px;
            background-color: var(--bg-color);
            padding: var(--spacing-6) var(--spacing-8);
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid var(--border-color);
        }
        .preview-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-8);
            height: 100vh;
            background: var(--preview-bg);
            position: relative;
        }

        /* --- Typography & Global Elements --- */
        h1 { font-size: 2.25rem; font-weight: 700; color: var(--text-primary); margin-bottom: var(--spacing-2); }
        .app-tagline { font-size: 1rem; color: var(--text-secondary); margin-bottom: var(--spacing-8); }
        h2 {
            font-size: 1.125rem; font-weight: 600; color: var(--text-primary); margin-bottom: var(--spacing-4);
            display: flex; align-items: center; justify-content: space-between;
        }
        fieldset { border: none; padding: 0; margin: 0; }
        legend { font-weight: 600; font-size: 1rem; color: var(--text-primary); padding: 0; margin-bottom: var(--spacing-3); }

        /* --- Components --- */
        .card { background: var(--card-bg); padding: var(--spacing-6); border-radius: var(--radius-lg); box-shadow: var(--shadow); margin-bottom: var(--spacing-6); }
        
        button {
            background-color: var(--primary-color); color: white; border: none; padding: var(--spacing-3) var(--spacing-5);
            border-radius: var(--radius-md); font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: var(--transition); box-shadow: var(--shadow);
            display: inline-flex; align-items: center; justify-content: center; gap: var(--spacing-2);
        }
        button:hover:not(:disabled) { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        button.secondary { background-color: #e2e8f0; color: var(--text-secondary); }
        button.secondary:hover:not(:disabled) { background-color: #cbd5e1; color: var(--text-primary); }
        .btn-icon svg { width: 16px; height: 16px; }

        input, select {
            width: 100%; padding: var(--spacing-3); border-radius: var(--radius-md);
            border: 1px solid var(--border-color); font-family: 'Cairo', sans-serif;
            background-color: #f8fafc; transition: var(--transition); font-size: 0.95rem;
        }
        input:focus, select:focus { border-color: var(--primary-color); background-color: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); outline: none; }
        input[type="color"] { padding: 4px; height: 44px; }
        input[type="checkbox"] { width: auto; }

        /* --- Specific Component Styling --- */
        #app-status { padding: var(--spacing-3) var(--spacing-4); margin-bottom: var(--spacing-5); border-radius: var(--radius-md); color: #fff; text-align: center; font-weight: 600; box-shadow: var(--shadow); display: none; align-items: center; justify-content: center; gap: var(--spacing-3); }
        #app-status.error { background: var(--error-color); }
        #app-status.success { background: var(--success-color); }
        #app-status .icon svg { width: 20px; height: 20px; fill: white; }

        #search-controls { display: flex; gap: var(--spacing-3); margin-bottom: var(--spacing-4); }
        #search-field { flex: 0 0 120px; }
        #search-input { flex-grow: 1; }
        
        #item-list { max-height: 28vh; overflow-y: auto; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: white; }
        .item-card { display: flex; align-items: center; padding: var(--spacing-3); border-bottom: 1px solid var(--border-color); transition: var(--transition); cursor: pointer; position: relative; }
        .item-card:last-child { border-bottom: none; }
        .item-card:hover { background-color: #f8fafc; }
        .item-card.selected { background-color: #eff6ff; color: #1e40af; font-weight: 600; }
        .item-card.selected::before { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px; background-color: var(--primary-color); }
        .item-card input[type="checkbox"] { margin-left: var(--spacing-4); transform: scale(1.2); accent-color: var(--primary-color); }
        .item-card .details { display: flex; flex-direction: column; }
        .item-card .item-meta { font-size: 0.8rem; color: var(--text-secondary); }
        .item-card.selected .item-meta { color: #60a5fa; }
        
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 28px; height: 28px; animation: spin 1s linear infinite; margin: var(--spacing-8) auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #print-queue-list { max-height: 25vh; overflow-y: auto; }
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: var(--spacing-3); border-bottom: 1px solid var(--border-color); }
        .queue-item:last-child { border-bottom: none; }
        .queue-item-details { display: flex; flex-direction: column; gap: var(--spacing-1); }
        .queue-item-name { font-weight: 600; color: var(--text-primary); }
        .queue-item-meta { font-size: 0.9rem; color: var(--text-secondary); }
        .queue-item-remove { background: #fee2e2; color: #b91c1c; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; transition: var(--transition); }
        .queue-item-remove:hover { background: var(--error-color); color: white; transform: scale(1.1); box-shadow: none; }
        .empty-queue-message { text-align: center; padding: var(--spacing-8) 0; color: var(--text-secondary); }

        #designer-accordion summary { font-size: 1.25rem; font-weight: 700; cursor: pointer; list-style: none; display: flex; align-items: center; padding: var(--spacing-2) 0; }
        #designer-accordion summary::-webkit-details-marker { display: none; }
        #designer-accordion summary::before { content: '▶'; margin-left: var(--spacing-3); font-size: 0.8em; transition: transform 0.2s; }
        #designer-accordion[open] summary::before { transform: rotate(90deg); }
        #designer-accordion .designer-content { padding-top: var(--spacing-4); }

        .control-group { margin-bottom: var(--spacing-5); }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: var(--spacing-2); font-weight: 500; color: var(--text-secondary); font-size: 0.9rem;}
        .slider-value { font-weight: 600; color: var(--primary-color); }

        .grid-2, .grid-3 { display: grid; gap: var(--spacing-4); align-items: end; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        
        /* --- Preview Panel --- */
        #a4-sheet {
            background: white; width: 21cm; height: 29.7cm; box-shadow: var(--shadow-lg); padding: 1cm;
            transform-origin: center center; transform: scale(0.65); display: grid; align-content: start;
            transition: var(--transition);
        }
        #preview-empty-state {
            position: absolute; text-align: center; color: var(--text-secondary);
            display: none; flex-direction: column; align-items: center; gap: var(--spacing-4);
        }
        #preview-empty-state svg { width: 64px; height: 64px; opacity: 0.5; }
        #preview-empty-state h3 { font-size: 1.5rem; color: var(--text-primary); }
        #print-button { margin-top: var(--spacing-6); }

        /* --- Price Label (The final product) --- */
        .price-label {
            display: flex; flex-direction: row; align-items: stretch; /* Stretch for full height */
            overflow: hidden; background-color: var(--card-bg); color: var(--text-primary); font-family: 'Cairo', sans-serif;
            border: var(--label-border-width) var(--label-border-style) var(--label-border-color); border-radius: var(--label-border-radius); padding: var(--label-padding);
        }
        .label-logo-area { flex: 0 0 25%; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .label-logo-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .label-info-area { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 10px; font-size: var(--label-item-font-size); font-weight: var(--label-item-font-weight); text-transform: var(--label-item-text-transform); }
        .label-price-area { flex: 0 0 30%; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .label-price-container { border: 2px solid var(--price-box-border-color); border-radius: var(--radius-md); text-align: center; background: var(--price-box-bg); padding: 5px 10px; display: inline-block; }
        .label-price { font-size: var(--label-price-font-size); font-weight: 700; color: var(--label-price-color); white-space: nowrap; }
        
        /* --- Utilities & Print --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        @media print {
            .control-panel, #print-button, .app-status, #preview-empty-state { display: none !important; }
            body, .app-container, .preview-panel { display: block !important; width: 100% !important; height: auto !important; overflow: visible !important; background: #fff !important; padding: 0 !important; margin: 0 !important; }
            #a4-sheet { transform: none !important; box-shadow: none !important; border: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; height: auto !important; display: grid !important; page-break-after: always; }
            .price-label { page-break-inside: avoid !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; border-color: #000 !important; }
            body.pre-printed-mode .price-label { border: none !important; background: transparent !important; }
            body.pre-printed-mode .label-logo-area { visibility: hidden !important; }
            body.pre-printed-mode .label-price-container { border: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="preview-panel">
            <div id="preview-empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 5.25 6h.008a2.25 2.25 0 0 1 2.242 2.135l.004.017m.004.017a2.25 2.25 0 0 1-.242 1.243l-2.25 3.75c-.246.413.042.92.518.92h3.255a2.25 2.25 0 0 1 1.945 1.125l.93 1.638c.246.433.776.433 1.022 0l.93-1.638a2.25 2.25 0 0 1 1.945-1.125h3.255c.476 0 .764-.507.518-.92l-2.25-3.75a2.25 2.25 0 0 1-.242-1.243" /></svg>
                <h3>اللوحة فارغة</h3>
                <p>ابدأ بتحديد الأصناف وإضافتها إلى قائمة الطباعة.</p>
            </div>
            <div id="a4-sheet"></div>
            <button id="print-button" style="display:none;">
                <span class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 2.75C5 1.784 5.784 1 6.75 1h6.5c.966 0 1.75.784 1.75 1.75v3.552c.377.046.752.11 1.126.195.784.175 1.437.638 1.83 1.262.394.624.594 1.344.594 2.103v2.888c0 .76-.2 1.48-.594 2.104-.393.623-1.046 1.086-1.83 1.261-.374.086-.749.15-1.126.195v3.552C15 18.216 14.216 19 13.25 19h-6.5C5.784 19 5 18.216 5 17.25V2.75Zm.75 14.5v-2.888c0-.76.2-1.48.594-2.104.393-.623 1.046-1.086 1.83-1.261a23.99 23.99 0 0 1 2.652 0c.784.175 1.437.638 1.83 1.262.394.624.594 1.343.594 2.103v2.888a.75.75 0 0 1-.75.75h-8a.75.75 0 0 1-.75-.75Zm.75-9.75a.75.75 0 0 1 .75-.75h6.5a.75.75 0 0 1 0 1.5h-6.5a.75.75 0 0 1-.75-.75Zm0 3a.75.75 0 0 1 .75-.75h6.5a.75.75 0 0 1 0 1.5h-6.5a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" /></svg></span>
                طباعة
            </button>
        </div>
        
        <aside class="control-panel">
            <header>
                <h1>Shelf Price Pro</h1>
                <p class="app-tagline">أداة إنشاء بطاقات أسعار الأرفف بسهولة</p>
            </header>

            <div id="app-status"></div>

            <section id="selection-card" class="card">
                <h2>1. تحديد الأصناف والتسعير</h2>
                <div id="loader" class="loader" style="display: none;"></div>
                <div id="data-controls" style="display: none;">
                    <div id="search-controls">
                        <select id="search-field"><option value="name">الاسم</option><option value="code">الكود</option></select>
                        <input type="search" id="search-input" placeholder="اكتب للبحث عن صنف...">
                    </div>
                    <div id="item-list"></div>
                    <hr style="border:none; border-top: 1px solid var(--border-color); margin: var(--spacing-5) 0;">
                    <div class="grid-3" style="gap: var(--spacing-3);">
                       <input type="number" id="price-input" placeholder="أدخل السعر" step="0.01" min="0">
                       <input type="number" id="quantity-input" placeholder="الكمية" value="1" min="1">
                       <button id="add-to-queue-btn">
                         <span class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" /></svg></span>
                         إضافة
                       </button>
                    </div>
                </div>
            </section>

            <section id="print-queue-card" class="card" style="display: none;">
                <h2 id="print-queue-header">قائمة الطباعة</h2>
                <div id="print-queue-list"></div>
            </section>
            
            <details id="designer-accordion">
                <summary>إعدادات المصمم</summary>
                <div class="designer-content card">
                    <fieldset>
                        <legend>إعدادات الطباعة العامة</legend>
                        <div class="control-group">
                            <label style="display: flex; align-items: center; gap: var(--spacing-3); cursor: pointer; font-weight: 500; color: var(--text-primary);">
                                <input type="checkbox" id="pre-printed-mode-checkbox" style="transform: scale(1.1);">
                                <span>الطباعة على نموذج مُعد مسبقاً</span>

                        </div>
                    </fieldset>
                    <hr style="border:none; border-top: 1px solid var(--border-color); margin: var(--spacing-5) 0;">
                    <div class="grid-2">
                        <fieldset>
                            <legend>الإطار والحدود</legend>
                            <div class="control-group"><label>الحشو (px): <span id="label-padding-value" class="slider-value">5</span></label><input type="range" id="label-padding" min="0" max="20" value="5"></div>
                            <div class="control-group"><label>حواف دائرية (px): <span id="label-border-radius-value" class="slider-value">8</span></label><input type="range" id="label-border-radius" min="0" max="30" value="8"></div>
                            <div class="control-group grid-3" style="gap: var(--spacing-3)">
                                <div><label>عرض الإطار</label><input type="number" id="label-border-width" value="1" min="0"></div>
                                <div><label>لون الإطار</label><input type="color" id="label-border-color" value="#cbd5e1"></div>
                                <div><label>نمط الإطار</label><select id="label-border-style"><option value="dashed">متقطع</option><option value="solid">صلب</option><option value="dotted">منقط</option><option value="double">مزدوج</option></select></div>
                            </div>
                        </fieldset>
                        <fieldset>
                            <legend>الألوان</legend>
                            <div class="control-group"><label>لون السعر</label><input type="color" id="label-price-color" value="#dc2626"></div>
                            <div class="control-group"><label>إطار السعر</label><input type="color" id="price-box-border-color" value="#dc2626"></div>
                            <div class="control-group"><label>خلفية السعر</label><input type="color" id="price-box-bg" value="#ffffff"></div>

                        <legend>النصوص والخطوط</legend>

                             <div class="control-group"><label>خط الصنف (px): <span id="item-font-size-value" class="slider-value">16</span></label><input type="range" id="item-font-size" min="8" max="28" value="16"></div>
                             <div class="control-group"><label>خط السعر (px): <span id="price-font-size-value" class="slider-value">24</span></label><input type="range" id="price-font-size" min="12" max="48" value="24"></div>
                             <div class="control-group"><label>وزن الخط</label><select id="item-font-weight"><option value="400">عادي</option><option value="700" selected>عريض</option></select></div>
                             <div class="control-group"><label>حالة الأحرف</label><select id="item-text-transform"><option value="none">عادي</option><option value="uppercase">أحرف كبيرة</option></select></div>
                        </div>
                    </fieldset>
                </div>

        </aside>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // --- Configuration ---
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyMvUxMBy7UyTWAqT7EMYlwkTdh1Zdc0BWupeMVOYyJSWxcivkSBnozStQSfJGacklAXQ/exec';
    const LOGO_SRC = 'logo.png'; // Make sure this file exists or change the path

    // --- State Management ---
    const state = { allItems: [], selectedItemIds: new Set(), printQueue: [] };

    // --- DOM Element Cache ---
    const dom = {
        appStatus: document.getElementById('app-status'),
        loader: document.getElementById('loader'),
        dataControls: document.getElementById('data-controls'),
        selection: {
            searchInput: document.getElementById('search-input'),
            searchField: document.getElementById('search-field'),
            itemList: document.getElementById('item-list'),
            priceInput: document.getElementById('price-input'),
            quantityInput: document.getElementById('quantity-input'),
            addToQueueBtn: document.getElementById('add-to-queue-btn'),
        },
        queue: {
            card: document.getElementById('print-queue-card'),
            header: document.getElementById('print-queue-header'),
            list: document.getElementById('print-queue-list'),
        },
        preview: {
            a4Sheet: document.getElementById('a4-sheet'),
            printButton: document.getElementById('print-button'),
            emptyState: document.getElementById('preview-empty-state'),
        },
        designerControls: {}
    };
    const controlIds = [
        'label-padding', 'label-border-width', 'label-border-color', 'label-border-style', 'label-border-radius', 
        'item-font-size', 'price-font-size', 'item-font-weight', 'item-text-transform', 
        'price-box-bg', 'price-box-border-color', 'label-price-color', 'pre-printed-mode-checkbox'
    ];
    controlIds.forEach(id => { dom.designerControls[id.replace(/-(\w)/g, (m, p1) => p1.toUpperCase())] = document.getElementById(id); });

    // --- Utility Functions ---
    const debounce = (func, delay) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => func.apply(this, a), delay); }; };
    const showStatus = (message, type = 'error') => {
        const icons = {
            success: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" /></svg>`,
            error: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" /></svg>`
        };
        dom.appStatus.innerHTML = `<span class="icon">${icons[type]}</span> ${message}`;
        dom.appStatus.className = `app-status ${type}`;
        dom.appStatus.style.display = 'flex';
        setTimeout(() => { dom.appStatus.style.display = 'none'; }, type === 'error' ? 8000 : 4000);
    };
    const findCommon = (arr) => {
        if (!arr || arr.length === 0) return '';
        const wordsArr = arr.map(s => String(s).split(' '));
        let common = [];
        for (let i = 0; i < wordsArr[0].length; i++) {
            let word = wordsArr[0][i];
            if (wordsArr.every(words => words[i] === word)) { common.push(word); } else { break; }
        }
        return common.join(' ');
    };
    const extractUnit = (name) => {
        const units = ['ملل', 'مل', 'جم', 'جرام', 'كجم', 'لتر', 'متر'];
        const regex = new RegExp(`(\\d*\\.?\\d+\\s?(${units.join('|')}))($|\\s)`);
        const match = name.match(regex);
        return match ? match[1].trim() : null;
    };
    
    // --- Core Rendering Functions (Performance Optimized) ---
    const renderItems = (items) => {
        const fragment = document.createDocumentFragment();
        if (items.length === 0) {
            const p = document.createElement('p');
            p.className = 'empty-queue-message';
            p.textContent = 'لا توجد نتائج مطابقة';
            fragment.appendChild(p);
        } else {
            items.forEach(item => {
                const isSelected = state.selectedItemIds.has(item.id);
                const card = document.createElement('label');
                card.className = `item-card ${isSelected ? 'selected' : ''}`;
                card.innerHTML = `<input type="checkbox" data-id="${item.id}" ${isSelected ? 'checked' : ''}><div class="details"><span class="item-name">${item.name}</span><span class="item-meta">الكود: ${item.code || 'N/A'}</span></div>`;
                card.querySelector('input').addEventListener('change', (e) => {
                    const id = parseInt(e.target.dataset.id);
                    e.target.checked ? state.selectedItemIds.add(id) : state.selectedItemIds.delete(id);
                    card.classList.toggle('selected', e.target.checked);
                });
                fragment.appendChild(card);
            });
        }
        dom.selection.itemList.innerHTML = '';
        dom.selection.itemList.appendChild(fragment);
    };

    const renderPrintQueue = () => {
        const totalItems = state.printQueue.length;
        if (totalItems === 0) {
            dom.queue.card.style.display = 'none';
            return;
        }

        dom.queue.card.style.display = 'block';
        const totalLabels = state.printQueue.reduce((sum, job) => sum + parseInt(job.quantity), 0);
        
        let headerHTML = `قائمة الطباعة (${totalItems} صنف / ${totalLabels} بطاقة)`;
        headerHTML += ` <button id="clear-queue-btn" class="secondary" style="font-size: 0.8rem; padding: 4px 10px;">مسح الكل</button>`;
        dom.queue.header.innerHTML = headerHTML;
        
        const fragment = document.createDocumentFragment();
        state.printQueue.forEach(job => {
            const itemEl = document.createElement('div');
            itemEl.className = 'queue-item';
            itemEl.innerHTML = `
                <div class="queue-item-details">
                    <span class="queue-item-name">${job.name}</span>
                    <span class="queue-item-meta">السعر: ${job.price.toFixed(2)} ج.م - الكمية: ${job.quantity}</span>
                </div>
                <button class="queue-item-remove" data-id="${job.id}" title="إزالة">×</button>
            `;
            fragment.appendChild(itemEl);
        });
        dom.queue.list.innerHTML = '';
        dom.queue.list.appendChild(fragment);
    };

    const updateStyles = () => {
        const root = document.documentElement.style;
        const c = dom.designerControls;
        root.setProperty('--label-padding', `${c.labelPadding.value}px`);
        root.setProperty('--label-border-width', `${c.labelBorderWidth.value}px`);
        root.setProperty('--label-border-style', c.labelBorderStyle.value);
        root.setProperty('--label-border-color', c.labelBorderColor.value);
        root.setProperty('--label-border-radius', `${c.labelBorderRadius.value}px`);
        root.setProperty('--price-box-bg', c.priceBoxBg.value);
        root.setProperty('--price-box-border-color', c.priceBoxBorderColor.value);
        root.setProperty('--label-price-color', c.labelPriceColor.value);
        root.setProperty('--label-item-font-size', `${c.itemFontSize.value}px`);
        root.setProperty('--label-item-font-weight', c.itemFontWeight.value);
        root.setProperty('--label-item-text-transform', c.itemTextTransform.value);
        root.setProperty('--label-price-font-size', `${c.priceFontSize.value}px`);
        document.body.classList.toggle('pre-printed-mode', c.prePrintedModeCheckbox.checked);
    };

    const renderPreviewDOM = () => {
        const labelsToRender = state.printQueue.flatMap(job => Array(parseInt(job.quantity)).fill(job));
        const isEmpty = labelsToRender.length === 0;

        dom.preview.a4Sheet.style.display = isEmpty ? 'none' : 'grid';
        dom.preview.emptyState.style.display = isEmpty ? 'flex' : 'none';
        dom.preview.printButton.style.display = isEmpty ? 'none' : 'inline-flex';
        
        if (isEmpty) return;

        const PAGE_HEIGHT_MM = 297, MARGIN_MM = 10, PRINTABLE_HEIGHT = PAGE_HEIGHT_MM - (MARGIN_MM * 2);
        const labelHeight = 30, gap = 5;
        const labelsPerPage = Math.floor((PRINTABLE_HEIGHT + gap) / (labelHeight + gap));
        
        const fragment = document.createDocumentFragment();
        dom.preview.a4Sheet.style.gridTemplateColumns = '1fr';
        dom.preview.a4Sheet.style.gap = `${gap}mm`;
        dom.preview.a4Sheet.style.gridTemplateRows = `repeat(${labelsPerPage}, ${labelHeight}mm)`;
        
        const logoHtml = `<img src="${LOGO_SRC}" alt="Logo" onerror="this.style.display='none'">`;
        
        for (let i = 0; i < Math.min(labelsToRender.length, labelsPerPage); i++) {
            const job = labelsToRender[i];
            const label = document.createElement('div');
            label.className = 'price-label';
            label.innerHTML = `
                <div class="label-logo-area">${logoHtml}</div>
                <div class="label-info-area">${job.name}</div>
                <div class="label-price-area"><div class="label-price-container"><div class="label-price">${job.price.toFixed(2)} ج.م</div></div></div>`;
            fragment.appendChild(label);
        }
        
        dom.preview.a4Sheet.innerHTML = '';
        dom.preview.a4Sheet.appendChild(fragment);
    };

    // --- Application Logic Functions ---
    const handleSearch = () => {
        const query = dom.selection.searchInput.value.toLowerCase().trim();
        const field = dom.selection.searchField.value;
        const filtered = !query ? state.allItems : state.allItems.filter(item => String(item[field] || '').toLowerCase().includes(query));
        renderItems(filtered);
    };

    const handleAddToQueue = () => {
        if (state.selectedItemIds.size === 0) return showStatus('يرجى تحديد صنف واحد على الأقل.', 'error');
        const price = parseFloat(dom.selection.priceInput.value);
        if (isNaN(price) || price <= 0) return showStatus('يرجى إدخال سعر صحيح وموجب.', 'error');
        const quantity = parseInt(dom.selection.quantityInput.value);
        if (isNaN(quantity) || quantity < 1) return showStatus('يرجى إدخال كمية صحيحة.', 'error');
        
        const selectedItems = state.allItems.filter(item => state.selectedItemIds.has(item.id));
        let newName;
        
        if (selectedItems.length === 1) { newName = selectedItems[0].name; } 
        else {
            const allNames = selectedItems.map(item => item.name);
            const allUnits = allNames.map(extractUnit).filter(Boolean);
            
            // BUG FIX: Correctly find the most common unit
            let commonUnit = '';
            if (allUnits.length > 0) {
                const unitCounts = allUnits.reduce((counts, unit) => {
                    counts[unit] = (counts[unit] || 0) + 1;
                    return counts;
                }, {});
                commonUnit = Object.keys(unitCounts).reduce((a, b) => unitCounts[a] > unitCounts[b] ? a : b);
            }
            
            const namesWithoutUnits = allNames.map(name => name.replace(extractUnit(name) || '', '').trim());
            const commonStart = findCommon(namesWithoutUnits);
            newName = [commonStart, "أنواع", commonUnit].filter(Boolean).join(' ').replace(/\s+/g, ' ');
        }
        
        state.printQueue.push({ id: Date.now(), name: newName, price, quantity });
        state.selectedItemIds.clear();
        dom.selection.priceInput.value = '';
        dom.selection.quantityInput.value = '1';
        dom.selection.searchInput.value = '';
        handleSearch(); // Rerender item list to uncheck all
        
        renderPrintQueue();
        renderPreviewDOM();
        showStatus(`تمت إضافة "${newName}" للقائمة بنجاح.`, 'success');
        dom.selection.priceInput.focus();
    };

    const loadData = async () => {
        dom.loader.style.display = 'block';
        dom.dataControls.style.display = 'none';
        try {
            const response = await fetch(WEB_APP_URL);
            if (!response.ok) throw new Error(`فشل الاتصال (Status: ${response.status})`);
            const data = await response.json();
            if (data.error) throw new Error(data.message);
            state.allItems = data.map((item, index) => ({ ...item, id: item.id != null ? item.id : index }));
            if (state.allItems.length > 0) {
                renderItems(state.allItems);
                showStatus(`تم تحميل ${state.allItems.length} صنف بنجاح.`, 'success');
            } else {
                showStatus('تم الاتصال ولكن لم يتم العثور على بيانات.', 'error');
            }
        } catch (error) {
            showStatus(`فشل تحميل البيانات: ${error.message}`, 'error');
        } finally {
            dom.loader.style.display = 'none';
            dom.dataControls.style.display = 'block';
        }
    };

    // --- Event Listeners Initialization ---
    const debouncedSearch = debounce(handleSearch, 250);
    const debouncedUpdateStyles = debounce(updateStyles, 50);

    dom.selection.addToQueueBtn.addEventListener('click', handleAddToQueue);
    dom.preview.printButton.addEventListener('click', () => window.print());
    dom.selection.searchInput.addEventListener('input', debouncedSearch);
    dom.selection.searchField.addEventListener('change', handleSearch);

    dom.queue.header.addEventListener('click', e => {
        if (e.target.id === 'clear-queue-btn') {
            state.printQueue = [];
            renderPrintQueue();
            renderPreviewDOM();
        }
    });

    dom.queue.list.addEventListener('click', e => {
        const removeButton = e.target.closest('.queue-item-remove');
        if (removeButton) {
            const jobId = parseInt(removeButton.dataset.id);
            state.printQueue = state.printQueue.filter(job => job.id !== jobId);
            renderPrintQueue();
            renderPreviewDOM();
        }
    });

    Object.values(dom.designerControls).forEach(control => {
        if (!control) return;
        const event = ['range', 'color', 'number'].includes(control.type) ? 'input' : 'change';
        control.addEventListener(event, debouncedUpdateStyles);
    });
    
    document.querySelectorAll('input[type="range"]').forEach(slider => {
        const valueSpan = document.getElementById(`${slider.id}-value`);
        if (valueSpan) {
            valueSpan.textContent = slider.value;
            slider.addEventListener('input', e => valueSpan.textContent = e.target.value);
        }
    });
    
    // --- Initial Application Boot ---
    updateStyles();
    renderPreviewDOM();
    loadData();
});
</script>
</body>
</html>
