<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav id="sidebar" class="bg-dark">
            <div class="sidebar-header">
                <h3><i class="bi bi-kanban-fill me-2"></i>TaskFlow</h3>
                <button class="btn btn-sm btn-outline-light d-md-none" id="sidebar-toggle">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#" data-view="dashboard" data-action="show-view"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="tasks" data-action="show-view"><i class="bi bi-list-task"></i><span>Tasks</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="calendar" data-action="show-view"><i class="bi bi-calendar-week"></i><span>Calendar</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="management" data-action="show-view"><i class="bi bi-building-gear"></i><span>Management</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="reports" data-action="show-view"><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a></li>
            </ul>
        </nav>

        <main id="main-content">
            <div class="top-bar d-flex justify-content-between align-items-center p-3 bg-white border-bottom">
                <button class="btn btn-outline-secondary d-md-none" id="mobile-menu-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <div class="position-relative me-3">
                    <button class="btn btn-light position-relative" id="notifications-btn">
                        <i class="bi bi-bell"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notification-badge">0</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end p-0" id="notifications-dropdown" style="width: 350px; max-height: 400px; overflow-y: auto;">
                        <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                            <h5 class="mb-0">Notifications</h5>
                            <button class="btn btn-sm btn-outline-secondary" data-action="mark-all-read">Mark all as read</button>
                        </div>
                        <div id="notifications-list"></div>
                    </div>
                </div>
            </div>
            
            <div class="content-container p-4">
                <div id="dashboard-view" class="view active-view"></div>
                <div id="tasks-view" class="view"></div>
                <div id="calendar-view" class="view"></div>
                <div id="management-view" class="view"></div>
                <div id="reports-view" class="view"></div>
            </div>
        </main>
    </div>

    <!-- Modals and overlays remain the same -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <div class="modal fade" id="confirm-modal" tabindex="-1">
        <!-- ... existing confirm modal ... -->
    </div>
    <div class="modal fade" id="edit-task-modal" tabindex="-1">
        <!-- ... existing edit task modal ... -->
    </div>
    <div id="loading-overlay"><div class="spinner-border text-light" style="width: 3rem; height: 3rem;" role="status"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src="script.js" defer></script>
</body>
</html>
