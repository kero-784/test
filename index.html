<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Management System</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="notification-sound" src="notification.mp3" preload="auto"></audio>
    <div id="toast-container"></div>
    <div id="loading-indicator"><div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div><p>Loading...</p></div>

    <div id="app-container">
        <!-- Login View -->
        <div id="login-view" class="view">
             <div id="login-form-container">
                <h3><i class="fas fa-lock mr-2"></i>System Login</h3>
                <p>Please enter your code to continue</p>
                <form id="login-form">
                    <div id="login-error" class="alert alert-danger" style="display:none;"></div>
                    <div class="form-group">
                        <label for="loginCode">Login Code</label>
                        <input type="text" id="loginCode" class="form-control" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Login</button>
                </form>
            </div>
        </div>

        <!-- Main Application View -->
        <div id="main-view" class="view">
            <div class="app-header">
                <h4 id="welcome-message" class="mb-0"></h4>
                <div id="nav-buttons" class="ml-auto mr-3"></div>
                <button id="logout-btn" class="btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            
            <div id="app-content-area">
                <!-- Content for Main App, Admin, and Reports will be injected here by script.js -->
            </div>
        </div>
    </div>

    <!-- MODAL & TEMPLATE DEFINITIONS -->
    
    <!-- Officer Action Modal -->
    <div class="modal fade" id="request-details-modal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title">Review Request <span id="modal-request-id-title"></span></h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body" id="officer-modal-body-exportable">
                    <div class="form-row align-items-end mb-3 p-3 bg-light border rounded">
                        <div class="col-md-5"><label for="master-status-select"><strong>Update All Items To:</strong></label><select id="master-status-select" class="form-control form-control-sm"><option value="">-- Select Status --</option><option>تم التعديل</option><option>غير مسموع بالتعديل ويتم رفع الصنف</option><option>تم التعديل جزئيا</option><option>يرجي مراجعة كود الاستثناء</option><option>يتم المراجعة مع المورد</option><option>Pending</option></select></div>
                    </div>
                    <div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Supplier</th><th>Current Price</th><th>Submitted Price</th><th>Status</th></tr></thead><tbody id="modal-items-tbody"></tbody></table></div>
                </div>
                <div class="modal-footer justify-content-between">
                    <div><button type="button" class="btn btn-outline-secondary" id="export-officer-btn"><i class="fas fa-file-image"></i> Export</button></div>
                    <div><button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button><button type="button" class="btn btn-info" id="save-item-changes-btn"><i class="fas fa-save"></i> Save</button><button type="button" class="btn btn-primary" id="finalize-for-branch-btn"><i class="fas fa-paper-plane"></i> Notify Branch</button></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Branch User View Details Modal -->
    <div class="modal fade" id="branch-view-details-modal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-light"><h5 class="modal-title">Request Details: <span id="branch-modal-request-id"></span></h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
                <div class="modal-body" id="branch-modal-body-exportable"><div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Code</th><th>Name</th><th>Supplier</th><th>Piece Price</th><th>Status</th></tr></thead><tbody id="branch-modal-items-tbody"></tbody></table></div></div>
                <div class="modal-footer justify-content-between"><button type="button" class="btn btn-outline-secondary" id="export-branch-btn"><i class="fas fa-file-image"></i> Export</button><div><button type="button" class="btn btn-success" id="confirm-receipt-btn" style="display: none;"><i class="fas fa-check-circle"></i> Confirm Receipt</button><button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button></div></div>
            </div>
        </div>
    </div>

    <!-- User Management Modal -->
    <div class="modal fade" id="user-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="user-modal-title">Add User</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
                <div class="modal-body">
                    <form id="user-form">
                        <input type="hidden" id="user-form-original-logincode">
                        <div class="form-group"><label for="user-logincode">Login Code (cannot be changed after creation)</label><input type="text" id="user-logincode" class="form-control" required></div>
                        <div class="form-group"><label for="user-displayname">Display Name</label><input type="text" id="user-displayname" class="form-control" required></div>
                        <div class="form-group"><label for="user-role">Role</label><select id="user-role" class="form-control"><option>Branch</option><option>Officer</option><option>Admin</option></select></div>
                        <div class="form-group"><label for="user-branch">Branch</label><input type="text" id="user-branch" class="form-control"></div>
                    </form>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="save-user-btn">Save User</button></div>
            </div>
        </div>
    </div>
    
    <!-- Fullscreen Notification Modal -->
    <div class="modal fade" id="fullscreen-notification-modal" tabindex="-1" data-backdrop="static" data-keyboard="false">
        <div class="modal-dialog modal-dialog-centered"><div class="modal-content text-center"><div class="modal-header"><h4 class="modal-title w-100"><i class="fas fa-bell text-primary"></i> Notification</h4></div><div class="modal-body py-4"><h3 id="fullscreen-notification-message">تم الاستجابة لطلب التعديل</h3></div><div class="modal-footer justify-content-center"><button type="button" class="btn btn-primary btn-lg" id="fullscreen-notification-ok-btn">OK</button></div></div></div>
    </div>

    <!-- Calculator Modal -->
    <div class="modal fade" id="calculatorModal" tabindex="-1">
         <div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title"><i class="fas fa-calculator mr-2"></i>Price Calculator</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div><div class="modal-body"><div class="form-group"><label for="modalCost">Case Cost:</label><input type="number" step="0.001" class="form-control" id="modalCost"></div><div class="form-group"><label for="modalUnit">Units per Case:</label><input type="number" class="form-control" id="modalUnit"></div><div class="form-group"><label for="modalDiscount">Discount (%):</label><input type="number" class="form-control" id="modalDiscount" value="0"></div><div class="form-group"><label for="modalVat">VAT (%):</label><select class="form-control" id="modalVat"><option value="0">0%</option><option value="5">5%</option><option value="14">14%</option></select></div><hr><h5 class="text-center">Results</h5><div class="form-group"><label>Final Unit Price:</label><input type="text" class="form-control bg-light" id="modalUnitPriceResult" readonly></div><div class="form-group"><label>Final Case Price:</label><input type="text" class="form-control bg-light" id="modalCasePriceResult" readonly></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button><button type="button" class="btn btn-primary" id="apply-calc-price-btn">Apply Price</button></div></div></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
